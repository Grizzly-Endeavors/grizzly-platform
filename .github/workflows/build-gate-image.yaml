name: Build CI Gate Image

# Triggers an Argo Workflows build when the grizzly-gate image changes.
# The build runs in-cluster via Kaniko (see
# kubernetes/infrastructure/argo-workflows/build-gate-image.yaml) and pushes to
# the in-cluster zot registry.
#
# Push builds tag :latest + the workflow uid. To cut a pinned release, run
# workflow_dispatch with `version` set (e.g. v0.2.0) — apps pin to that tag.
#
# Bootstrap (first build, before runners exist):
#   argo submit --from workflowtemplate/build-gate-image -n argo

on:
  push:
    branches: [master]
    paths:
      - "docker/grizzly-gate/**"
  workflow_dispatch:
    inputs:
      version:
        description: "Gate image version tag (e.g. v0.2.0)"
        required: false
        default: "dev"

jobs:
  trigger-build:
    runs-on: lab-runners
    permissions:
      contents: read
      actions: read
    steps:
      - name: Submit Argo WorkflowTemplate
        env:
          ARGO_SERVER: "http://argo-argo-workflows-server.argo.svc.cluster.local:2746"
          GATE_VERSION: ${{ github.event.inputs.version || 'dev' }}
        run: |
          set -euo pipefail

          echo "Submitting build-gate-image WorkflowTemplate (version=${GATE_VERSION})..."
          RESPONSE=$(curl -sf -X POST \
            "${ARGO_SERVER}/api/v1/workflows/argo/submit" \
            -H 'Content-Type: application/json' \
            -d '{
              "resourceKind": "WorkflowTemplate",
              "resourceName": "build-gate-image",
              "submitOptions": {
                "parameters": ["git-ref='"${GITHUB_SHA}"'", "version='"${GATE_VERSION}"'"]
              }
            }')

          WORKFLOW_NAME=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['metadata']['name'])")
          echo "Workflow submitted: ${WORKFLOW_NAME}"

          # Poll until the workflow completes (timeout after 30 minutes)
          TIMEOUT=1800
          ELAPSED=0
          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            STATUS=$(curl -sf "${ARGO_SERVER}/api/v1/workflows/argo/${WORKFLOW_NAME}" \
              | python3 -c "import sys,json; w=json.load(sys.stdin); print(w.get('status',{}).get('phase','Unknown'))")

            echo "  ${ELAPSED}s — status: ${STATUS}"
            case "$STATUS" in
              Succeeded) echo "Build succeeded."; exit 0 ;;
              Failed|Error) echo "::error::Argo workflow ${WORKFLOW_NAME} ${STATUS}"; exit 1 ;;
            esac

            sleep 15
            ELAPSED=$((ELAPSED + 15))
          done

          echo "::error::Timed out waiting for workflow ${WORKFLOW_NAME}"
          exit 1
