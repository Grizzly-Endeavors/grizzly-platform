# pre-commit configuration for grizzly-platform
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files
# Reference: https://pre-commit.com/

repos:
  # General file fixers
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
        exclude: ^archive/
      - id: check-yaml
        # --unsafe: skip construction (only parse), so Authentik blueprints'
        # custom !Env/!Find tags don't fail a plain syntax check.
        args: [--allow-multiple-documents, --unsafe]
        exclude: ^archive/
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-c, .yamllint]
        exclude: ^archive/

  # Ansible linting
  - repo: https://github.com/ansible/ansible-lint
    rev: v24.10.0
    hooks:
      - id: ansible-lint
        files: ^ansible/
        exclude: ^archive/
        additional_dependencies:
          # Cap below 2.19: ansible-core 2.19 dropped
          # ansible.parsing.yaml.constructor, which ansible-lint v24.10.0
          # imports — an unpinned upper bound let an incompatible core in and
          # broke the hook repo-wide. Bump both together when upgrading.
          - ansible-core>=2.15,<2.19

  # Shell script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [--external-sources]
        exclude: ^archive/

# Terraform formatting (if terraform files exist outside archive)
# Uncomment if you add active Terraform files
# - repo: https://github.com/antonbabenko/pre-commit-terraform
#   rev: v1.96.1
#   hooks:
#     - id: terraform_fmt
#       exclude: ^archive/
#     - id: terraform_validate
#       exclude: ^archive/

# Configuration
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: monthly
  skip: []
  submodules: false

default_install_hook_types: [pre-commit, commit-msg]
