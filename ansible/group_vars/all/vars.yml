---
# Public variables (safe to commit to git)
# These reference the encrypted vault variables

# Cloudflare API token for DNS-01 challenge
# The actual token is stored in vault.yml (encrypted)
cloudflare_api_token: "{{ vault_cloudflare_api_token }}"

# Claude Code SSH key for read-only troubleshooting access
# Used when composing the claude-user role into other playbooks.
# The standalone setup-claude-user.yml generates a key automatically.
claude_ssh_public_key: "{{ vault_claude_ssh_public_key }}"

# Foundation data stores (R730xd)
postgres_password: "{{ vault_postgres_password }}"
kv_cache_password: "{{ vault_kv_cache_password }}"

# versitygw stores (ADR-055). Root creds per gateway
# + the shared OpenBao AppRole the gateways use for their Vault-IAM account
# store. Provisioned into OpenBao by setup-versitygw-iam.yml.
s3_hot_root_access_key: "{{ vault_s3_hot_root_access_key }}"
s3_hot_root_secret_key: "{{ vault_s3_hot_root_secret_key }}"
s3_bulk_root_access_key: "{{ vault_s3_bulk_root_access_key }}"
s3_bulk_root_secret_key: "{{ vault_s3_bulk_root_secret_key }}"
versitygw_iam_role_id: "{{ vault_versitygw_iam_role_id }}"
versitygw_iam_role_secret: "{{ vault_versitygw_iam_secret_id }}"

# Observability stack (R730xd)
grafana_admin_password: "{{ vault_grafana_admin_password }}"
obs_s3_access_key: "{{ vault_obs_s3_access_key }}"
obs_s3_secret_key: "{{ vault_obs_s3_secret_key }}"

# Alerting — Discord webhook for Alertmanager notifications
monitoring_discord_webhook_url: "{{ vault_monitoring_discord_webhook_url }}"

# WireGuard ingress tunnel keys (VPS ↔ R730xd)
# Public keys are safe to expose; private keys stay in vault.yml and are
# only referenced directly inside the ingress-tunnel role template.
wg_vps_public_key: "{{ vault_wg_vps_public_key }}"
wg_r730xd_public_key: "{{ vault_wg_r730xd_public_key }}"
