---
# Public variables (safe to commit to git)
# These reference the encrypted vault variables

# Cloudflare API token for DNS-01 challenge
# The actual token is stored in vault.yml (encrypted)
cloudflare_api_token: "{{ vault_cloudflare_api_token }}"

# Claude Code SSH key for read-only troubleshooting access
# Used when composing the claude-user role into other playbooks.
# The standalone setup-claude-user.yml generates a key automatically.
claude_ssh_public_key: "{{ vault_claude_ssh_public_key }}"

# Foundation data stores (R730xd)
postgres_password: "{{ vault_postgres_password }}"
kv_cache_password: "{{ vault_kv_cache_password }}"

# MinIO Obs — hot instance on ZFS (Loki/Tempo S3 backend)
minio_obs_root_user: "{{ vault_minio_obs_root_user }}"
minio_obs_root_password: "{{ vault_minio_obs_root_password }}"

# MinIO Bulk — cold instance on MergerFS (container registry, build artifacts)
minio_bulk_root_user: "{{ vault_minio_bulk_root_user }}"
minio_bulk_root_password: "{{ vault_minio_bulk_root_password }}"

# versitygw stores (ADR-055) — replacing MinIO Obs/Bulk. Root creds per gateway
# + the shared OpenBao AppRole the gateways use for their Vault-IAM account
# store. Provisioned into OpenBao by setup-versitygw-iam.yml.
s3_hot_root_access_key: "{{ vault_s3_hot_root_access_key }}"
s3_hot_root_secret_key: "{{ vault_s3_hot_root_secret_key }}"
s3_bulk_root_access_key: "{{ vault_s3_bulk_root_access_key }}"
s3_bulk_root_secret_key: "{{ vault_s3_bulk_root_secret_key }}"
versitygw_iam_role_id: "{{ vault_versitygw_iam_role_id }}"
versitygw_iam_role_secret: "{{ vault_versitygw_iam_secret_id }}"

# Observability stack (R730xd)
grafana_admin_password: "{{ vault_grafana_admin_password }}"
minio_observability_access_key: "{{ vault_minio_observability_access_key }}"
minio_observability_secret_key: "{{ vault_minio_observability_secret_key }}"

# Alerting — Discord webhook for Alertmanager notifications
monitoring_discord_webhook_url: "{{ vault_monitoring_discord_webhook_url }}"

# Flux CD — Discord webhook for GitOps reconciliation alerts (separate channel)
flux_discord_webhook_url: "{{ vault_flux_discord_webhook_url }}"

# GitHub Actions Runner Controller (ARC v2) — org-level PAT
github_runner_pat: "{{ vault_github_runner_pat }}"

# Argo Workflows — MinIO bulk instance credentials for artifact storage
argo_minio_access_key: "{{ vault_argo_minio_access_key }}"
argo_minio_secret_key: "{{ vault_argo_minio_secret_key }}"

# sccache — MinIO bulk instance credentials for Rust build cache
sccache_minio_access_key: "{{ vault_sccache_minio_access_key }}"
sccache_minio_secret_key: "{{ vault_sccache_minio_secret_key }}"

# WireGuard ingress tunnel keys (VPS ↔ R730xd)
# Public keys are safe to expose; private keys stay in vault.yml and are
# only referenced directly inside the ingress-tunnel role template.
# See docs/decisions/019-ingress-and-tls-termination.md
wg_vps_public_key: "{{ vault_wg_vps_public_key }}"
wg_r730xd_public_key: "{{ vault_wg_r730xd_public_key }}"

# OpenBao (R730xd) — Infisical universal-auth credentials for the
# bootstrap machine identity. Surface encrypted values as the plain
# variables the r730xd-openbao role expects.
# See docs/decisions/023-self-hosted-openbao-on-r730xd.md
infisical_openbao_client_id: "{{ vault_infisical_openbao_client_id }}"
infisical_openbao_client_secret: "{{ vault_infisical_openbao_client_secret }}"

# OpenBao Infisical project ID — pulled from .infisical.json at the repo
# root so there's one source of truth for the workspace identifier.
# Safe to commit: the client_id/secret pair is what grants access, not
# the project ID. $PWD is the CWD ansible was launched from, which is
# always the repo root per README / ansible.cfg conventions.
openbao_infisical_project_id: >-
  {{ (lookup('file', lookup('env', 'PWD') ~ '/.infisical.json') | from_json).workspaceId }}

# -----------------------------------------------------------------------
# Platform secrets via OpenBao (Phase C migration — ADR-024)
# -----------------------------------------------------------------------
# Consuming playbooks opt into OpenBao reads by loading
# ansible/vars/openbao_secrets.yml (conditional on this flag via
# include_vars in each play's pre_tasks). When true, vault_* are
# redefined as vault_kv2_get lookups against OpenBao; when false,
# values come from the decrypted vault.yml as before.
#
# Flipped to true 2026-04-17 after Phase B seed verified clean (all
# 14 paths matched vault.yml source via read-back). Rollback knob:
# set to false (or run rollback-openbao-migration.yml).
openbao_read_enabled: true

# OpenBao API endpoint — LAN-only, served on r730xd. Surfaced here (not
# just in the role defaults) because consumer plays that don't apply the
# r730xd-openbao role need it to configure community.hashi_vault
# lookups. Port from the role defaults.
openbao_api_port: 8200
openbao_api_addr: "https://{{ r730xd_ip }}:{{ openbao_api_port }}"

# OpenBao CA bundle on the controller. The r730xd-openbao role installs
# the CA into the host trust store during deploy-openbao.yml; for the
# jumpbox/bear-desktop controller, fetch it via:
#   scripts/fetch-openbao-ca.sh
# Override via `-e openbao_tls_ca_path=/alt/path/ca.crt`.
openbao_tls_ca_path: "/usr/local/share/ca-certificates/grizzly-platform-openbao-ca.crt"

# OpenBao Agent that mints the Prometheus sys/metrics scrape token (issue #41).
# Shared here (not just in the r730xd-openbao-agent role defaults) because the
# r730xd-prometheus role bind-mounts the sink dir to read the token. The sink
# token is short-TTL and read-only on sys/metrics, so a host-local 0644 file is
# acceptable; the secret_id that authenticates the agent is CIDR-bound + 0600.
openbao_agent_base_dir: "/opt/observability/openbao-agent"
openbao_agent_sink_dir: "{{ openbao_agent_base_dir }}/sink"
