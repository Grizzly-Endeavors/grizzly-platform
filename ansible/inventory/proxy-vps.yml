---
# Proxy VPS Inventory
# Hetzner VPS running Caddy as reverse proxy to K8s cluster via NetBird tunnel
# IP addresses: see ansible/group_vars/all/network.yml (single source of truth)
#
# SSH configured in ~/.ssh/config:
#   Host proxy-vps
#     HostName <proxy_vps_public_ip>
#     User bearf
#     Port 2222

all:
  hosts:
    proxy-vps-1:
      ansible_host: proxy-vps
      ansible_user: bearf
      ansible_port: 2222

      # =======================================================================
      # Caddy Configuration
      # =======================================================================
      enable_caddy: true
      caddy_email: "bearflinn@gmail.com"
      caddy_dns_provider: "cloudflare"

      # K8s proxy mode - routes traffic to K8s ingress via dedicated
      # WireGuard tunnel to R730xd (ingress-tunnel role). The tunnel
      # terminates on R730xd, which iptables-DNATs 30487/30356 to a K8s
      # NodePort on the LAN. No NetBird subnet routes — only those two
      # ports are reachable from the VPS. See ADR-019.
      caddy_enable_k8s_proxy: true

      # Caddy Prometheus metrics (scraped by R730xd Prometheus over NetBird)
      caddy_metrics_port: 2019

      # Ingress endpoint — R730xd's WireGuard address + K8s HTTP NodePort.
      # All *.bearflinn.com subdomains not matched by caddy_services are
      # proxied here; K8s ingress handles hostname routing and 404s.
      caddy_k8s_ingress_endpoint: "{{ k8s_ingress_ip }}:30487"

      # External domains routed to K8s ingress (non-bearflinn.com domains)
      caddy_k8s_domains:
        - domain: "pennydreadfulsfx.com"
          comment: "Penny Dreadful SFX portfolio (caz-portfolio)"
        - domain: "www.pennydreadfulsfx.com"
          comment: "Penny Dreadful SFX portfolio - www"

      # Non-K8s services (static sites, other reverse proxies)
      caddy_services:
        - domain: "gin-house.bearflinn.com"
          type: "proxy"
          backend: "{{ netbird_home_assistant_ip }}:8123"
          comment: "Home Assistant via Tailscale"
        - domain: "test.bearflinn.com"
          type: "static"
          root: "/var/www/html"
          comment: "Static test site"
        - domain: "residuum.bearflinn.com"
          type: "redirect"
          target: "agent-residuum.com"
          comment: "Permanent redirect to agent-residuum.com"
        - domain: "ph.bearflinn.com"
          type: "posthog_proxy"
          comment: "PostHog analytics reverse proxy (avoids ad blockers)"

      # Wildcard roots served to the K8s ingress. Each gets its own
      # `*.<domain>` vhost + DNS-01 wildcard cert. bearflinn.com is the
      # legacy domain; grizzly-endeavors.com is the platform-service domain
      # (migration in progress). The Cloudflare ACME token must have
      # DNS-edit scope on every zone listed here.
      caddy_wildcard_domains:
        - "bearflinn.com"
        - "grizzly-endeavors.com"

      # Root domain redirect (bearflinn apex -> landing). grizzly-endeavors.com
      # apex handling is deferred (landing-page stays on bearflinn).
      caddy_root_domain: "bearflinn.com"
      caddy_root_redirect_target: "landing.bearflinn.com"

      # =======================================================================
      # UDP Port Forwarding (NAT/DNAT via NetBird tunnel)
      # =======================================================================
      # These rules forward UDP traffic from the VPS public IP through the
      # NetBird VPN tunnel (wt0) to backend services on the home network.
      #
      # IMPORTANT: These are managed by the setup-proxy-vps playbook alongside
      # UFW. If UFW is reset (which the playbook does), these rules are
      # re-applied automatically. Do NOT add forwarding rules manually via
      # iptables — they will be wiped on the next playbook run.
      #
      # NAT rules are stored in /etc/ufw/before.rules so they persist
      # across UFW reloads.
      #
      # (Palworld UDP 8211 forward removed 2026-04-17. Palworld decommissioned
      # indefinitely — see ADR-022. Leaving the empty list here so the
      # setup-proxy-vps playbook's UFW reset still removes any lingering rule.)
      udp_forwarding_rules: []

      # =======================================================================
      # Game server ingress (grizzly-gameservers)
      # =======================================================================
      # Static UDP+TCP range DNAT'd 1:1 over wg0 to R730xd, which re-DNATs it
      # to a K8s node where Agones hands out individual ports. Opened once;
      # per-server allocation happens inside the cluster. Range is the single
      # source of truth in network.yml (game_ingress_port_range). Apply scoped
      # with: --tags game-ingress.
      game_ingress:
        enabled: true
        port_range: "{{ game_ingress_port_range }}"
        target_ip: "{{ wg_r730xd_ip }}"
        protocols: [udp, tcp]

      # =======================================================================
      # Host-scoped settings (VPS only)
      # =======================================================================
      # These MUST stay under the proxy-vps-1 host, not under `all: vars:`.
      # `all` is the magic group spanning every inventory file, so anything
      # here under `all` leaks to r730xd and the lab nodes — e.g. it previously
      # forced caddy into monitoring_required_services on every host (false
      # ServiceDown alerts) and disabled smartd/IPMI monitoring on the r730xd.
      timezone: "UTC"

      # Monitoring — VPS has no IPMI/BMC or SMART-capable disks
      ipmi_exporter_enabled: false
      smartd_enabled: false
      monitoring_required_services:
        - "prometheus-node-exporter"
        - "caddy"
      monitoring_optional_services: []

      # Home network public IP for monitoring firewall rules.
      # R730xd Prometheus scrapes VPS over the internet from this address.
      # R730xd is enrolled in the NetBird admin group for operator access only
      # (never used for VPS→home ingress — that goes through the dedicated WG
      # tunnel per ADR-019). Update this if the ISP assigns a new IP.
      monitoring_home_ip: "{{ home_public_ip }}"

      # Firewall configuration
      enable_firewall: true

      # UFW rules
      ufw_web_rules:
        - { port: '80', proto: 'tcp', comment: 'HTTP' }
        - { port: '443', proto: 'tcp', comment: 'HTTPS' }
        - { port: '51822', proto: 'udp', comment: 'WireGuard (ingress tunnel to R730xd)' }

      # Mail L4 ingress (haproxy-mail role, ADR-051) — HAProxy binds these and
      # forwards to Stalwart over the wg0 tunnel with PROXY protocol v2.
      enable_haproxy_mail: true
      ufw_mail_rules:
        - { port: '25', proto: 'tcp', comment: 'SMTP (mail ingress)' }
        - { port: '465', proto: 'tcp', comment: 'SMTPS/submissions (mail ingress)' }
        - { port: '587', proto: 'tcp', comment: 'submission (mail ingress)' }
        - { port: '993', proto: 'tcp', comment: 'IMAPS (mail ingress)' }
