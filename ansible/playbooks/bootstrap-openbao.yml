---
# bootstrap-openbao.yml — One-time OpenBao initialization.
#
# Runs `bao operator init` against a freshly-deployed OpenBao, captures
# the unseal shares + root token, and pushes them into the Infisical
# bootstrap project so auto-unseal can fetch them on every subsequent
# reboot. Also performs first-time setup: enables audit logging, KV v2,
# and writes the baseline policies.
#
# This playbook is hands-on and runs ONCE per OpenBao installation. Re-
# running it against an already-initialized OpenBao is a no-op (it exits
# loudly rather than risking a second init).
#
# Prerequisites:
#   - deploy-openbao.yml has run successfully
#   - OpenBao container is up, sealed, and uninitialized
#   - The Infisical CLI on the controller (the box you run Ansible from)
#     is logged in with write access to the project. Run `infisical user`
#     to confirm; if not logged in, `infisical login`. Or export
#     INFISICAL_TOKEN with an operator-scoped token.
#
# Usage:
#   ansible-playbook -i ansible/inventory/r730xd.yml \
#     ansible/playbooks/bootstrap-openbao.yml \
#     --vault-password-file .vault_pass -v
#
# After: back up the unseal keys to a second location (Bear's password
# manager). Infisical is a single point of failure for seal recovery.

- name: Bootstrap OpenBao (init + push keys to Infisical + policies)
  hosts: r730xd
  become: true
  gather_facts: false

  vars_files:
    - "{{ playbook_dir }}/../inventory/group_vars/all/vault.yml"
    - "{{ playbook_dir }}/../inventory/group_vars/all/vars.yml"
    # The role defaults hold all OpenBao paths, ports, and Infisical
    # key-naming conventions. This playbook doesn't apply the role, so
    # load the defaults directly for consistency (single source of truth).
    - "{{ playbook_dir }}/../roles/r730xd-openbao/defaults/main.yml"

  vars:
    bao_env:
      VAULT_ADDR: "{{ openbao_loopback_addr }}"
      VAULT_CACERT: "{{ openbao_tls_dir }}/ca.crt"
      BAO_ADDR: "{{ openbao_loopback_addr }}"
      BAO_CACERT: "{{ openbao_tls_dir }}/ca.crt"

  pre_tasks:
    - name: Verify Infisical CLI on the controller has write access
      ansible.builtin.command:
        argv:
          - infisical
          - secrets
          - "--projectId={{ openbao_infisical_project_id }}"
          - "--env={{ openbao_infisical_env }}"
      delegate_to: localhost
      become: false
      changed_when: false
      register: bootstrap_infisical_precheck
      failed_when: bootstrap_infisical_precheck.rc != 0
      # If this fails: `infisical login` on the controller, or
      # export INFISICAL_TOKEN=<operator-scoped token>.

    - name: Check current OpenBao status
      ansible.builtin.command:
        argv: ["{{ openbao_cli_install_dir }}/bao", "status", "-format=json"]
      environment: "{{ bao_env }}"
      register: bootstrap_status
      changed_when: false
      failed_when: false

    - name: Parse OpenBao status
      ansible.builtin.set_fact:
        openbao_state: "{{ bootstrap_status.stdout | from_json }}"

    - name: Note whether initial init is needed
      ansible.builtin.set_fact:
        openbao_needs_init: "{{ not (openbao_state.initialized | default(false)) }}"

  tasks:
    # ------------------------------------------------------------------
    # First-boot path: init + push keys to Infisical. Runs once.
    # ------------------------------------------------------------------
    - name: Initialize OpenBao (generates unseal keys + root token)
      ansible.builtin.command:
        argv:
          - "{{ openbao_cli_install_dir }}/bao"
          - operator
          - init
          - "-key-shares={{ openbao_unseal_shares }}"
          - "-key-threshold={{ openbao_unseal_threshold }}"
          - -format=json
      environment: "{{ bao_env }}"
      register: bootstrap_init
      changed_when: true
      no_log: true
      when: openbao_needs_init

    - name: Capture init output
      ansible.builtin.set_fact:
        openbao_init: "{{ bootstrap_init.stdout | from_json }}"
      no_log: true
      when: openbao_needs_init

    - name: Push unseal share to Infisical
      ansible.builtin.command:
        argv:
          - infisical
          - secrets
          - set
          - "--projectId={{ openbao_infisical_project_id }}"
          - "--env={{ openbao_infisical_env }}"
          - "--type=shared"
          - "{{ openbao_infisical_unseal_key_prefix }}{{ idx + 1 }}={{ openbao_init.unseal_keys_b64[idx] }}"
      delegate_to: localhost
      become: false
      loop: "{{ range(0, openbao_unseal_shares | int) | list }}"
      loop_control:
        loop_var: idx
      no_log: true
      changed_when: true
      when: openbao_needs_init

    - name: Push root token to Infisical
      ansible.builtin.command:
        argv:
          - infisical
          - secrets
          - set
          - "--projectId={{ openbao_infisical_project_id }}"
          - "--env={{ openbao_infisical_env }}"
          - "--type=shared"
          - "{{ openbao_infisical_root_token_key }}={{ openbao_init.root_token }}"
      delegate_to: localhost
      become: false
      no_log: true
      changed_when: true
      when: openbao_needs_init

    - name: Trigger auto-unseal (verifies the full Infisical round-trip)
      ansible.builtin.systemd_service:
        name: "{{ openbao_unseal_unit_name }}"
        state: restarted
      when: openbao_needs_init

    - name: Wait for vault to be unsealed
      ansible.builtin.command:
        argv: ["{{ openbao_cli_install_dir }}/bao", "status", "-format=json"]
      environment: "{{ bao_env }}"
      register: bootstrap_unseal_check
      changed_when: false
      retries: 20
      delay: 3
      until: >
        bootstrap_unseal_check.rc == 0
        and (bootstrap_unseal_check.stdout | from_json).sealed == false

    # ------------------------------------------------------------------
    # Re-run path: vault was already initialized. Fetch the root token
    # from Infisical so the post-init config tasks below can use it.
    # This keeps bootstrap idempotent — audit/KV/policies are safe to
    # re-apply thanks to their existing "already exists" handling, and
    # this playbook can be re-run after code changes without needing to
    # seal + wipe + re-init.
    # ------------------------------------------------------------------
    - name: Fetch existing root token from Infisical
      ansible.builtin.command:
        argv:
          - infisical
          - secrets
          - get
          - "{{ openbao_infisical_root_token_key }}"
          - "--projectId={{ openbao_infisical_project_id }}"
          - "--env={{ openbao_infisical_env }}"
          - --plain
          - --silent
      delegate_to: localhost
      become: false
      changed_when: false
      register: bootstrap_existing_token
      no_log: true
      when: not openbao_needs_init

    - name: Shape init-like fact from existing token (for re-runs)
      ansible.builtin.set_fact:
        openbao_init:
          root_token: "{{ bootstrap_existing_token.stdout | trim }}"
      no_log: true
      when: not openbao_needs_init

    # ------------------------------------------------------------------
    # Post-init: secrets engines + policies. Uses the root token in
    # memory; never persists it on disk. (Audit device is now declared
    # in openbao.hcl — OpenBao 2.5+ rejects the API-based enable.)
    # ------------------------------------------------------------------

    - name: Enable KV v2 secrets engine at secret/
      ansible.builtin.command:
        argv:
          - "{{ openbao_cli_install_dir }}/bao"
          - secrets
          - enable
          - -path=secret
          - -version=2
          - kv
      environment:
        VAULT_ADDR: "{{ openbao_loopback_addr }}"
        VAULT_CACERT: "{{ openbao_tls_dir }}/ca.crt"
        BAO_ADDR: "{{ openbao_loopback_addr }}"
        BAO_CACERT: "{{ openbao_tls_dir }}/ca.crt"
        VAULT_TOKEN: "{{ openbao_init.root_token | trim }}"
        BAO_TOKEN: "{{ openbao_init.root_token | trim }}"
      register: bootstrap_kv
      changed_when: "'Success' in bootstrap_kv.stdout"
      failed_when:
        - bootstrap_kv.rc != 0
        - "'path is already in use' not in bootstrap_kv.stderr"
      no_log: true

    - name: Write baseline policies
      ansible.builtin.copy:
        dest: "/tmp/openbao-policy-{{ item.name }}.hcl"
        content: "{{ item.policy }}"
        mode: "0600"
      loop:
        - name: grizzly-platform-admin
          policy: |
            path "secret/*"      { capabilities = ["create","read","update","delete","list","patch","sudo"] }
            path "sys/mounts/*"  { capabilities = ["read","list"] }
            path "sys/policies/acl/*" { capabilities = ["read","list"] }
        - name: ansible-readonly
          policy: |
            path "secret/data/grizzly-platform/*" { capabilities = ["read"] }
            path "secret/metadata/grizzly-platform/*" { capabilities = ["read","list"] }
        - name: ansible-readwrite
          policy: |
            path "secret/data/grizzly-platform/*" { capabilities = ["create","read","update","delete","patch"] }
            path "secret/metadata/grizzly-platform/*" { capabilities = ["read","list","delete"] }
        - name: prometheus-readonly
          policy: |
            path "sys/metrics" { capabilities = ["read"] }
        # Platform-scoped reads consumed via AppRole (Ansible) and via
        # Kubernetes auth (ESO). Identical capabilities but named
        # per-consumer so revocations can be surgical.
        - name: ansible-platform-read
          policy: |
            path "secret/data/grizzly-platform/*" { capabilities = ["read"] }
            path "secret/metadata/grizzly-platform/*" { capabilities = ["read","list"] }
        - name: eso-platform-read
          policy: |
            path "secret/data/grizzly-platform/*" { capabilities = ["read"] }
            path "secret/metadata/grizzly-platform/*" { capabilities = ["read","list"] }
            path "secret/data/lab-apps/*" { capabilities = ["read"] }
            path "secret/metadata/lab-apps/*" { capabilities = ["read","list"] }
      loop_control:
        label: "{{ item.name }}"
      no_log: false

    - name: Apply baseline policies
      ansible.builtin.command:
        argv:
          - "{{ openbao_cli_install_dir }}/bao"
          - policy
          - write
          - "{{ item.name }}"
          - "/tmp/openbao-policy-{{ item.name }}.hcl"
      environment:
        VAULT_ADDR: "{{ openbao_loopback_addr }}"
        VAULT_CACERT: "{{ openbao_tls_dir }}/ca.crt"
        BAO_ADDR: "{{ openbao_loopback_addr }}"
        BAO_CACERT: "{{ openbao_tls_dir }}/ca.crt"
        VAULT_TOKEN: "{{ openbao_init.root_token | trim }}"
        BAO_TOKEN: "{{ openbao_init.root_token | trim }}"
      loop:
        - { name: grizzly-platform-admin }
        - { name: ansible-readonly }
        - { name: ansible-readwrite }
        - { name: prometheus-readonly }
        - { name: ansible-platform-read }
        - { name: eso-platform-read }
      loop_control:
        label: "{{ item.name }}"
      register: bootstrap_policy
      changed_when: "'Success' in bootstrap_policy.stdout"
      no_log: true

    # Ensures no orphaned lab-iac-admin policy lingers. Safe even if absent.
    - name: Delete legacy lab-iac-admin policy
      ansible.builtin.command:
        argv:
          - "{{ openbao_cli_install_dir }}/bao"
          - policy
          - delete
          - lab-iac-admin
      environment:
        VAULT_ADDR: "{{ openbao_loopback_addr }}"
        VAULT_CACERT: "{{ openbao_tls_dir }}/ca.crt"
        BAO_ADDR: "{{ openbao_loopback_addr }}"
        BAO_CACERT: "{{ openbao_tls_dir }}/ca.crt"
        VAULT_TOKEN: "{{ openbao_init.root_token | trim }}"
        BAO_TOKEN: "{{ openbao_init.root_token | trim }}"
      register: bootstrap_legacy_policy_delete
      changed_when: "'Success' in bootstrap_legacy_policy_delete.stdout"
      failed_when:
        - bootstrap_legacy_policy_delete.rc != 0
        - "'no policy named' not in (bootstrap_legacy_policy_delete.stderr | default(''))"
      no_log: true

    - name: Clean up policy files
      ansible.builtin.file:
        path: "/tmp/openbao-policy-{{ item }}.hcl"
        state: absent
      loop:
        - grizzly-platform-admin
        - ansible-readonly
        - ansible-readwrite
        - prometheus-readonly
        - ansible-platform-read
        - eso-platform-read

    # ------------------------------------------------------------------
    # AppRole auth method for Ansible consumers.
    # ------------------------------------------------------------------
    # Ansible reads platform secrets out of OpenBao via AppRole. role_id
    # is stored in vault.yml (not sensitive alone) and secret_id is also
    # stored in vault.yml (encrypted; sensitive — rotate via
    # rotate-openbao-keys.yml --tags approle-secret). Both are
    # CIDR-bound to the LAN, so a leak off-site is unusable.
    #
    # The role ships with long-lived secret_id (TTL=0, unlimited uses)
    # — rotation is explicit, not time-based. Token TTL is short (1h /
    # 4h max) so even if a rendered token leaks, the window is small.

    - name: Fetch auth method list
      ansible.builtin.command:
        argv: ["{{ openbao_cli_install_dir }}/bao", "auth", "list", "-format=json"]
      environment:
        VAULT_ADDR: "{{ openbao_loopback_addr }}"
        VAULT_CACERT: "{{ openbao_tls_dir }}/ca.crt"
        BAO_ADDR: "{{ openbao_loopback_addr }}"
        BAO_CACERT: "{{ openbao_tls_dir }}/ca.crt"
        VAULT_TOKEN: "{{ openbao_init.root_token | trim }}"
        BAO_TOKEN: "{{ openbao_init.root_token | trim }}"
      register: bootstrap_auth_list
      changed_when: false
      no_log: true

    - name: Enable approle auth method
      ansible.builtin.command:
        argv:
          - "{{ openbao_cli_install_dir }}/bao"
          - auth
          - enable
          - approle
      environment:
        VAULT_ADDR: "{{ openbao_loopback_addr }}"
        VAULT_CACERT: "{{ openbao_tls_dir }}/ca.crt"
        BAO_ADDR: "{{ openbao_loopback_addr }}"
        BAO_CACERT: "{{ openbao_tls_dir }}/ca.crt"
        VAULT_TOKEN: "{{ openbao_init.root_token | trim }}"
        BAO_TOKEN: "{{ openbao_init.root_token | trim }}"
      register: bootstrap_approle_enable
      changed_when: "'Success' in bootstrap_approle_enable.stdout"
      failed_when:
        - bootstrap_approle_enable.rc != 0
        - "'path is already in use' not in bootstrap_approle_enable.stderr"
      when: "'approle/' not in (bootstrap_auth_list.stdout | from_json | default({}))"
      no_log: true

    - name: Write ansible-iac AppRole
      ansible.builtin.command:
        argv:
          - "{{ openbao_cli_install_dir }}/bao"
          - write
          - auth/approle/role/ansible-iac
          - "token_policies=ansible-platform-read"
          - "token_ttl=1h"
          - "token_max_ttl=4h"
          - "token_bound_cidrs=10.0.0.0/24"
          - "secret_id_bound_cidrs=10.0.0.0/24"
          - "secret_id_ttl=0"
          - "secret_id_num_uses=0"
      environment:
        VAULT_ADDR: "{{ openbao_loopback_addr }}"
        VAULT_CACERT: "{{ openbao_tls_dir }}/ca.crt"
        BAO_ADDR: "{{ openbao_loopback_addr }}"
        BAO_CACERT: "{{ openbao_tls_dir }}/ca.crt"
        VAULT_TOKEN: "{{ openbao_init.root_token | trim }}"
        BAO_TOKEN: "{{ openbao_init.root_token | trim }}"
      register: bootstrap_approle_role
      changed_when: "'Success' in bootstrap_approle_role.stdout"
      no_log: true

    - name: Final status check
      ansible.builtin.command:
        argv: ["{{ openbao_cli_install_dir }}/bao", "status", "-format=json"]
      environment: "{{ bao_env }}"
      register: bootstrap_final
      changed_when: false

    - name: Assert vault is initialized and unsealed
      ansible.builtin.assert:
        that:
          - (bootstrap_final.stdout | from_json).initialized
          - not (bootstrap_final.stdout | from_json).sealed
        fail_msg: >
          OpenBao did not reach initialized+unsealed at end of bootstrap.
          Check `journalctl -u openbao-auto-unseal -n 100` and
          `bao status`.

    - name: Display next steps
      ansible.builtin.debug:
        msg:
          - "=== OpenBao bootstrap complete ==="
          - ""
          - "Unseal keys + root token are stored in Infisical:"
          - "  project: {{ openbao_infisical_project_id }}"
          - "  env:     {{ openbao_infisical_env }}"
          - "  names:   {{ openbao_infisical_unseal_key_prefix }}1..{{ openbao_unseal_shares }}, {{ openbao_infisical_root_token_key }}"
          - ""
          - "NEXT STEPS (important):"
          - "  1. Back up the unseal keys to a second location (password manager)."
          - "     Infisical alone is single-source — loss of access = seal lockout."
          - "  2. Log in as root to create a personal admin token:"
          - "       export VAULT_ADDR={{ openbao_api_addr }}"
          - "       export VAULT_CACERT={{ openbao_tls_dir }}/ca.crt"
          - "       bao login <root-token>"
          - "       bao token create -policy=grizzly-platform-admin -ttl=720h"
          - "  3. Populate the Ansible AppRole creds into vault.yml so"
          - "     playbooks can authenticate to OpenBao:"
          - "       scripts/set-openbao-approle-secrets.sh"
          - "  4. Reboot r730xd once to verify auto-unseal survives a reboot."
          - "  5. Schedule a rotation drill (see docs/runbooks/openbao-rotation.md)."
