---
# deploy-foundation-stores.yml — Deploy foundation data stores to R730xd
#
# Deploys PostgreSQL, kv-cache (Valkey), MinIO Obs, and MinIO Bulk as Docker
# Compose services on the R730xd storage server.
#
# Storage tiers:
#   Hot (ZFS):     PostgreSQL, kv-cache, MinIO Obs — continuous-write workloads
#   Cold (MergerFS): MinIO Bulk — write-once-read-many (registry, artifacts)
#
# These services are consumed by K8s workloads (via <r730xd_ip>:<port>)
# and staging VM services. They run on R730xd because stateful workloads
# belong on the storage server, not in K8s (diskless nodes).
#
# See ADR-003 for design decisions.
#
# Prerequisites:
#   - R730xd baseline applied (setup-r730xd.yml — installs Docker)
#   - R730xd storage stack deployed (r730xd-storage.yml — MergerFS pool)
#   - ZFS pool and datasets created (r730xd-zfs.yml)
#   - Vault secrets configured (see vault.yml.example)
#
# Usage:
#   ansible-playbook -i ansible/inventory/r730xd.yml \
#     ansible/playbooks/deploy-foundation-stores.yml \
#     --vault-password-file .vault_pass -v
#
# Deploy individual services:
#   ... --tags postgres
#   ... --tags kv-cache
#   ... --tags minio-obs
#   ... --tags minio-bulk
#
# Endpoints (after deploy) — IPs from ansible/group_vars/all/network.yml:
#   PostgreSQL:        postgresql://postgres:<password>@<r730xd_ip>:5432/
#   kv-cache (Valkey): redis://:<password>@<r730xd_ip>:6379
#   MinIO Obs API:     http://<r730xd_ip>:9000
#   MinIO Obs Console: http://<r730xd_ip>:9001
#   MinIO Bulk API:    http://<r730xd_ip>:9002
#   MinIO Bulk Console: http://<r730xd_ip>:9003

- name: Deploy foundation data stores
  hosts: r730xd
  become: yes
  gather_facts: yes

  # OpenBao auth defaults for community.hashi_vault lookups. Inert
  # unless `openbao_read_enabled: true` (then openbao_secrets.yml loads
  # in pre_tasks and redefines vault_* to read from OpenBao). See
  # docs/decisions/024-platform-secrets-on-openbao.md.
  vars_files:
    - "{{ playbook_dir }}/../vars/openbao_auth.yml"

  pre_tasks:
    - name: Load OpenBao-sourced platform secrets
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../vars/openbao_secrets.yml"
      when: openbao_read_enabled | default(false) | bool
      tags: [always]

    - name: Verify ZFS pool is mounted
      ansible.builtin.command: findmnt /mnt/zfs
      changed_when: false
      failed_when: zfs_check.rc != 0
      register: zfs_check
      tags: [always]

    - name: Verify MergerFS pool is mounted
      ansible.builtin.command: findmnt /mnt/pool
      changed_when: false
      failed_when: pool_check.rc != 0
      register: pool_check
      tags: [always]

    - name: Verify Docker is installed
      ansible.builtin.command: docker --version
      changed_when: false
      failed_when: docker_installed.rc != 0
      register: docker_installed
      tags: [always]

    - name: Verify Docker is running
      ansible.builtin.service_facts:
      tags: [always]

    - name: Fail if Docker service is not running
      ansible.builtin.fail:
        msg: >
          Docker is not running. Run setup-r730xd.yml first to install and
          enable Docker.
      when: "'docker.service' not in ansible_facts.services or
             ansible_facts.services['docker.service'].state != 'running'"
      tags: [always]

  roles:
    - role: r730xd-postgres
      tags: [foundation, postgres]
    - role: r730xd-kv-cache
      tags: [foundation, kv-cache]
    - role: r730xd-minio-obs
      tags: [foundation, minio-obs]
    - role: r730xd-minio-bulk
      tags: [foundation, minio-bulk]
