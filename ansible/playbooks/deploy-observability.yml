---
# deploy-observability.yml — Deploy observability stack to R730xd
#
# Deploys Prometheus, Alertmanager, Loki, Tempo, Grafana, and Alloy as
# Docker Compose services on the R730xd storage server. Uses foundation
# stores (s3-hot versitygw for S3 object storage, PostgreSQL for Grafana database).
#
# All observability data persisted on ZFS pool (tank/observability/*).
#
# See ADR-004 for design decisions.
#
# Prerequisites:
#   - R730xd baseline applied (setup-r730xd.yml — installs Docker)
#   - ZFS pool and datasets created (r730xd-zfs.yml)
#   - Foundation stores running (deploy-foundation-stores.yml — s3-hot, Postgres)
#   - Observability S3 buckets/account provisioned (setup-observability-stores.yml)
#   - Vault secrets configured (see vault.yml.example)
#
# Usage:
#   ansible-playbook -i ansible/inventory/r730xd.yml \
#     ansible/playbooks/deploy-observability.yml \
#     --vault-password-file .vault_pass -v
#
# Deploy individual services:
#   ... --tags prometheus
#   ... --tags loki
#   ... --tags tempo
#   ... --tags grafana
#   ... --tags alloy
#
# Endpoints (after deploy) — IPs from ansible/group_vars/all/network.yml:
#   Prometheus:   http://<r730xd_ip>:9090
#   Alertmanager: http://<r730xd_ip>:9093
#   Loki:         http://<r730xd_ip>:3100
#   Tempo API:    http://<r730xd_ip>:3200
#   Tempo OTLP:   <r730xd_ip>:4317 (gRPC), <r730xd_ip>:4318 (HTTP)
#   Grafana:      http://<r730xd_ip>:3000

- name: Deploy observability stack
  hosts: r730xd
  become: yes
  gather_facts: yes

  # OpenBao auth defaults for community.hashi_vault lookups. Inert
  # unless `openbao_read_enabled: true` (then openbao_secrets.yml loads
  # in pre_tasks and redefines vault_* to read from OpenBao). See
  # docs/decisions/024-platform-secrets-on-openbao.md.
  vars_files:
    - "{{ playbook_dir }}/../vars/openbao_auth.yml"

  pre_tasks:
    - name: Load OpenBao-sourced platform secrets
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../vars/openbao_secrets.yml"
      when: openbao_read_enabled | default(false) | bool
      tags: [always]

    - name: Verify ZFS pool is mounted
      ansible.builtin.command: findmnt /mnt/zfs
      changed_when: false
      failed_when: zfs_check.rc != 0
      register: zfs_check
      tags: [always]

    - name: Verify Docker is installed
      ansible.builtin.command: docker --version
      changed_when: false
      failed_when: docker_installed.rc != 0
      register: docker_installed
      tags: [always]

    - name: Verify Docker is running
      ansible.builtin.service_facts:
      tags: [always]

    - name: Fail if Docker service is not running
      ansible.builtin.fail:
        msg: >
          Docker is not running. Run setup-r730xd.yml first to install and
          enable Docker.
      when: "'docker.service' not in ansible_facts.services or
             ansible_facts.services['docker.service'].state != 'running'"
      tags: [always]

    - name: Verify s3-hot object store is healthy
      ansible.builtin.uri:
        url: "http://localhost:7070/health"
        status_code: 200
      register: s3_hot_health
      tags: [always]

    - name: Verify PostgreSQL is healthy
      ansible.builtin.command: >
        docker exec foundation-postgres pg_isready -U postgres -p 5432
      changed_when: false
      failed_when: pg_health.rc != 0
      register: pg_health
      tags: [always]

    # --- Loki/Tempo S3 buckets + account ---
    # Provisioned on the s3-hot versitygw gateway by
    # setup-observability-stores.yml (ADR-055) — run that before this playbook.

    # --- Grafana PostgreSQL database provisioning ---

    - name: Ensure Grafana database user exists
      ansible.builtin.command: >
        docker exec foundation-postgres psql -U postgres -c
        "DO $$ BEGIN
          IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'grafana') THEN
            CREATE ROLE grafana WITH LOGIN PASSWORD '{{ postgres_password }}';
          END IF;
        END $$;"
      changed_when: false
      no_log: true
      tags: [grafana]

    - name: Check if Grafana database exists
      ansible.builtin.command: >
        docker exec foundation-postgres psql -U postgres -tAc
        "SELECT 1 FROM pg_database WHERE datname='grafana'"
      register: grafana_db_check
      changed_when: false
      tags: [grafana]

    - name: Create Grafana database
      ansible.builtin.command: >
        docker exec foundation-postgres psql -U postgres -c
        "CREATE DATABASE grafana OWNER grafana"
      when: grafana_db_check.stdout != '1'
      tags: [grafana]

  roles:
    - role: r730xd-prometheus
      tags: [observability, prometheus]
    - role: r730xd-exporters
      tags: [observability, exporters]
    - role: r730xd-loki
      tags: [observability, loki]
    - role: r730xd-tempo
      tags: [observability, tempo]
    - role: r730xd-grafana
      tags: [observability, grafana]
    - role: r730xd-alloy
      tags: [observability, alloy]
