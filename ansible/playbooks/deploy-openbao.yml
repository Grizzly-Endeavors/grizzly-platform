---
# deploy-openbao.yml — Deploy OpenBao to the R730xd
#
# OpenBao is the single source of truth for platform secrets. It runs on
# the R730xd (not K8s) so that cluster bootstrap does not depend on
# secrets that live in the cluster. Integrated Raft storage keeps it free
# of any runtime dependency on other foundation stores — no circular
# dependency at boot.
#
# See ADR-023 for the full architectural rationale, and
# docs/runbooks/openbao-rotation.md for key rotation.
#
# This playbook is idempotent. On first run, OpenBao will come up sealed
# and uninitialized; follow it with bootstrap-openbao.yml to init.
#
# Prerequisites:
#   - R730xd baseline applied (setup-r730xd.yml — installs Docker)
#   - R730xd ZFS pool created (r730xd-zfs.yml)
#   - vault_infisical_openbao_client_id + _client_secret in vault.yml
#   - Infisical project + machine identity exist (see docs/runbooks/
#     openbao-disaster-recovery.md, "Manual prerequisites")
#
# Usage:
#   ansible-playbook -i ansible/inventory \
#     ansible/playbooks/deploy-openbao.yml \
#     --vault-password-file .vault_pass -v

- name: Deploy OpenBao
  hosts: r730xd
  become: true
  gather_facts: true

  vars_files:
    - "{{ playbook_dir }}/../inventory/group_vars/all/vault.yml"
    - "{{ playbook_dir }}/../inventory/group_vars/all/vars.yml"

  pre_tasks:
    - name: Verify ZFS pool is mounted
      ansible.builtin.command: findmnt /mnt/zfs
      changed_when: false
      register: openbao_zfs_check
      failed_when: openbao_zfs_check.rc != 0
      tags: [always]

    - name: Verify Docker is installed
      ansible.builtin.command: docker --version
      changed_when: false
      register: openbao_docker_installed
      failed_when: openbao_docker_installed.rc != 0
      tags: [always]

    - name: Verify Docker service is running
      ansible.builtin.service_facts:
      tags: [always]

    - name: Fail if Docker is not running
      ansible.builtin.fail:
        msg: >
          Docker is not running on R730xd. Run setup-r730xd.yml first.
      when: >
        'docker.service' not in ansible_facts.services
        or ansible_facts.services['docker.service'].state != 'running'
      tags: [always]

    - name: Verify Infisical bootstrap credentials are in the vault
      ansible.builtin.assert:
        that:
          - vault_infisical_openbao_client_id is defined
          - vault_infisical_openbao_client_id | length > 0
          - vault_infisical_openbao_client_secret is defined
          - vault_infisical_openbao_client_secret | length > 0
          - openbao_infisical_project_id is defined
          - openbao_infisical_project_id | length > 0
        fail_msg: >
          vault_infisical_openbao_client_id / _secret must be set in
          vault.yml (use scripts/set-openbao-bootstrap-secrets.sh), and
          .infisical.json at the repo root must have a workspaceId.
          See docs/runbooks/openbao-disaster-recovery.md for the
          Infisical setup steps.
      tags: [always]

  roles:
    - role: r730xd-openbao
      tags: [openbao]

  post_tasks:
    - name: Drop OpenBao Prometheus scrape target
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/r730xd-prometheus/templates/targets.d/openbao.yml.j2"
        dest: /opt/observability/prometheus/targets.d/openbao.yml
        owner: root
        group: root
        mode: "0644"
      # file_sd picks the change up on its next 30s refresh, so no
      # Prometheus reload is needed.
      tags: [openbao, monitoring]
