---
# migrate-platform-secrets-to-openbao.yml — One-shot seed of platform
# secrets from Ansible Vault into OpenBao.
#
# Reads the 19 in-scope `vault_*` values out of the decrypted vault.yml
# and writes them into `secret/grizzly-platform/<domain>/<name>` paths via the
# KV v2 API. Ends with a read-back pass that verifies OpenBao's stored
# values match the Ansible Vault source (byte-for-byte) — any drift
# fails the playbook.
#
# Scope (in-scope for the Phase B migration; see the plan file):
#   platform/       cloudflare, idrac, github-app, github-runner,
#                   netbird (conditional)
#   stores/         postgres, kv-cache (versitygw s3-hot/s3-bulk seeded separately)
#   observability/  grafana, s3-client, discord-webhook
#   cicd/           sccache-s3, argo-s3
#   flux/           discord-webhook
#
# Out of scope (stay in vault.yml):
#   - Infisical bootstrap creds (bootstrap chicken-and-egg)
#   - WireGuard private keys (ingress-tunnel role references them
#     directly via vault_*, not through the vars.yml indirection)
#   - App-level secrets (Gemini, Cerebras, per-app Postgres users)
#
# Prerequisites:
#   - bootstrap-openbao.yml has run (policies + KV v2 exist)
#   - community.hashi_vault collection installed
#       ansible-galaxy collection install -r ansible/requirements.yml
#   - infisical CLI logged in OR INFISICAL_TOKEN exported
#     (used to fetch the OpenBao root token — AppRole only has read
#     perms, and this playbook needs write for the initial seed)
#
# Usage:
#   ansible-playbook ansible/playbooks/migrate-platform-secrets-to-openbao.yml \
#     --vault-password-file .vault_pass
#
# Or seed one domain at a time for safer roll-forward:
#   --tags platform      just the platform/ paths
#   --tags stores        just the stores/ paths
#   --tags observability
#   --tags cicd
#   --tags flux
#   --tags verify        read-back verification only (no writes)
#
# The playbook is fully idempotent — re-running overwrites with the same
# values (so it's safe to run even after some secrets are already live).

- name: Migrate platform secrets from Ansible Vault into OpenBao
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - "{{ playbook_dir }}/../inventory/group_vars/all/vault.yml"
    - "{{ playbook_dir }}/../inventory/group_vars/all/vars.yml"
    - "{{ playbook_dir }}/../roles/r730xd-openbao/defaults/main.yml"

  vars:
    # CA path on the controller. Operators should copy r730xd's
    # /etc/openbao/tls/ca.crt to one of these locations (or set
    # VAULT_CACERT in the environment).
    openbao_ca_candidates:
      - "{{ lookup('env', 'VAULT_CACERT') | default('', true) }}"
      - "/etc/openbao/tls/ca.crt"
      - "/usr/local/share/ca-certificates/grizzly-platform-openbao-ca.crt"
      - "/usr/local/share/ca-certificates/lab-iac-openbao-ca.crt"

    infisical_auth_env:
      INFISICAL_UNIVERSAL_AUTH_CLIENT_ID: "{{ vault_infisical_openbao_client_id }}"
      INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET: "{{ vault_infisical_openbao_client_secret }}"

    # The migration set. Each entry names the OpenBao path (under
    # secret/grizzly-platform/), the tag-group, and the {key: vault_var} map.
    # `vault_netbird_setup_key` is conditionally skipped if the
    # variable is undefined (older vaults).
    migration_set:
      - path: platform/cloudflare
        tag: platform
        data:
          api_token: "{{ vault_cloudflare_api_token | default('') }}"
      - path: platform/idrac
        tag: platform
        data:
          password: "{{ vault_idrac_password | default('') }}"
      - path: platform/github-app
        tag: platform
        data:
          app_id: "{{ vault_github_app_id | default('') }}"
          installation_id: "{{ vault_github_app_installation_id | default('') }}"
          private_key: "{{ vault_github_app_private_key | default('') }}"
      - path: platform/github-runner
        tag: platform
        data:
          pat: "{{ vault_github_runner_pat | default('') }}"
      - path: stores/postgres
        tag: stores
        data:
          password: "{{ vault_postgres_password | default('') }}"
      - path: stores/kv-cache
        tag: stores
        data:
          password: "{{ vault_kv_cache_password | default('') }}"
      - path: observability/grafana
        tag: observability
        data:
          admin_password: "{{ vault_grafana_admin_password | default('') }}"
      - path: observability/s3-client
        tag: observability
        data:
          access_key: "{{ vault_obs_s3_access_key | default('') }}"
          secret_key: "{{ vault_obs_s3_secret_key | default('') }}"
      - path: observability/discord-webhook
        tag: observability
        data:
          url: "{{ vault_monitoring_discord_webhook_url | default('') }}"
      - path: cicd/sccache-s3
        tag: cicd
        data:
          access_key: "{{ vault_sccache_s3_access_key | default('') }}"
          secret_key: "{{ vault_sccache_s3_secret_key | default('') }}"
      - path: cicd/argo-s3
        tag: cicd
        data:
          access_key: "{{ vault_argo_s3_access_key | default('') }}"
          secret_key: "{{ vault_argo_s3_secret_key | default('') }}"
      - path: flux/discord-webhook
        tag: flux
        data:
          url: "{{ vault_flux_discord_webhook_url | default('') }}"

  pre_tasks:
    - name: Resolve OpenBao CA bundle on the controller
      ansible.builtin.stat:
        path: "{{ item }}"
      loop: "{{ openbao_ca_candidates | select | list }}"
      register: ca_candidate_stats

    - name: Select the first readable CA bundle
      ansible.builtin.set_fact:
        openbao_tls_ca_path: >-
          {{ (ca_candidate_stats.results
              | selectattr('stat.exists', 'equalto', true)
              | map(attribute='stat.path')
              | first) }}

    - name: Fetch OpenBao root token from Infisical
      ansible.builtin.command:
        argv:
          - infisical
          - secrets
          - get
          - "{{ openbao_infisical_root_token_key }}"
          - "--projectId={{ openbao_infisical_project_id }}"
          - "--env={{ openbao_infisical_env }}"
          - --plain
          - --silent
      environment: "{{ infisical_auth_env }}"
      register: openbao_root_fetch
      changed_when: false
      no_log: true

    - name: Set OpenBao admin token
      ansible.builtin.set_fact:
        openbao_admin_token: "{{ openbao_root_fetch.stdout | trim }}"
      no_log: true

    - name: Conditionally add netbird setup key to the migration set
      ansible.builtin.set_fact:
        migration_set: >-
          {{ migration_set + [{
              'path': 'platform/netbird',
              'tag': 'platform',
              'data': {'setup_key': vault_netbird_setup_key}
          }] }}
      when:
        - vault_netbird_setup_key is defined
        - vault_netbird_setup_key | length > 0

  tasks:
    # ------------------------------------------------------------------
    # 1. Write each in-scope secret into secret/grizzly-platform/<path>.
    # ------------------------------------------------------------------
    - name: Write secrets into OpenBao
      community.hashi_vault.vault_kv2_write:
        engine_mount_point: secret
        path: "grizzly-platform/{{ item.path }}"
        data: "{{ item.data }}"
        url: "{{ openbao_api_addr }}"
        ca_cert: "{{ openbao_tls_ca_path }}"
        auth_method: token
        token: "{{ openbao_admin_token }}"
      loop: "{{ migration_set }}"
      loop_control:
        label: "secret/grizzly-platform/{{ item.path }}"
      when: item.tag in ansible_run_tags or ('all' in ansible_run_tags) or (ansible_run_tags | length == 0) or ('verify' not in ansible_run_tags)
      tags:
        - platform
        - stores
        - observability
        - cicd
        - flux
        - all
      no_log: true
      register: migration_writes

    # ------------------------------------------------------------------
    # 2. Read each path back and verify byte-parity with vault.yml.
    # ------------------------------------------------------------------
    - name: Read secrets back from OpenBao for verification
      ansible.builtin.set_fact:
        read_back: "{{ read_back | default({}) | combine({ item.path: lookup('community.hashi_vault.vault_kv2_get', 'grizzly-platform/' ~ item.path, engine_mount_point='secret', url=openbao_api_addr, ca_cert=openbao_tls_ca_path, auth_method='token', token=openbao_admin_token).data.data }) }}"
      loop: "{{ migration_set }}"
      loop_control:
        label: "secret/grizzly-platform/{{ item.path }}"
      tags: [platform, stores, observability, cicd, flux, all, verify]
      no_log: true

    - name: Assert OpenBao values match vault.yml source
      ansible.builtin.assert:
        that:
          - read_back[item.path] == item.data
        fail_msg: >
          Drift detected at secret/grizzly-platform/{{ item.path }}: OpenBao
          stored value does not match vault.yml source.
        quiet: true
      loop: "{{ migration_set }}"
      loop_control:
        label: "secret/grizzly-platform/{{ item.path }}"
      tags: [platform, stores, observability, cicd, flux, all, verify]
      no_log: true

    - name: Summary
      ansible.builtin.debug:
        msg:
          - "=== Platform-secret migration: {{ migration_set | length }} paths ==="
          - "All paths match their vault.yml source."
          - ""
          - "Next: Phase C — flip Ansible consumers to read from OpenBao via"
          - "      ansible/vars/openbao_secrets.yml and the openbao_read_enabled"
          - "      feature flag. See docs/runbooks/secrets-migration.md."
