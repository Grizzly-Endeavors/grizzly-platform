---
# R730xd Full Storage Stack
# Chains: bay resolution → storage-prep → mergerfs → snapraid → nfs-server
#
# Drive bays are defined in inventory (r730xd_drive_bays). The pre_tasks
# resolve bay numbers to OS block devices via iDRAC racadm at runtime.
#
# Prerequisites:
#   - R730xd baseline setup applied (setup-r730xd.yml)
#   - Data drives physically installed and in Non-RAID/JBOD mode via iDRAC
#   - iDRAC accessible at idrac_host with credentials in vault
#
# Usage:
#   ansible-playbook -i ansible/inventory/r730xd.yml ansible/playbooks/r730xd-storage.yml \
#     --vault-password-file .vault_pass -v
#
# After first run:
#   - Run `ssh r730xd 'sudo snapraid sync'` (initial sync takes hours)
#   - Update K8s NFS provisioner to point at <r730xd_ip>:/mnt/pool

- name: R730xd storage stack
  hosts: r730xd
  gather_facts: yes
  become: yes

  vars:
    idrac_ssh_cmd: "sshpass -p {{ idrac_password }} ssh -o StrictHostKeyChecking=no -o LogLevel=ERROR root@{{ idrac_host }}"

  vars_files:
    # OpenBao auth defaults — inert unless openbao_read_enabled is true.
    - "{{ playbook_dir }}/../vars/openbao_auth.yml"

  pre_tasks:
    - name: Load OpenBao-sourced platform secrets
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../vars/openbao_secrets.yml"
      when: openbao_read_enabled | default(false) | bool
      tags: [always]

    - name: Validate drive bay inventory exists
      tags: [always]
      ansible.builtin.assert:
        that:
          - r730xd_drive_bays is defined
          - r730xd_drive_bays | length > 0
        fail_msg: >
          No drive bays defined. Add r730xd_drive_bays to inventory
          (ansible/inventory/r730xd.yml).

    - name: Query iDRAC for physical disk info
      tags: [always]
      ansible.builtin.command: >
        {{ idrac_ssh_cmd }} "racadm storage get pdisks -o"
      delegate_to: localhost
      become: false
      register: idrac_pdisks_raw
      changed_when: false
      no_log: true

    - name: Parse iDRAC disk info into bay→serial mapping
      tags: [always]
      ansible.builtin.set_fact:
        idrac_bay_map: "{{ _bay_map }}"
      vars:
        _bay_map: >-
          {%- set result = {} -%}
          {%- set current_bay = {'value': ''} -%}
          {%- set current_serial = {'value': ''} -%}
          {%- for line in idrac_pdisks_raw.stdout_lines -%}
            {%- if 'Disk.Bay.' in line -%}
              {%- if current_bay.value and current_serial.value -%}
                {%- set _ = result.update({current_bay.value | int: current_serial.value}) -%}
              {%- endif -%}
              {%- set bay_match = line | regex_search('Disk\.Bay\.(\d+):Enclosure') -%}
              {%- if bay_match -%}
                {%- set bay_num = line.split('Disk.Bay.')[1].split(':')[0] -%}
                {%- set _ = current_bay.update({'value': bay_num}) -%}
                {%- set _ = current_serial.update({'value': ''}) -%}
              {%- endif -%}
            {%- elif 'SerialNumber' in line and '=' in line -%}
              {%- set serial = line.split('=')[1] | trim -%}
              {%- set _ = current_serial.update({'value': serial}) -%}
            {%- endif -%}
          {%- endfor -%}
          {%- if current_bay.value and current_serial.value -%}
            {%- set _ = result.update({current_bay.value | int: current_serial.value}) -%}
          {%- endif -%}
          {{ result }}

    - name: Query host block devices
      tags: [always]
      ansible.builtin.command: lsblk -J -b -o NAME,SERIAL,SIZE,TYPE
      register: lsblk_output
      changed_when: false

    - name: Build serial→device mapping from host
      tags: [always]
      ansible.builtin.set_fact:
        serial_to_device: "{{ _serial_map }}"
      vars:
        # Normalize serials: strip spaces and dashes, uppercase
        # iDRAC reports "WD WCC4E6JPH3JT", lsblk reports "WD-WCC4E6JPH3JT"
        _serial_map: >-
          {%- set result = {} -%}
          {%- for dev in (lsblk_output.stdout | from_json).blockdevices -%}
            {%- if dev.type == 'disk' and dev.serial -%}
              {%- set normalized = dev.serial | trim | replace(' ', '') | replace('-', '') | upper -%}
              {%- set _ = result.update({normalized: dev.name}) -%}
            {%- endif -%}
          {%- endfor -%}
          {{ result }}

    - name: Filter inventory to storage drives (exclude ZFS)
      tags: [always]
      ansible.builtin.set_fact:
        storage_drive_bays: "{{ r730xd_drive_bays | rejectattr('role', 'equalto', 'zfs') | list }}"

    - name: Resolve storage drive bays to OS devices
      tags: [always]
      ansible.builtin.set_fact:
        resolved_drives: "{{ _resolved }}"
      vars:
        _resolved: >-
          {%- set result = [] -%}
          {%- for bay_def in storage_drive_bays -%}
            {%- set bay_num = bay_def.bay | int -%}
            {%- set serial = idrac_bay_map.get(bay_num, '') -%}
            {%- if serial -%}
              {%- set normalized = serial | replace(' ', '') | replace('-', '') | upper -%}
              {%- set device = serial_to_device.get(normalized, '') -%}
              {%- if device -%}
                {%- set _ = result.append({
                  'bay': bay_num,
                  'role': bay_def.role,
                  'serial': serial,
                  'device': device
                }) -%}
              {%- endif -%}
            {%- endif -%}
          {%- endfor -%}
          {{ result }}

    - name: Validate all storage bays were resolved
      tags: [always]
      ansible.builtin.assert:
        that:
          - resolved_drives | length == storage_drive_bays | length
        fail_msg: >
          Could not resolve all storage drive bays. Expected {{ storage_drive_bays | length }}
          drives, found {{ resolved_drives | length }}.
          Check that drives are installed, in JBOD mode, and visible to the OS.
          iDRAC bay→serial map: {{ idrac_bay_map }}
          Host serial→device map: {{ serial_to_device }}

    - name: Display resolved drive mapping
      tags: [always]
      ansible.builtin.debug:
        msg: "Bay {{ item.bay }} ({{ item.role }}): serial={{ item.serial }} → /dev/{{ item.device }}"
      loop: "{{ resolved_drives }}"
      loop_control:
        label: "bay{{ item.bay }}"

  roles:
    - role: r730xd-storage-prep
      tags: [storage, storage-prep]
    - role: r730xd-mergerfs
      tags: [storage, mergerfs]
    - role: r730xd-snapraid
      tags: [storage, snapraid]
    - role: r730xd-nfs-server
      tags: [storage, nfs]
