---
# rollback-openbao-migration.yml — Back out of the OpenBao migration.
#
# Use if OpenBao reads or ESO-sourced K8s Secrets start causing issues
# during or after the Phase C/D rollout. Leaves OpenBao itself and its
# seeded secrets in place — just stops consumers from relying on them.
# That way a fix-and-reattempt is a matter of flipping one flag back
# rather than re-seeding everything.
#
# What this does:
#   1. Ansible leg — ensures `openbao_read_enabled=false` globally so
#      playbooks ignore ansible/vars/openbao_secrets.yml and fall back
#      to the still-present vault.yml values.
#   2. Kubernetes leg — scales the ESO controller to 0 replicas so
#      ExternalSecret reconciliation halts. Pre-existing K8s Secret
#      objects stay where they are.
#   3. Re-seeds K8s Secrets from the Ansible vault (re-runs the
#      imperative seed paths) so nothing is left stale. SAFE if the
#      Secret already exists — seed is an upsert.
#
# What this does NOT do:
#   - Does not unseed OpenBao. Deleting secret data in OpenBao is a
#     separate, explicit operator action.
#   - Does not uninstall ESO. The operator (zero-replicas) is enough.
#   - Does not revert the Flux-committed ExternalSecret manifests.
#     Those are source-of-truth; revert via git if rolling back
#     permanently.
#
# Usage:
#   ansible-playbook ansible/playbooks/rollback-openbao-migration.yml \
#     --vault-password-file .vault_pass

- name: Rollback Ansible leg — disable OpenBao reads globally
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    vars_file: "{{ playbook_dir }}/../inventory/group_vars/all/vars.yml"

  tasks:
    - name: Force openbao_read_enabled to false in group_vars
      ansible.builtin.lineinfile:
        path: "{{ vars_file }}"
        regexp: '^openbao_read_enabled:'
        line: "openbao_read_enabled: false"
        state: present

    - name: Confirm
      ansible.builtin.debug:
        msg: >
          openbao_read_enabled=false committed to {{ vars_file }}.
          Future playbook runs will read platform secrets from
          vault.yml, not OpenBao.

- name: Rollback Kubernetes leg — scale ESO controller to 0
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    kubeconfig: "{{ lookup('env', 'HOME') }}/.kube/config"

  tasks:
    - name: Scale external-secrets controller to 0 replicas
      ansible.builtin.command:
        argv:
          - kubectl
          - -n
          - external-secrets
          - scale
          - deployment
          - external-secrets
          - --replicas=0
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: scale_down
      changed_when: "'scaled' in scale_down.stdout"
      failed_when:
        - scale_down.rc != 0
        - "'NotFound' not in scale_down.stderr"

    - name: Wait for ESO pods to terminate
      ansible.builtin.command:
        argv:
          - kubectl
          - -n
          - external-secrets
          - wait
          - --for=delete
          - pod
          - -l
          - app.kubernetes.io/name=external-secrets
          - --timeout=60s
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: wait_delete
      changed_when: false
      failed_when: false

    - name: Note
      ansible.builtin.debug:
        msg: >
          ESO controller scaled to 0. ExternalSecret resources remain
          in the cluster but no longer reconcile. K8s Secret objects
          created by ESO are NOT deleted — the imperative seed paths
          below will overwrite them with fresh vault.yml values.

- name: Re-seed K8s Secrets imperatively from vault.yml
  ansible.builtin.import_playbook: seed-app-secrets.yml

# Skip Play 1 (flux CLI install) + Play 2/3 (bootstrap + pre-flight) — just run
# Play 4, which is tagged github-app-secret. Note this relies on the tag being
# preserved during Phase E cleanup; if that tag was removed, replace this
# import with the relevant kubectl apply equivalents.
- name: Re-seed Flux github-app + discord-webhook secrets
  ansible.builtin.import_playbook: setup-k8s-gitops.yml
  tags: [github-app-secret]
