---
# rotate-openbao-keys.yml — Rotate OpenBao seal material.
#
# Independent rotation flows, each selectable via --tags:
#   --tags rekey              Rotate the unseal keys (5 new shares, threshold 3)
#   --tags root-token         Rotate the root token
#   --tags infisical-identity Rotate the Infisical machine-identity secret
#                             that openbao-auto-unseal.sh uses to fetch keys
#   --tags approle-secret     Rotate the ansible-iac AppRole secret_id
#   --tags k8s-auth-jwt       Rotate the openbao-auth reviewer-JWT the
#                             kubernetes auth method uses to TokenReview
#   (no --tags)               rekey + root-token run together; the others
#                             are explicit-only because they need extra-vars
#                             or cross-host ordering.
#
# Safety:
#   - Every task that touches key material has `no_log: true`.
#   - The playbook verifies the new material can unseal the vault before
#     treating the rotation as successful.
#   - Old root token is revoked at the end of the root-token flow.
#
# Prerequisites:
#   - OpenBao deployed, initialized, and unsealed
#   - Current unseal keys + root token live in Infisical (normal state)
#   - Infisical CLI on the controller is logged in with write access
#     (or INFISICAL_TOKEN exported)
#
# Usage:
#   ansible-playbook -i ansible/inventory \
#     ansible/playbooks/rotate-openbao-keys.yml \
#     --vault-password-file .vault_pass -v
#
# See docs/runbooks/openbao-rotation.md for cadence and verification.

- name: Rotate OpenBao seal material
  hosts: r730xd
  become: true
  gather_facts: false

  vars_files:
    - "{{ playbook_dir }}/../inventory/group_vars/all/vault.yml"
    - "{{ playbook_dir }}/../inventory/group_vars/all/vars.yml"
    # Load role defaults for path/port/naming conventions (this play
    # doesn't apply the role itself).
    - "{{ playbook_dir }}/../roles/r730xd-openbao/defaults/main.yml"

  vars:
    bao_env:
      VAULT_ADDR: "{{ openbao_loopback_addr }}"
      VAULT_CACERT: "{{ openbao_tls_dir }}/ca.crt"
      BAO_ADDR: "{{ openbao_loopback_addr }}"
      BAO_CACERT: "{{ openbao_tls_dir }}/ca.crt"

  pre_tasks:
    - name: Verify Infisical CLI on the controller has write access
      ansible.builtin.command:
        argv:
          - infisical
          - secrets
          - "--projectId={{ openbao_infisical_project_id }}"
          - "--env={{ openbao_infisical_env }}"
      delegate_to: localhost
      become: false
      changed_when: false

    - name: Verify vault is unsealed
      ansible.builtin.command:
        argv: ["{{ openbao_cli_install_dir }}/bao", "status", "-format=json"]
      environment: "{{ bao_env }}"
      register: rotate_status
      changed_when: false
      failed_when:
        - rotate_status.rc != 0
        - "'Sealed' not in rotate_status.stdout"

    - name: Assert vault is initialized + unsealed
      ansible.builtin.assert:
        that:
          - (rotate_status.stdout | from_json).initialized
          - not (rotate_status.stdout | from_json).sealed
        fail_msg: >
          OpenBao must be initialized and unsealed before rotation.
          Check `bao status` on r730xd.

  tasks:
    # =================================================================
    # Rekey unseal keys (default flow)
    # =================================================================
    - name: Rekey unseal keys
      tags: [rekey]
      block:
        - name: Fetch current unseal keys from Infisical
          ansible.builtin.command:
            argv:
              - infisical
              - secrets
              - get
              - "{{ openbao_infisical_unseal_key_prefix }}{{ idx + 1 }}"
              - "--projectId={{ openbao_infisical_project_id }}"
              - "--env={{ openbao_infisical_env }}"
              - --plain
              - --silent
          delegate_to: localhost
          become: false
          loop: "{{ range(0, openbao_unseal_threshold | int) | list }}"
          loop_control:
            loop_var: idx
          register: rekey_current_keys
          changed_when: false
          no_log: true

        - name: Start rekey operation
          ansible.builtin.command:
            argv:
              - "{{ openbao_cli_install_dir }}/bao"
              - operator
              - rekey
              - -init
              - "-key-shares={{ openbao_unseal_shares }}"
              - "-key-threshold={{ openbao_unseal_threshold }}"
              - -format=json
          environment: "{{ bao_env }}"
          register: rekey_init
          changed_when: true
          no_log: true

        - name: Capture rekey nonce
          ansible.builtin.set_fact:
            rekey_nonce: "{{ (rekey_init.stdout | from_json).nonce }}"
          no_log: true

        - name: Submit rekey shares
          ansible.builtin.command:
            argv:
              - "{{ openbao_cli_install_dir }}/bao"
              - operator
              - rekey
              - "-nonce={{ rekey_nonce }}"
              - -format=json
              - "{{ item.stdout }}"
          environment: "{{ bao_env }}"
          loop: "{{ rekey_current_keys.results }}"
          loop_control:
            label: "share {{ ansible_loop.index }}"
            extended: true
          register: rekey_submit
          changed_when: true
          no_log: true

        - name: Parse new unseal keys
          ansible.builtin.set_fact:
            rekey_new_keys: >-
              {{ (rekey_submit.results[-1].stdout | from_json).keys_base64 }}
          no_log: true

        - name: Push new unseal shares to Infisical
          ansible.builtin.command:
            argv:
              - infisical
              - secrets
              - set
              - "--projectId={{ openbao_infisical_project_id }}"
              - "--env={{ openbao_infisical_env }}"
              - "--type=shared"
              - "{{ openbao_infisical_unseal_key_prefix }}{{ idx + 1 }}={{ rekey_new_keys[idx] }}"
          delegate_to: localhost
          become: false
          loop: "{{ range(0, openbao_unseal_shares | int) | list }}"
          loop_control:
            loop_var: idx
          register: rekey_push
          changed_when: true
          no_log: true

        - name: Seal vault (force re-unseal to prove new keys work)
          ansible.builtin.command:
            argv: ["{{ openbao_cli_install_dir }}/bao", "operator", "seal"]
          environment: "{{ bao_env }}"
          changed_when: true

        - name: Trigger auto-unseal with new keys
          ansible.builtin.systemd_service:
            name: "{{ openbao_unseal_unit_name }}"
            state: restarted

        - name: Wait for vault to unseal with new keys
          ansible.builtin.command:
            argv: ["{{ openbao_cli_install_dir }}/bao", "status", "-format=json"]
          environment: "{{ bao_env }}"
          register: rekey_verify
          changed_when: false
          retries: 20
          delay: 3
          until: >
            rekey_verify.rc == 0
            and not (rekey_verify.stdout | from_json).sealed

        - name: Remind operator to update out-of-band copies
          ansible.builtin.debug:
            msg: >
              Unseal keys rotated. The OLD keys are now invalid. Update
              any out-of-band copies (password manager) with the new
              values from Infisical.

    # =================================================================
    # Rotate root token
    # =================================================================
    - name: Rotate root token
      tags: [root-token]
      block:
        - name: Fetch current unseal keys from Infisical
          ansible.builtin.command:
            argv:
              - infisical
              - secrets
              - get
              - "{{ openbao_infisical_unseal_key_prefix }}{{ idx + 1 }}"
              - "--projectId={{ openbao_infisical_project_id }}"
              - "--env={{ openbao_infisical_env }}"
              - --plain
              - --silent
          delegate_to: localhost
          become: false
          loop: "{{ range(0, openbao_unseal_threshold | int) | list }}"
          loop_control:
            loop_var: idx
          register: root_rotate_keys
          changed_when: false
          no_log: true

        - name: Fetch current root token from Infisical
          ansible.builtin.command:
            argv:
              - infisical
              - secrets
              - get
              - "{{ openbao_infisical_root_token_key }}"
              - "--projectId={{ openbao_infisical_project_id }}"
              - "--env={{ openbao_infisical_env }}"
              - --plain
              - --silent
          delegate_to: localhost
          become: false
          register: root_rotate_old_token
          changed_when: false
          no_log: true

        - name: Start generate-root operation
          ansible.builtin.command:
            argv:
              - "{{ openbao_cli_install_dir }}/bao"
              - operator
              - generate-root
              - -init
              - -format=json
          environment: "{{ bao_env }}"
          register: root_rotate_init
          changed_when: true
          no_log: true

        - name: Capture generate-root nonce + OTP
          ansible.builtin.set_fact:
            root_rotate_nonce: "{{ (root_rotate_init.stdout | from_json).nonce }}"
            root_rotate_otp: "{{ (root_rotate_init.stdout | from_json).otp }}"
          no_log: true

        - name: Submit unseal shares to generate-root
          ansible.builtin.command:
            argv:
              - "{{ openbao_cli_install_dir }}/bao"
              - operator
              - generate-root
              - "-nonce={{ root_rotate_nonce }}"
              - -format=json
              - "{{ item.stdout }}"
          environment: "{{ bao_env }}"
          loop: "{{ root_rotate_keys.results }}"
          loop_control:
            label: "share {{ ansible_loop.index }}"
            extended: true
          register: root_rotate_submit
          changed_when: true
          no_log: true

        - name: Capture encoded new root token
          ansible.builtin.set_fact:
            root_rotate_encoded: >-
              {{ (root_rotate_submit.results[-1].stdout | from_json).encoded_token }}
          no_log: true

        - name: Decode new root token
          ansible.builtin.command:
            argv:
              - "{{ openbao_cli_install_dir }}/bao"
              - operator
              - generate-root
              - "-decode={{ root_rotate_encoded }}"
              - "-otp={{ root_rotate_otp }}"
          environment: "{{ bao_env }}"
          register: root_rotate_decode
          changed_when: true
          no_log: true

        - name: Push new root token to Infisical
          ansible.builtin.command:
            argv:
              - infisical
              - secrets
              - set
              - "--projectId={{ openbao_infisical_project_id }}"
              - "--env={{ openbao_infisical_env }}"
              - "--type=shared"
              - "{{ openbao_infisical_root_token_key }}={{ root_rotate_decode.stdout | trim }}"
          delegate_to: localhost
          become: false
          changed_when: true
          no_log: true

        - name: Revoke old root token
          ansible.builtin.command:
            argv:
              - "{{ openbao_cli_install_dir }}/bao"
              - token
              - revoke
              - "{{ root_rotate_old_token.stdout | trim }}"
          environment:
            VAULT_ADDR: "{{ openbao_loopback_addr }}"
            VAULT_CACERT: "{{ openbao_tls_dir }}/ca.crt"
            BAO_ADDR: "{{ openbao_loopback_addr }}"
            BAO_CACERT: "{{ openbao_tls_dir }}/ca.crt"
            VAULT_TOKEN: "{{ root_rotate_decode.stdout | trim }}"
            BAO_TOKEN: "{{ root_rotate_decode.stdout | trim }}"
          register: root_rotate_revoke
          changed_when: "'Success' in root_rotate_revoke.stdout"
          no_log: true

    # =================================================================
    # Rotate Infisical machine-identity secret (hands-on)
    # =================================================================
    # This flow does NOT run under --tags all, because it requires the
    # operator to have already minted a new client_secret in the
    # Infisical UI (or via `infisical identities universal-auth
    # client-secret create`). The new secret must be supplied via
    # `--extra-vars openbao_infisical_new_client_secret=...`.
    - name: Rotate Infisical machine-identity secret
      tags: [infisical-identity]
      block:
        - name: Require the new client_secret as extra-var
          ansible.builtin.assert:
            that:
              - openbao_infisical_new_client_secret is defined
              - openbao_infisical_new_client_secret | length > 0
            fail_msg: >
              Provide the new client_secret via
              --extra-vars openbao_infisical_new_client_secret=<secret>
              (mint it in the Infisical UI first).

        - name: Render new infisical-auth.env
          ansible.builtin.template:
            src: infisical-auth.env.j2
            dest: "{{ openbao_infisical_auth_env_file }}"
            owner: root
            group: root
            mode: "0600"
          vars:
            openbao_infisical_client_secret: "{{ openbao_infisical_new_client_secret }}"
          no_log: true

        - name: Trigger auto-unseal to verify the new secret
          ansible.builtin.systemd_service:
            name: "{{ openbao_unseal_unit_name }}"
            state: restarted

        - name: Wait for auto-unseal to succeed
          ansible.builtin.command:
            argv: ["{{ openbao_cli_install_dir }}/bao", "status", "-format=json"]
          environment: "{{ bao_env }}"
          register: identity_rotate_verify
          changed_when: false
          retries: 20
          delay: 3
          until: >
            identity_rotate_verify.rc == 0
            and not (identity_rotate_verify.stdout | from_json).sealed

        - name: Reminder to revoke old client_secret
          ansible.builtin.debug:
            msg: >
              New Infisical client_secret is live. REVOKE the old secret
              in the Infisical UI now — until you do, the old value is
              still a valid path to the unseal keys.

        - name: Reminder to update vault.yml
          ansible.builtin.debug:
            msg: >
              Update vault_infisical_openbao_client_secret in
              group_vars/all/vault.yml with the new value (via
              `ansible-vault edit`) so future role applies don't
              overwrite the rotated secret.

# =================================================================
# AppRole secret_id rotation + Kubernetes reviewer-JWT rotation.
# These run from localhost because they're consumer-side — the
# approle-secret flow hits the Ansible vault and the k8s-auth-jwt
# flow drives kubectl. Separated into their own play so the tags
# selection doesn't accidentally run them as part of the default
# rekey+root-token flow.
# =================================================================
- name: Rotate Ansible AppRole secret_id
  hosts: localhost
  connection: local
  gather_facts: false
  tags: [approle-secret, never]

  tasks:
    - name: Run the AppRole helper to mint a fresh secret_id
      ansible.builtin.command:
        argv:
          - "{{ playbook_dir }}/../../scripts/set-openbao-approle-secrets.sh"
      register: approle_rotate
      changed_when: "'done' in approle_rotate.stdout"
      # Script handles its own logging; surface stdout/stderr to the
      # operator via the -v flag as normal.
      no_log: false

    - name: Remind operator to revoke old secret_ids
      ansible.builtin.debug:
        msg: >
          New secret_id landed in vault.yml. The OLD secret_id is still
          valid until you revoke it:
            bao list -format=json auth/approle/role/ansible-iac/secret-id
            bao delete auth/approle/role/ansible-iac/secret-id-accessor/<accessor>

- name: Rotate Kubernetes reviewer-JWT
  hosts: localhost
  connection: local
  gather_facts: false
  tags: [k8s-auth-jwt, never]

  vars_files:
    - "{{ playbook_dir }}/../inventory/group_vars/all/vault.yml"
    - "{{ playbook_dir }}/../inventory/group_vars/all/vars.yml"
    - "{{ playbook_dir }}/../roles/r730xd-openbao/defaults/main.yml"

  vars:
    kubeconfig: "{{ lookup('env', 'KUBECONFIG') | default(lookup('env', 'HOME') ~ '/.kube/config', true) }}"
    eso_namespace: "external-secrets"
    openbao_auth_token_secret: "openbao-auth-token"

  tasks:
    # Force K8s to regenerate the reviewer JWT by deleting its Secret;
    # kubectl apply re-creates it, and K8s populates a fresh `.data.token`.
    # The downstream setup-openbao-k8s-auth.yml then re-reads the new
    # token and overwrites auth/kubernetes/config.
    - name: Delete existing openbao-auth-token Secret
      ansible.builtin.command:
        argv:
          - kubectl
          - -n
          - "{{ eso_namespace }}"
          - delete
          - secret
          - "{{ openbao_auth_token_secret }}"
          - --ignore-not-found
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      changed_when: true

    - name: Re-apply external-secrets manifests (recreates the Secret)
      ansible.builtin.command:
        argv:
          - kubectl
          - apply
          - -k
          - "{{ playbook_dir }}/../../kubernetes/infrastructure/external-secrets"
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      changed_when: true

    - name: Re-run kubernetes auth configuration
      ansible.builtin.command:
        argv:
          - ansible-playbook
          - "{{ playbook_dir }}/setup-openbao-k8s-auth.yml"
          - --vault-password-file
          - "{{ playbook_dir }}/../../.vault_pass"
      register: reconfig
      changed_when: true
