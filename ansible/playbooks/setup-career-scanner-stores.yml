---
# setup-career-scanner-stores.yml — foundation-side provisioning for the
# career-scanner first-party app (source + deploy chart live in the
# career-scanner repo, registered under kubernetes/apps/, applied by Flux).
#
# career-scanner rides the shared foundation stores exactly like Nextcloud
# (ADR-038): a dedicated non-superuser Postgres role/DB and a scoped MinIO
# bulk bucket. This playbook provisions the two foundation resources:
#
#   Play 1  The `career_scanner` database + login role on the foundation
#           PostgreSQL. The role OWNS its DB and nothing else; the app applies
#           its own migrations (incl. FORCE ROW LEVEL SECURITY) at startup.
#   Play 2  The `career-scanner` bucket + a scoped MinIO user on the bulk
#           instance, used for write-once page snapshots + LLM transcripts.
#
# Credentials come from OpenBao secret/grizzly-platform/stores/career-scanner
# (db_password, s3_access_key, s3_secret_key) — provisioned here, and read
# cross-domain by career-scanner's K8s ExternalSecret. Kept under
# grizzly-platform/ rather than a lab-apps/ path because the
# ansible-platform-read AppRole policy only grants grizzly-platform/* (mirrors
# the nextcloud + authentik foundation roles).
#
# Prerequisites:
#   - Foundation Postgres + MinIO bulk running (deploy-foundation-stores.yml).
#   - The `minio-bulk` mc alias configured on the control node (jumpbox).
#   - OpenBao seeded: secret/grizzly-platform/stores/career-scanner with keys
#     db_password, s3_access_key, s3_secret_key. Generate db_password WITHOUT
#     single quotes (e.g. `openssl rand -base64 36`).
#
# Usage (DEFAULT inventory — Play 2 runs on localhost with the mc alias):
#   ansible-playbook ansible/playbooks/setup-career-scanner-stores.yml \
#     --vault-password-file .vault_pass -v
#
# Run just one half:
#   ... --tags db
#   ... --tags s3

- name: Provision career-scanner database on foundation Postgres
  hosts: r730xd
  become: yes
  gather_facts: no
  tags: [db]

  # The career_scanner role password lives only in OpenBao (no static vault.yml
  # fallback), so this play always reads from OpenBao.
  vars:
    openbao_read_enabled: true

  vars_files:
    - "{{ playbook_dir }}/../vars/openbao_auth.yml"

  pre_tasks:
    - name: Load OpenBao-sourced platform secrets
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../vars/openbao_secrets.yml"

    - name: Verify foundation Postgres container is running
      ansible.builtin.command: docker exec foundation-postgres pg_isready -U postgres
      changed_when: false

  tasks:
    # psql -U postgres connects over the container's local socket (trust auth) —
    # no superuser password needed. The role password is passed via psql's
    # :'pw' literal (safe quoting); the SQL is fed on stdin (docker exec -i),
    # because psql only interpolates variables for stdin/-f input, NOT for -c.
    - name: Check whether the career_scanner role exists
      ansible.builtin.command: >-
        docker exec foundation-postgres
        psql -U postgres -tAc
        "SELECT 1 FROM pg_roles WHERE rolname='career_scanner'"
      register: cs_role
      changed_when: false

    - name: Create the career_scanner login role
      ansible.builtin.shell:
        cmd: >-
          set -o pipefail;
          printf "CREATE ROLE career_scanner LOGIN PASSWORD :'pw';\n"
          | docker exec -i foundation-postgres
          psql -U postgres -v ON_ERROR_STOP=1 -v pw="$PGPW"
        executable: /bin/bash
      environment:
        PGPW: "{{ vault_career_scanner_db_password }}"
      when: cs_role.stdout != "1"
      no_log: true

    - name: Keep the career_scanner role password in sync with OpenBao
      ansible.builtin.shell:
        cmd: >-
          set -o pipefail;
          printf "ALTER ROLE career_scanner LOGIN PASSWORD :'pw';\n"
          | docker exec -i foundation-postgres
          psql -U postgres -v ON_ERROR_STOP=1 -v pw="$PGPW"
        executable: /bin/bash
      environment:
        PGPW: "{{ vault_career_scanner_db_password }}"
      no_log: true
      changed_when: false

    - name: Check whether the career_scanner database exists
      ansible.builtin.command: >-
        docker exec foundation-postgres
        psql -U postgres -tAc
        "SELECT 1 FROM pg_database WHERE datname='career_scanner'"
      register: cs_db
      changed_when: false

    - name: Create the career_scanner database owned by the career_scanner role
      ansible.builtin.command: >-
        docker exec foundation-postgres
        psql -U postgres -v ON_ERROR_STOP=1
        -c "CREATE DATABASE career_scanner OWNER career_scanner"
      when: cs_db.stdout != "1"

- name: Provision career-scanner S3 bucket and scoped user on MinIO bulk
  hosts: localhost
  connection: local
  gather_facts: no
  tags: [s3]

  vars:
    openbao_read_enabled: true

  vars_files:
    - "{{ playbook_dir }}/../inventory/group_vars/all/vault.yml"
    - "{{ playbook_dir }}/../inventory/group_vars/all/vars.yml"
    - "{{ playbook_dir }}/../inventory/group_vars/all/network.yml"
    - "{{ playbook_dir }}/../vars/openbao_auth.yml"

  pre_tasks:
    - name: Load OpenBao-sourced platform secrets
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../vars/openbao_secrets.yml"

  tasks:
    - name: Verify career-scanner S3 credentials are present in OpenBao
      ansible.builtin.assert:
        that:
          - vault_career_scanner_s3_access_key is defined and vault_career_scanner_s3_access_key | length > 0
          - vault_career_scanner_s3_secret_key is defined and vault_career_scanner_s3_secret_key | length > 0
        fail_msg: >
          secret/grizzly-platform/stores/career-scanner must define s3_access_key
          and s3_secret_key. Seed OpenBao before running this play.
        success_msg: "career-scanner S3 credentials are set"

    - name: Ensure the career-scanner bucket exists on MinIO bulk
      ansible.builtin.command: mc mb --ignore-existing minio-bulk/career-scanner
      changed_when: false
      failed_when: false

    - name: Create the career-scanner MinIO user on the bulk instance
      ansible.builtin.shell: |
        mc admin user add minio-bulk \
          "{{ vault_career_scanner_s3_access_key }}" \
          "{{ vault_career_scanner_s3_secret_key }}" 2>&1 || true
      changed_when: false
      no_log: true

    - name: Grant the career-scanner user readwrite access to its bucket
      ansible.builtin.shell: |
        cat <<'EOF' | mc admin policy create minio-bulk career-scanner-rw /dev/stdin
        {
          "Version": "2012-10-17",
          "Statement": [{
            "Effect": "Allow",
            "Action": ["s3:*"],
            "Resource": [
              "arn:aws:s3:::career-scanner",
              "arn:aws:s3:::career-scanner/*"
            ]
          }]
        }
        EOF
        mc admin policy attach minio-bulk career-scanner-rw --user "{{ vault_career_scanner_s3_access_key }}"
      changed_when: false
      no_log: true
