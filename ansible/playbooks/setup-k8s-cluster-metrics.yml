---
# K8s Cluster Metrics & Dashboards (Phase 2.5 of cluster standup)
#
# Extends Prometheus scraping to kubelet, Cilium, Hubble, and kube-state-metrics
# on all K8s nodes. Adds alert rules and a Grafana dashboard.
#
# Prerequisites:
#   - Phase 1 + 2 complete (control plane + workers joined)
#   - Prometheus bearer token + CA cert already on R730xd (from Phase 1)
#
# Usage:
#   ansible-playbook ansible/playbooks/setup-k8s-cluster-metrics.yml
#
# Verification (run from jumpbox):
#   curl -s 'http://10.0.0.200:9090/api/v1/targets' | \
#     jq '[.data.activeTargets[] | select(.scrapePool | test("kubelet|cilium|hubble|kube-state"))]'
#
# See: docs/runbooks/k8s-cluster-ops.md

# ============================================================
# Play 1: Deploy kube-state-metrics & expand RBAC
# ============================================================
# kube-state-metrics provides kube_node_status_condition (for NodeNotReady alert),
# pod counts, and resource allocation metrics for the Grafana dashboard.
# RBAC expansion grants the existing Prometheus SA access to kubelet /metrics.
- name: Deploy kube-state-metrics and expand Prometheus RBAC
  hosts: k8s_control_plane
  gather_facts: no

  vars:
    kubeconfig: "{{ lookup('env', 'HOME') }}/.kube/config"

  tasks:
    - name: Add prometheus-community Helm repo
      ansible.builtin.command: helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
      delegate_to: localhost
      become: no
      register: helm_repo_add
      changed_when: "'has been added' in helm_repo_add.stdout"
      failed_when: helm_repo_add.rc != 0 and 'already exists' not in helm_repo_add.stderr
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Update Helm repos
      ansible.builtin.command: helm repo update prometheus-community
      delegate_to: localhost
      become: no
      changed_when: false
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Install kube-state-metrics via Helm
      ansible.builtin.command: >
        helm upgrade --install kube-state-metrics
        prometheus-community/kube-state-metrics
        --namespace kube-system
        --set image.tag=v2.14.0
        --set service.type=NodePort
        --set service.nodePort=30080
        --set resources.requests.memory=64Mi
        --set resources.limits.memory=128Mi
        --wait --timeout=120s
      delegate_to: localhost
      become: no
      register: ksm_install
      changed_when: "'STATUS: deployed' in ksm_install.stdout"
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Verify kube-state-metrics is running
      ansible.builtin.command: >
        kubectl get pods -n kube-system
        -l app.kubernetes.io/name=kube-state-metrics
        -o jsonpath='{.items[0].status.phase}'
      delegate_to: localhost
      become: no
      register: ksm_status
      until: ksm_status.stdout == "Running"
      retries: 10
      delay: 5
      changed_when: false
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Expand ClusterRole for kubelet metrics access
      ansible.builtin.shell: |
        cat <<'EOF' | kubectl apply -f -
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        metadata:
          name: prometheus-metrics-reader
        rules:
          - nonResourceURLs:
              - /metrics
            verbs:
              - get
          - apiGroups:
              - ""
            resources:
              - nodes
              - nodes/metrics
              - nodes/proxy
            verbs:
              - get
              - list
          # Pod discovery for kubernetes_sd (e.g. the cilium-operator scrape,
          # which floats across nodes). List/watch only — no pod read/exec.
          - apiGroups:
              - ""
            resources:
              - pods
            verbs:
              - list
              - watch
        EOF
      delegate_to: localhost
      become: no
      changed_when: false
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Verify RBAC grants kubelet metrics access
      ansible.builtin.command: >
        kubectl auth can-i get nodes/metrics
        --as=system:serviceaccount:kube-system:prometheus-metrics
      delegate_to: localhost
      become: no
      register: rbac_check
      failed_when: rbac_check.stdout != "yes"
      changed_when: false
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

# ============================================================
# Play 2: Deploy Prometheus target files on R730xd
# ============================================================
- name: Deploy K8s metrics target files
  hosts: r730xd
  gather_facts: no

  vars:
    prometheus_compose_dir: "/opt/observability/prometheus"

  tasks:
    - name: Template kubelet targets
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/r730xd-prometheus/templates/targets.d/k8s-kubelet.yml.j2"
        dest: "{{ prometheus_compose_dir }}/targets.d/k8s-kubelet.yml"
        mode: "0644"
      become: yes

    - name: Template Cilium agent targets
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/r730xd-prometheus/templates/targets.d/k8s-cilium-agent.yml.j2"
        dest: "{{ prometheus_compose_dir }}/targets.d/k8s-cilium-agent.yml"
        mode: "0644"
      become: yes

    # Cilium operator is now discovered via kubernetes_sd in prometheus.yml
    # (it floats across nodes); no static file_sd target. Remove any stale one.
    - name: Remove obsolete static Cilium operator target
      ansible.builtin.file:
        path: "{{ prometheus_compose_dir }}/targets.d/k8s-cilium-operator.yml"
        state: absent
      become: yes

    - name: Template Hubble targets
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/r730xd-prometheus/templates/targets.d/k8s-hubble.yml.j2"
        dest: "{{ prometheus_compose_dir }}/targets.d/k8s-hubble.yml"
        mode: "0644"
      become: yes

    - name: Template kube-state-metrics target
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/r730xd-prometheus/templates/targets.d/k8s-kube-state-metrics.yml.j2"
        dest: "{{ prometheus_compose_dir }}/targets.d/k8s-kube-state-metrics.yml"
        mode: "0644"
      become: yes

# ============================================================
# Play 3: Update Prometheus config and alert rules
# ============================================================
- name: Update Prometheus configuration with K8s cluster metrics
  hosts: r730xd
  gather_facts: no

  vars_files:
    - "{{ playbook_dir }}/../roles/r730xd-prometheus/defaults/main.yml"

  tasks:
    - name: Set K8s apiserver target for Prometheus
      ansible.builtin.set_fact:
        prometheus_k8s_apiserver_target: "{{ dell_inspiron_ip }}:6443"

    - name: Re-template Prometheus configuration
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/r730xd-prometheus/templates/prometheus.yml.j2"
        dest: "/opt/observability/prometheus/prometheus.yml"
        mode: "0644"
      become: yes
      register: prom_config

    - name: Re-template Prometheus docker-compose
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/r730xd-prometheus/templates/docker-compose.yml.j2"
        dest: "/opt/observability/prometheus/docker-compose.yml"
        mode: "0644"
      become: yes
      register: prom_compose

    - name: Re-template alert rules with Phase 2.5 alerts
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/r730xd-prometheus/templates/rules/grizzly-platform.yml.j2"
        dest: "/opt/observability/prometheus/rules/grizzly-platform.yml"
        mode: "0644"
      become: yes
      register: prom_rules

    # Recreate rather than reload — /-/reload doesn't pick up TLS config changes
    - name: Recreate Prometheus container if config changed
      ansible.builtin.command: docker compose up -d --force-recreate prometheus
      args:
        chdir: /opt/observability/prometheus
      become: yes
      when: prom_config is changed or prom_compose is changed or prom_rules is changed

# ============================================================
# Play 4: Deploy Grafana dashboard
# ============================================================
- name: Deploy K8s cluster Grafana dashboard
  hosts: r730xd
  gather_facts: no

  vars:
    grafana_compose_dir: "/opt/observability/grafana"

  tasks:
    - name: Copy K8s cluster dashboard
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../roles/r730xd-grafana/files/dashboards/k8s-cluster.json"
        dest: "{{ grafana_compose_dir }}/dashboards/k8s-cluster.json"
        mode: "0644"
      become: yes
      # Grafana auto-provisions dashboards every 30s — no restart needed

# ============================================================
# Play 5: Verify new metrics targets
# ============================================================
- name: Verify K8s cluster metrics targets
  hosts: r730xd
  gather_facts: no

  tasks:
    - name: Wait for Prometheus to scrape new targets
      ansible.builtin.pause:
        seconds: 20

    - name: Check kubelet targets
      ansible.builtin.uri:
        url: "http://localhost:9090/api/v1/query?query=up{job='kubelet'}"
        return_content: yes
      register: kubelet_check

    - name: Check Cilium agent targets
      ansible.builtin.uri:
        url: "http://localhost:9090/api/v1/query?query=up{job='cilium-agent'}"
        return_content: yes
      register: cilium_agent_check

    - name: Check kube-state-metrics targets
      ansible.builtin.uri:
        url: "http://localhost:9090/api/v1/query?query=up{job='kube-state-metrics'}"
        return_content: yes
      register: ksm_check

    - name: Check alert rules loaded
      ansible.builtin.uri:
        url: "http://localhost:9090/api/v1/rules"
        return_content: yes
      register: rules_check

    - name: Display verification summary
      ansible.builtin.debug:
        msg:
          - "=== Phase 2.5 — K8s Cluster Metrics Complete ==="
          - ""
          - "Scrape targets:"
          - "  kubelet:            {{ kubelet_check.json.data.result | length }}/4 nodes responding"
          - "  cilium-agent:       {{ cilium_agent_check.json.data.result | length }}/4 nodes responding"
          - "  kube-state-metrics: {{ ksm_check.json.data.result | length }}/1 instances responding"
          - ""
          - "New scrape jobs: kubelet, cilium-agent, cilium-operator, hubble, kube-state-metrics"
          - "New alert rules: NodeNotReady, KubeletDown, CiliumAgentDown"
          - "Grafana dashboard: K8s Cluster (uid: k8s-cluster)"
