---
# K8s Container Runtime Setup
# Installs containerd, kernel modules, sysctl, and CNI plugins on all K8s nodes.
# Run AFTER setup-k8s-worker.yml and BEFORE kubeadm init/join.
#
# Usage:
#   ansible-playbook -i ansible/inventory -l k8s_cluster ansible/playbooks/setup-k8s-containerd.yml -v
#   ansible-playbook -i ansible/inventory -l dell-inspiron-15 ansible/playbooks/setup-k8s-containerd.yml -v

- name: Install container runtime for Kubernetes
  hosts: k8s_cluster
  gather_facts: yes
  become: yes
  vars:
    network_interface: "{{ ansible_facts['default_ipv4']['interface'] }}"
  roles:
    - k8s-containerd
