---
# K8s GitOps Foundation (Phase 4 of cluster standup)
#
# Bootstraps Flux CD for declarative cluster management. All future cluster
# workloads are deployed via git — Flux watches kubernetes/ and reconciles.
#
# Prerequisites:
#   - Phases 1-3 complete (control plane + workers + storage)
#   - GITHUB_TOKEN env var set (fine-grained PAT on grizzly-endeavors org:
#     Contents R/W + Administration R/W) — only required for re-bootstrap
#   - vault_flux_discord_webhook_url set in vault.yml
#   - GitHub App credentials in vault (for Phase 7a onwards — Flux runtime auth):
#       vault_github_app_id
#       vault_github_app_installation_id
#       vault_github_app_private_key (multiline PEM)
#
# Usage:
#   Full run (bootstrap + secrets):
#     GITHUB_TOKEN=ghp_... ansible-playbook ansible/playbooks/setup-k8s-gitops.yml
#
#   Seed/rotate GitHub App secret only (no bootstrap):
#     ansible-playbook ansible/playbooks/setup-k8s-gitops.yml --tags github-app-secret
#
# Verification (run from jumpbox):
#   flux check
#   flux get all
#   kubectl get ds -n monitoring
#   logcli query '{namespace="flux-system"}' --limit=5
#
# See: docs/runbooks/k8s-cluster-ops.md
# ADRs: 014 (Flux CD chosen for CLI-first GitOps), 020 (per-repo app delivery)

# ============================================================
# Play 1: Install Flux CLI
# ============================================================
- name: Install Flux CLI
  hosts: localhost
  connection: local
  gather_facts: yes

  vars:
    flux_version: "2.7.5"

  tasks:
    - name: Check if flux CLI is installed
      ansible.builtin.command: flux version --client
      register: flux_check
      failed_when: false
      changed_when: false

    - name: Download and install Flux CLI
      when: flux_check.rc != 0 or ('v' + flux_version) not in (flux_check.stdout | default(''))
      block:
        - name: Download Flux CLI
          ansible.builtin.get_url:
            url: "https://github.com/fluxcd/flux2/releases/download/v{{ flux_version }}/flux_{{ flux_version }}_linux_amd64.tar.gz"
            dest: "/tmp/flux_{{ flux_version }}.tar.gz"
            mode: "0644"

        - name: Extract Flux CLI
          ansible.builtin.unarchive:
            src: "/tmp/flux_{{ flux_version }}.tar.gz"
            dest: /usr/local/bin
            remote_src: yes
            include: ["flux"]
          become: yes

        - name: Clean up tarball
          ansible.builtin.file:
            path: "/tmp/flux_{{ flux_version }}.tar.gz"
            state: absent

    - name: Verify Flux CLI version
      ansible.builtin.command: flux version --client
      changed_when: false
      register: flux_version_check

    - name: Display Flux CLI version
      ansible.builtin.debug:
        msg: "{{ flux_version_check.stdout }}"

# ============================================================
# Play 2: Pre-flight checks
# ============================================================
- name: Pre-flight checks
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    kubeconfig: "{{ lookup('env', 'HOME') }}/.kube/config"

  tasks:
    - name: Verify GITHUB_TOKEN is set
      ansible.builtin.assert:
        that: lookup('env', 'GITHUB_TOKEN') | length > 0
        fail_msg: >
          GITHUB_TOKEN env var is not set. Export a GitHub PAT with
          Contents (R/W) + Administration (R/W) permissions before running.
        success_msg: "GITHUB_TOKEN is set"

    - name: Run flux pre-checks
      ansible.builtin.command: flux check --pre
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      changed_when: false

# ============================================================
# Play 3: Bootstrap Flux CD
# ============================================================
- name: Bootstrap Flux CD
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    kubeconfig: "{{ lookup('env', 'HOME') }}/.kube/config"

  tasks:
    - name: Bootstrap Flux with GitHub
      ansible.builtin.command: >
        flux bootstrap github
        --owner=grizzly-endeavors
        --repository=grizzly-platform
        --branch=master
        --path=kubernetes/clusters/grizzly-platform
        --reconcile
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
        GITHUB_TOKEN: "{{ lookup('env', 'GITHUB_TOKEN') }}"
      register: flux_bootstrap
      # Bootstrap is idempotent — always reports changes on first run
      changed_when: "'all components are healthy' in flux_bootstrap.stderr"

    - name: Display bootstrap output
      ansible.builtin.debug:
        msg: "{{ flux_bootstrap.stderr_lines | default([]) }}"

    - name: Wait for Flux controllers to be ready
      ansible.builtin.command: >
        kubectl wait --for=condition=Ready pods --all
        -n flux-system --timeout=120s
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      changed_when: false

    - name: Run flux check
      ansible.builtin.command: flux check
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      changed_when: false
      register: flux_check_result

    - name: Display flux check result
      ansible.builtin.debug:
        msg: "{{ flux_check_result.stdout_lines }}"

# ============================================================
# Play 4: Create notification secret and metrics services
# ============================================================
- name: Create Flux notification secret and metrics services
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    kubeconfig: "{{ lookup('env', 'HOME') }}/.kube/config"

  vars_files:
    - "{{ playbook_dir }}/../../ansible/inventory/group_vars/all/vault.yml"
    - "{{ playbook_dir }}/../../ansible/inventory/group_vars/all/vars.yml"
    # OpenBao auth defaults — inert unless openbao_read_enabled is true.
    - "{{ playbook_dir }}/../vars/openbao_auth.yml"

  pre_tasks:
    - name: Load OpenBao-sourced platform secrets
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../vars/openbao_secrets.yml"
      when: openbao_read_enabled | default(false) | bool
      tags: [always]

  tasks:
    - name: Create Discord webhook secret for Flux notifications
      ansible.builtin.shell: |
        kubectl create secret generic discord-webhook \
          --from-literal=address="{{ flux_discord_webhook_url }}" \
          -n flux-system \
          --dry-run=client -o yaml | kubectl apply -f -
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      changed_when: false
      no_log: true

    # Seeds credentials used by Flux's `provider: github` GitRepository auth.
    # Keys MUST be exactly githubAppID / githubAppInstallationID / githubAppPrivateKey
    # — Flux fails with "secretRef with github app data must be specified" on any
    # other casing. See ADR-020 and the source-controller GitHub provider docs.
    - name: Seed GitHub App credentials for Flux GitRepository auth
      tags: github-app-secret
      block:
        - name: Create temporary directory for PEM
          ansible.builtin.tempfile:
            state: directory
            suffix: flux-github-app
          register: pem_tmpdir
          no_log: true

        - name: Write GitHub App private key to tmp file
          ansible.builtin.copy:
            content: "{{ vault_github_app_private_key }}"
            dest: "{{ pem_tmpdir.path }}/key.pem"
            mode: "0600"
          no_log: true

        - name: Create/update github-app-credentials secret
          ansible.builtin.shell: |
            kubectl create secret generic github-app-credentials \
              --from-literal=githubAppID="{{ vault_github_app_id }}" \
              --from-literal=githubAppInstallationID="{{ vault_github_app_installation_id }}" \
              --from-file=githubAppPrivateKey="{{ pem_tmpdir.path }}/key.pem" \
              -n flux-system \
              --dry-run=client -o yaml | kubectl apply -f -
          environment:
            KUBECONFIG: "{{ kubeconfig }}"
          changed_when: false
          no_log: true

        - name: Verify secret has correct keys
          ansible.builtin.command: >
            kubectl get secret github-app-credentials -n flux-system
            -o jsonpath={.data}
          environment:
            KUBECONFIG: "{{ kubeconfig }}"
          changed_when: false
          register: secret_check

        - name: Assert all three keys present
          ansible.builtin.assert:
            that:
              - "'githubAppID' in secret_check.stdout"
              - "'githubAppInstallationID' in secret_check.stdout"
              - "'githubAppPrivateKey' in secret_check.stdout"
            fail_msg: >
              github-app-credentials secret is missing one or more required keys.
              Flux's provider: github expects exactly: githubAppID, githubAppInstallationID, githubAppPrivateKey.
            success_msg: "github-app-credentials secret has all required keys"
      always:
        - name: Remove temporary PEM file
          ansible.builtin.file:
            path: "{{ pem_tmpdir.path }}"
            state: absent
          when: pem_tmpdir is defined and pem_tmpdir.path is defined
          no_log: true

    - name: Create NodePort services for Flux controller metrics
      ansible.builtin.shell: |
        cat <<'EOF' | kubectl apply -f -
        apiVersion: v1
        kind: Service
        metadata:
          name: source-controller-metrics
          namespace: flux-system
          labels:
            app: source-controller
        spec:
          type: NodePort
          selector:
            app: source-controller
          ports:
            - port: 8080
              targetPort: http-prom
              nodePort: 30881
              protocol: TCP
              name: metrics
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: kustomize-controller-metrics
          namespace: flux-system
          labels:
            app: kustomize-controller
        spec:
          type: NodePort
          selector:
            app: kustomize-controller
          ports:
            - port: 8080
              targetPort: http-prom
              nodePort: 30882
              protocol: TCP
              name: metrics
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: helm-controller-metrics
          namespace: flux-system
          labels:
            app: helm-controller
        spec:
          type: NodePort
          selector:
            app: helm-controller
          ports:
            - port: 8080
              targetPort: http-prom
              nodePort: 30883
              protocol: TCP
              name: metrics
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: notification-controller-metrics
          namespace: flux-system
          labels:
            app: notification-controller
        spec:
          type: NodePort
          selector:
            app: notification-controller
          ports:
            - port: 8080
              targetPort: http-prom
              nodePort: 30884
              protocol: TCP
              name: metrics
        EOF
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      changed_when: false

    - name: Verify NodePort services created
      ansible.builtin.command: >
        kubectl get svc -n flux-system
        -l 'app in (source-controller,kustomize-controller,helm-controller,notification-controller)'
        -o custom-columns=NAME:.metadata.name,PORT:.spec.ports[0].nodePort
        --no-headers
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      changed_when: false
      register: nodeport_check

    - name: Display NodePort services
      ansible.builtin.debug:
        msg: "{{ nodeport_check.stdout_lines }}"

# ============================================================
# Play 5: Deploy Prometheus targets and config on R730xd
# ============================================================
- name: Deploy Flux metrics targets and alert rules
  hosts: r730xd
  gather_facts: no

  vars_files:
    - "{{ playbook_dir }}/../roles/r730xd-prometheus/defaults/main.yml"

  tasks:
    - name: Template Flux controller targets
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/r730xd-prometheus/templates/targets.d/k8s-flux.yml.j2"
        dest: "/opt/observability/prometheus/targets.d/k8s-flux.yml"
        mode: "0644"
      become: yes

    - name: Set K8s apiserver target for Prometheus
      ansible.builtin.set_fact:
        prometheus_k8s_apiserver_target: "{{ dell_inspiron_ip }}:6443"

    - name: Re-template Prometheus configuration
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/r730xd-prometheus/templates/prometheus.yml.j2"
        dest: "/opt/observability/prometheus/prometheus.yml"
        mode: "0644"
      become: yes
      register: prom_config

    - name: Re-template alert rules with Flux alerts
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/r730xd-prometheus/templates/rules/grizzly-platform.yml.j2"
        dest: "/opt/observability/prometheus/rules/grizzly-platform.yml"
        mode: "0644"
      become: yes
      register: prom_rules

    - name: Recreate Prometheus container if config changed
      ansible.builtin.command: docker compose up -d --force-recreate prometheus
      args:
        chdir: /opt/observability/prometheus
      become: yes
      when: prom_config is changed or prom_rules is changed

# ============================================================
# Play 6: Deploy Grafana dashboard
# ============================================================
- name: Deploy Flux GitOps Grafana dashboard
  hosts: r730xd
  gather_facts: no

  vars:
    grafana_compose_dir: "/opt/observability/grafana"

  tasks:
    - name: Copy Flux GitOps dashboard
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../roles/r730xd-grafana/files/dashboards/flux-gitops.json"
        dest: "{{ grafana_compose_dir }}/dashboards/flux-gitops.json"
        mode: "0644"
      become: yes

# ============================================================
# Play 7: Verify Flux reconciliation and observability
# ============================================================
- name: Verify Phase 4 deployment
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    kubeconfig: "{{ lookup('env', 'HOME') }}/.kube/config"

  tasks:
    - name: Wait for Flux to reconcile infrastructure
      ansible.builtin.command: >
        flux reconcile kustomization infrastructure --timeout=2m
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: reconcile_result
      changed_when: false
      # Allow failure — infrastructure kustomization may not be reconciled yet
      failed_when: false

    - name: Get all Flux resources
      ansible.builtin.command: flux get all
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      changed_when: false
      register: flux_all

    - name: Check Alloy DaemonSet
      ansible.builtin.command: >
        kubectl get ds alloy -n monitoring
        -o custom-columns=DESIRED:.status.desiredNumberScheduled,READY:.status.numberReady
        --no-headers
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      changed_when: false
      register: alloy_ds
      failed_when: false

    - name: Check Flux notification resources
      ansible.builtin.command: kubectl get providers,alerts -n flux-system --no-headers
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      changed_when: false
      register: notification_check
      failed_when: false

    - name: Wait for Alloy to ship initial logs
      ansible.builtin.pause:
        seconds: 30
      when: alloy_ds.rc == 0

    - name: Check pod logs in Loki
      ansible.builtin.uri:
        url: "http://{{ r730xd_ip }}:3100/loki/api/v1/query"
        body_format: form-urlencoded
        body:
          query: '{namespace="flux-system"}'
          limit: "5"
        return_content: yes
      register: loki_check
      failed_when: false
      delegate_to: r730xd

    - name: Wait for Prometheus to scrape Flux targets
      ansible.builtin.pause:
        seconds: 20

    - name: Check Flux metrics in Prometheus
      ansible.builtin.uri:
        url: "http://{{ r730xd_ip }}:9090/api/v1/query?query=up{job='flux-system'}"
        return_content: yes
      register: prometheus_check
      failed_when: false
      delegate_to: r730xd

    - name: Display verification summary
      ansible.builtin.debug:
        msg:
          - "=== Phase 4 — Flux CD & GitOps Foundation ==="
          - ""
          - "Flux resources:"
          - "{{ flux_all.stdout_lines | default(['  (could not retrieve)']) }}"
          - ""
          - "Alloy DaemonSet (monitoring):"
          - "  {{ alloy_ds.stdout | default('not yet reconciled') }}"
          - ""
          - "Notifications:"
          - "  {{ notification_check.stdout | default('not yet reconciled') }}"
          - ""
          - "Loki (flux-system logs):"
          - "  {{ (loki_check.json.data.result | default([])) | length }} stream(s) found"
          - ""
          - "Prometheus (flux controller metrics):"
          - "  {{ (prometheus_check.json.data.result | default([])) | length }}/4 controllers responding"
          - ""
          - "Grafana dashboard: Flux GitOps (uid: flux-gitops)"
          - ""
          - "Next steps:"
          - "  1. git pull (to get flux-system/ committed by bootstrap)"
          - "  2. Test reconciliation: edit a manifest, push, watch with 'flux get kustomizations --watch'"
