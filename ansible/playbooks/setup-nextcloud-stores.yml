---
# setup-nextcloud-stores.yml — foundation-side provisioning for the Nextcloud
# lab app (manifests live in the lab-apps repo, applied by Flux).
#
# Nextcloud was re-architected off its bundled per-app Postgres + iSCSI file
# volume onto the shared foundation stores (ADR-038). This playbook provisions
# the two foundation resources it now depends on:
#
#   Play 1  The `nextcloud` database + login role on the foundation PostgreSQL.
#   Play 2  The `nextcloud` bucket + a scoped MinIO user on the bulk instance,
#           used as Nextcloud's S3 primary object storage.
#
# Credentials come from OpenBao secret/grizzly-platform/stores/nextcloud
# (db_password, s3_access_key, s3_secret_key) — provisioned here, and read
# cross-domain by Nextcloud's K8s ExternalSecret. Kept under grizzly-platform/
# rather than lab-apps/ because the ansible-platform-read AppRole policy only
# grants grizzly-platform/* (mirrors the authentik foundation role).
#
# Prerequisites:
#   - Foundation Postgres + MinIO bulk running (deploy-foundation-stores.yml).
#   - The `minio-bulk` mc alias configured on the control node (jumpbox).
#   - OpenBao seeded: secret/grizzly-platform/stores/nextcloud with keys
#     db_password, s3_access_key, s3_secret_key. Generate db_password WITHOUT
#     single quotes (e.g. `openssl rand -base64 36`).
#
# Usage (DEFAULT inventory — Play 2 runs on localhost with the mc alias):
#   ansible-playbook ansible/playbooks/setup-nextcloud-stores.yml \
#     --vault-password-file .vault_pass -v
#
# Run just one half:
#   ... --tags db
#   ... --tags s3

- name: Provision Nextcloud database on foundation Postgres
  hosts: r730xd
  become: yes
  gather_facts: no
  tags: [db]

  # The nextcloud role password lives only in OpenBao (no static vault.yml
  # fallback), so this play always reads from OpenBao.
  vars:
    openbao_read_enabled: true

  vars_files:
    - "{{ playbook_dir }}/../vars/openbao_auth.yml"

  pre_tasks:
    - name: Load OpenBao-sourced platform secrets
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../vars/openbao_secrets.yml"

    - name: Verify foundation Postgres container is running
      ansible.builtin.command: docker exec foundation-postgres pg_isready -U postgres
      changed_when: false

  tasks:
    # psql -U postgres connects over the container's local socket (trust auth) —
    # no superuser password needed. The role password is passed via psql's
    # :'pw' literal (safe quoting); the SQL is fed on stdin (docker exec -i),
    # because psql only interpolates variables for stdin/-f input, NOT for -c.
    - name: Check whether the nextcloud role exists
      ansible.builtin.command: >-
        docker exec foundation-postgres
        psql -U postgres -tAc
        "SELECT 1 FROM pg_roles WHERE rolname='nextcloud'"
      register: nc_role
      changed_when: false

    - name: Create the nextcloud login role
      ansible.builtin.shell:
        cmd: >-
          set -o pipefail;
          printf "CREATE ROLE nextcloud LOGIN PASSWORD :'pw';\n"
          | docker exec -i foundation-postgres
          psql -U postgres -v ON_ERROR_STOP=1 -v pw="$PGPW"
        executable: /bin/bash
      environment:
        PGPW: "{{ vault_nextcloud_db_password }}"
      when: nc_role.stdout != "1"
      no_log: true

    - name: Keep the nextcloud role password in sync with OpenBao
      ansible.builtin.shell:
        cmd: >-
          set -o pipefail;
          printf "ALTER ROLE nextcloud LOGIN PASSWORD :'pw';\n"
          | docker exec -i foundation-postgres
          psql -U postgres -v ON_ERROR_STOP=1 -v pw="$PGPW"
        executable: /bin/bash
      environment:
        PGPW: "{{ vault_nextcloud_db_password }}"
      no_log: true
      changed_when: false

    - name: Check whether the nextcloud database exists
      ansible.builtin.command: >-
        docker exec foundation-postgres
        psql -U postgres -tAc
        "SELECT 1 FROM pg_database WHERE datname='nextcloud'"
      register: nc_db
      changed_when: false

    - name: Create the nextcloud database owned by the nextcloud role
      ansible.builtin.command: >-
        docker exec foundation-postgres
        psql -U postgres -v ON_ERROR_STOP=1
        -c "CREATE DATABASE nextcloud OWNER nextcloud"
      when: nc_db.stdout != "1"

- name: Provision Nextcloud S3 bucket and scoped user on MinIO bulk
  hosts: localhost
  connection: local
  gather_facts: no
  tags: [s3]

  vars:
    openbao_read_enabled: true

  vars_files:
    - "{{ playbook_dir }}/../inventory/group_vars/all/vault.yml"
    - "{{ playbook_dir }}/../inventory/group_vars/all/vars.yml"
    - "{{ playbook_dir }}/../inventory/group_vars/all/network.yml"
    - "{{ playbook_dir }}/../vars/openbao_auth.yml"

  pre_tasks:
    - name: Load OpenBao-sourced platform secrets
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../vars/openbao_secrets.yml"

  tasks:
    - name: Verify Nextcloud S3 credentials are present in OpenBao
      ansible.builtin.assert:
        that:
          - vault_nextcloud_s3_access_key is defined and vault_nextcloud_s3_access_key | length > 0
          - vault_nextcloud_s3_secret_key is defined and vault_nextcloud_s3_secret_key | length > 0
        fail_msg: >
          secret/grizzly-platform/stores/nextcloud must define s3_access_key and
          s3_secret_key. Seed OpenBao before running this play.
        success_msg: "Nextcloud S3 credentials are set"

    - name: Ensure the nextcloud bucket exists on MinIO bulk
      ansible.builtin.command: mc mb --ignore-existing minio-bulk/nextcloud
      changed_when: false
      failed_when: false

    - name: Create the nextcloud MinIO user on the bulk instance
      ansible.builtin.shell: |
        mc admin user add minio-bulk \
          "{{ vault_nextcloud_s3_access_key }}" \
          "{{ vault_nextcloud_s3_secret_key }}" 2>&1 || true
      changed_when: false
      no_log: true

    - name: Grant the nextcloud user readwrite access to its bucket
      ansible.builtin.shell: |
        cat <<'EOF' | mc admin policy create minio-bulk nextcloud-rw /dev/stdin
        {
          "Version": "2012-10-17",
          "Statement": [{
            "Effect": "Allow",
            "Action": ["s3:*"],
            "Resource": [
              "arn:aws:s3:::nextcloud",
              "arn:aws:s3:::nextcloud/*"
            ]
          }]
        }
        EOF
        mc admin policy attach minio-bulk nextcloud-rw --user "{{ vault_nextcloud_s3_access_key }}"
      changed_when: false
      no_log: true
