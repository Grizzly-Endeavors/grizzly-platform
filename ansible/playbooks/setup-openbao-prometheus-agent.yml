---
# Provision the prometheus-metrics AppRole in OpenBao and deploy the OpenBao
# Agent on r730xd that mints a short-TTL token for Prometheus to scrape
# /v1/sys/metrics. See issue #41 and docs/runbooks/openbao-quickref.md.
#
# Idempotent: all `bao write` calls are upserts; the agent role re-deploys
# cleanly. After this runs, apply the prometheus job change:
#   ansible-playbook ansible/playbooks/deploy-observability.yml --tags prometheus
#
# Usage:
#   ansible-playbook ansible/playbooks/setup-openbao-prometheus-agent.yml

- name: Check for an existing agent secret_id on r730xd
  hosts: r730xd
  gather_facts: false
  become: true
  vars_files:
    - "{{ playbook_dir }}/../inventory/group_vars/all/vars.yml"
  tasks:
    - name: Stat the agent secret_id file
      ansible.builtin.stat:
        path: "{{ openbao_agent_base_dir }}/secret_id"
      register: agent_secret_id_stat

- name: Mint the prometheus-metrics AppRole
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - "{{ playbook_dir }}/../inventory/group_vars/all/vault.yml"
    - "{{ playbook_dir }}/../inventory/group_vars/all/vars.yml"
    - "{{ playbook_dir }}/../roles/r730xd-openbao/defaults/main.yml"

  vars:
    infisical_auth_env:
      INFISICAL_UNIVERSAL_AUTH_CLIENT_ID: "{{ vault_infisical_openbao_client_id }}"
      INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET: "{{ vault_infisical_openbao_client_secret }}"

  pre_tasks:
    - name: Assert prerequisites
      ansible.builtin.assert:
        that:
          - vault_infisical_openbao_client_id is defined
          - vault_infisical_openbao_client_id | length > 0
          - vault_infisical_openbao_client_secret is defined
        fail_msg: >
          Infisical bootstrap credentials missing from vault.yml; run
          scripts/set-openbao-bootstrap-secrets.sh first.

    - name: Verify required CLIs are on PATH
      ansible.builtin.command: "which {{ item }}"
      loop:
        - bao
        - infisical
      changed_when: false

  tasks:
    - name: Fetch OpenBao root token from Infisical
      ansible.builtin.command:
        argv:
          - infisical
          - secrets
          - get
          - "{{ openbao_infisical_root_token_key }}"
          - "--projectId={{ openbao_infisical_project_id }}"
          - "--env={{ openbao_infisical_env }}"
          - --plain
          - --silent
      environment: "{{ infisical_auth_env }}"
      register: openbao_root
      changed_when: false
      no_log: true

    - name: Capture root token
      ansible.builtin.set_fact:
        openbao_root_token: "{{ openbao_root.stdout | trim }}"
      no_log: true

    - name: Fetch OpenBao auth method list
      ansible.builtin.command:
        argv: [bao, auth, list, -format=json]
      environment: &bao_env
        VAULT_ADDR: "{{ openbao_api_addr }}"
        VAULT_CACERT: "{{ openbao_tls_ca_path }}"
        BAO_ADDR: "{{ openbao_api_addr }}"
        BAO_CACERT: "{{ openbao_tls_ca_path }}"
        VAULT_TOKEN: "{{ openbao_root_token }}"
        BAO_TOKEN: "{{ openbao_root_token }}"
      register: auth_list
      changed_when: false
      no_log: true

    - name: Enable approle auth method
      ansible.builtin.command:
        argv: [bao, auth, enable, approle]
      environment: *bao_env
      when: "'approle/' not in (auth_list.stdout | from_json | default({}))"
      register: approle_enable
      changed_when: "'Success' in approle_enable.stdout"
      failed_when:
        - approle_enable.rc != 0
        - "'path is already in use' not in (approle_enable.stderr | default(''))"
      no_log: true

    # token_bound_cidrs is deliberately NOT set: Prometheus scrapes from a
    # docker bridge container whose source address is unpredictable. The token
    # only grants read on sys/metrics (prometheus-readonly), so a leak is
    # low-value. The secret_id that authenticates the agent IS CIDR-bound.
    - name: Write prometheus-metrics AppRole
      ansible.builtin.command:
        argv:
          - bao
          - write
          - auth/approle/role/prometheus-metrics
          - "token_policies=prometheus-readonly"
          - "token_ttl=1h"
          - "token_max_ttl=4h"
          - "secret_id_bound_cidrs=10.0.0.0/24"
          - "secret_id_ttl=0"
          - "secret_id_num_uses=0"
      environment: *bao_env
      register: approle_role
      changed_when: "'Success' in approle_role.stdout"
      no_log: true

    - name: Read prometheus-metrics role_id
      ansible.builtin.command:
        argv: [bao, read, -field=role_id, auth/approle/role/prometheus-metrics/role-id]
      environment: *bao_env
      register: approle_role_id
      changed_when: false
      no_log: true

    # Only mint when the agent has no secret_id yet (or an operator forces it
    # with -e force_remint_secret_id=true). Keeps re-runs from piling up unused
    # secret_ids in OpenBao. Rotation is the rotate-openbao-keys.yml concern.
    - name: Mint a fresh prometheus-metrics secret_id
      ansible.builtin.command:
        argv: [bao, write, -f, -field=secret_id, auth/approle/role/prometheus-metrics/secret-id]
      environment: *bao_env
      register: approle_secret_id
      changed_when: true
      no_log: true
      when: >-
        not hostvars['r730xd'].agent_secret_id_stat.stat.exists
        or (force_remint_secret_id | default(false) | bool)

    - name: Stash AppRole credentials for the agent play
      ansible.builtin.set_fact:
        openbao_agent_role_id: "{{ approle_role_id.stdout | trim }}"
        openbao_agent_secret_id: "{{ approle_secret_id.stdout | trim if not approle_secret_id.skipped | default(false) else '' }}"
      no_log: true

- name: Deploy the OpenBao Agent on r730xd
  hosts: r730xd
  gather_facts: true
  become: true

  vars:
    openbao_agent_role_id: "{{ hostvars['localhost'].openbao_agent_role_id }}"
    openbao_agent_secret_id: "{{ hostvars['localhost'].openbao_agent_secret_id }}"

  roles:
    - r730xd-openbao-agent
