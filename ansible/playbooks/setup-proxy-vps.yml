---
# Proxy VPS Setup Playbook
# Configures Hetzner VPS with Caddy reverse proxy for K8s cluster access
#
# Prerequisites:
#   - VPS provisioned and accessible via SSH (Host proxy-vps in ~/.ssh/config)
#   - WireGuard keypairs generated and stored in ansible vault
#     (vault_wg_vps_private_key, vault_wg_r730xd_public_key, etc.)
#   - Ansible vault configured with cloudflare_api_token
#
# The VPS talks to the home K8s cluster via a dedicated point-to-point
# WireGuard tunnel (ingress-tunnel role) that terminates on R730xd, which
# iptables-DNATs only the ingress ports to a K8s NodePort. This avoids
# exposing the full home LAN to the VPS. See ADR-019.
#
# Usage:
#   ansible-playbook -i ansible/inventory/proxy-vps.yml \
#     ansible/playbooks/setup-proxy-vps.yml --vault-password-file .vault_pass

- name: Setup Proxy VPS
  hosts: all
  gather_facts: yes
  become: yes

  vars_files:
    - ../group_vars/all/vars.yml
    - ../group_vars/all/vault.yml
    # OpenBao auth defaults — inert unless openbao_read_enabled is true.
    # NOTE: this playbook currently reads from ansible/group_vars/all/
    # (the stale duplicate tree); Phase E3 consolidates onto
    # ansible/inventory/group_vars/all/. Until then, the path above is
    # load-bearing.
    - "{{ playbook_dir }}/../vars/openbao_auth.yml"

  pre_tasks:
    - name: Load OpenBao-sourced platform secrets
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../vars/openbao_secrets.yml"
      when: openbao_read_enabled | default(false) | bool
      tags: [always]

    - name: Verify SSH connectivity
      ansible.builtin.ping:

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Upgrade all packages
      ansible.builtin.apt:
        upgrade: dist
        autoremove: yes
        autoclean: yes

    - name: Install essential packages
      ansible.builtin.apt:
        name:
          - curl
          - wget
          - git
          - vim
          - htop
          - net-tools
          - dnsutils
          - ufw
          - fail2ban
        state: present

  tasks:
    - name: Configure timezone
      community.general.timezone:
        name: "{{ timezone | default('UTC') }}"

    - name: Configure UFW firewall
      when: enable_firewall | default(true) | bool
      block:
        - name: Reset UFW to default state
          community.general.ufw:
            state: reset

        - name: Set UFW default policies
          community.general.ufw:
            direction: "{{ item.direction }}"
            policy: "{{ item.policy }}"
          loop:
            - { direction: 'incoming', policy: 'deny' }
            - { direction: 'outgoing', policy: 'allow' }

        - name: Allow SSH on port 2222
          community.general.ufw:
            rule: allow
            port: '2222'
            proto: tcp
            comment: 'SSH'

        - name: Allow HTTP/HTTPS
          community.general.ufw:
            rule: allow
            port: "{{ item.port }}"
            proto: "{{ item.proto }}"
            comment: "{{ item.comment }}"
          loop: "{{ ufw_web_rules | default([]) }}"

        - name: Enable UFW
          community.general.ufw:
            state: enabled

    # Ingress DNAT over the wg0 tunnel: legacy single-port UDP forwards
    # (udp_forwarding_rules) plus the game-server port range (game_ingress).
    # All NAT lives in one *nat block in before.rules — multiple *nat sections
    # in one iptables-restore file would fail, so both sources render together.
    # Tagged so the range can be (re)applied scoped: --tags game-ingress.
    - name: Configure ingress port forwarding via NAT
      when: >-
        (udp_forwarding_rules | default([]) | length > 0)
        or (game_ingress.enabled | default(false) | bool)
      tags: [game-ingress, firewall]
      block:
        - name: Enable IP forwarding
          ansible.posix.sysctl:
            name: net.ipv4.ip_forward
            value: '1'
            sysctl_set: yes
            reload: yes

        - name: Allow UFW routed traffic for forwarded ports
          community.general.ufw:
            rule: allow
            route: yes
            proto: udp
            port: "{{ item.dest_port | string }}"
            to_ip: "{{ item.dest_ip }}"
            comment: "Forward: {{ item.comment | default(item.src_port ~ '/udp') }}"
          loop: "{{ udp_forwarding_rules | default([]) }}"

        - name: Allow UFW routed traffic for the game server range
          community.general.ufw:
            rule: allow
            route: yes
            proto: "{{ item }}"
            port: "{{ game_ingress.port_range }}"
            to_ip: "{{ game_ingress.target_ip }}"
            comment: "Game servers ({{ item }}) -> {{ game_ingress.target_ip }}"
          loop: "{{ game_ingress.protocols | default(['udp', 'tcp']) }}"
          when: game_ingress.enabled | default(false) | bool

        - name: Add NAT rules to UFW before.rules
          ansible.builtin.blockinfile:
            path: /etc/ufw/before.rules
            insertbefore: "^\\*filter"
            marker: "# {mark} ANSIBLE MANAGED - UDP PORT FORWARDING NAT RULES"
            block: |
              *nat
              :PREROUTING ACCEPT [0:0]
              :POSTROUTING ACCEPT [0:0]
              {% for rule in udp_forwarding_rules | default([]) %}
              # {{ rule.comment | default(rule.src_port ~ '/udp forward') }}
              -A PREROUTING -p udp --dport {{ rule.src_port }} -j DNAT --to-destination {{ rule.dest_ip }}:{{ rule.dest_port }}
              -A POSTROUTING -d {{ rule.dest_ip }}/32 -p udp --dport {{ rule.dest_port }} -j MASQUERADE
              {% endfor %}
              {% if game_ingress.enabled | default(false) | bool %}
              {% for proto in game_ingress.protocols | default(['udp', 'tcp']) %}
              # game servers {{ proto }} {{ game_ingress.port_range }} -> {{ game_ingress.target_ip }} (1:1, over wg0)
              -A PREROUTING -p {{ proto }} --dport {{ game_ingress.port_range }} -j DNAT --to-destination {{ game_ingress.target_ip }}
              -A POSTROUTING -d {{ game_ingress.target_ip }}/32 -p {{ proto }} --dport {{ game_ingress.port_range }} -j MASQUERADE
              {% endfor %}
              {% endif %}
              COMMIT
          notify: Reload UFW

    - name: Verify fail2ban is running
      ansible.builtin.systemd:
        name: fail2ban
        state: started
        enabled: yes

    - name: Configure ingress tunnel (WireGuard server)
      ansible.builtin.include_role:
        name: ingress-tunnel
        apply:
          tags: [wireguard, ingress-tunnel]
      vars:
        tunnel_role: server
      tags: [wireguard, ingress-tunnel]

    - name: Install and configure Caddy
      when: enable_caddy | default(true) | bool
      block:
        - name: Validate Caddy email is set
          ansible.builtin.assert:
            that:
              - caddy_email is defined
              - caddy_email | length > 0
              - "'@' in caddy_email"
            fail_msg: "caddy_email must be a valid email address"

        - name: Include Caddy role
          ansible.builtin.include_role:
            name: caddy

    # --- Monitoring ---
    - name: Install monitoring base (node-exporter)
      ansible.builtin.include_role:
        name: monitoring-base
      tags: [monitoring]

    - name: Deploy health check scripts
      ansible.builtin.include_role:
        name: monitoring-checks
      tags: [monitoring]

    # Prometheus (on r730xd) scrapes node-exporter + Caddy metrics over the wg0
    # point-to-point tunnel only — nothing public. The old NetBird-mesh and
    # home-network allow rules were for the retired public-IP scrape path and
    # are pruned below to shrink attack surface. See issue #42 / ADR-019.
    - name: Allow monitoring ports from the r730xd wg0 tunnel
      community.general.ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: tcp
        from_ip: "{{ wg_r730xd_ip }}"
        comment: "{{ item.comment }}"
      loop:
        - { port: '9100', comment: 'node-exporter (wg0 tunnel)' }
        - { port: '2019', comment: 'Caddy metrics (wg0 tunnel)' }
      when: enable_firewall | default(true) | bool
      tags: [monitoring]

    - name: Prune retired monitoring allow rules (public-IP scrape path)
      community.general.ufw:
        rule: allow
        delete: true
        port: "{{ item.port }}"
        proto: tcp
        from_ip: "{{ item.from }}"
      loop:
        - { port: '9100', from: '100.96.0.0/11' }
        - { port: '2019', from: '100.96.0.0/11' }
        - { port: '9100', from: '{{ monitoring_home_ip }}' }
        - { port: '2019', from: '{{ monitoring_home_ip }}' }
      when: enable_firewall | default(true) | bool and monitoring_home_ip is defined
      tags: [monitoring]

  post_tasks:
    - name: Final connectivity check
      ansible.builtin.wait_for:
        port: 443
        timeout: 30

    - name: Display deployment summary
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Proxy VPS Setup Complete"
          - "=========================================="
          - "Hostname: {{ inventory_hostname }}"
          - "K8s Proxy: {{ caddy_enable_k8s_proxy | default(false) }}"
          - "K8s Endpoint: {{ caddy_k8s_ingress_endpoint | default('N/A') }}"
          - ""
          - "Configured services:"
          - "  Non-K8s services: {{ caddy_services | default([]) | length }}"
          - "  Wildcard K8s proxy: *.{{ caddy_root_domain | default('N/A') }} -> {{ caddy_k8s_ingress_endpoint | default('N/A') }}"
          - ""
          - "Root domain: {{ caddy_root_domain | default('N/A') }} -> {{ caddy_root_redirect_target | default('N/A') }}"
          - "UDP forwarding: {{ udp_forwarding_rules | default([]) | length }} rule(s)"
          - "=========================================="

  handlers:
    - name: Reload UFW
      community.general.ufw:
        state: reloaded
