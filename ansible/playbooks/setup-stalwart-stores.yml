---
# setup-stalwart-stores.yml — foundation-side provisioning for the Stalwart
# mail server (ADR-050). K8s manifests live in
# kubernetes/infrastructure/stalwart/ and are applied by Flux.
#
# Stalwart externalizes its state onto the shared foundation stores rather than
# an in-cluster PVC: its directory + metadata go to the foundation PostgreSQL,
# and message blobs go to MinIO (S3). This playbook provisions those two
# resources:
#
#   Play 1  The `stalwart` database + login role on the foundation PostgreSQL.
#   Play 2  The `stalwart` bucket + a scoped MinIO user on the OBS (ZFS-tier)
#           instance — mail blobs want the durable hot tier, unlike Nextcloud
#           which backs onto the bulk MergerFS instance.
#
# Credentials come from OpenBao secret/grizzly-platform/stores/stalwart
# (db_password, s3_access_key, s3_secret_key) — provisioned here, and read
# cross-domain by Stalwart's K8s ExternalSecret. Kept under grizzly-platform/
# rather than a lab-apps/ path because the ansible-platform-read AppRole policy
# only grants grizzly-platform/* (mirrors nextcloud / career-scanner).
#
# Prerequisites:
#   - Foundation Postgres + MinIO obs running (deploy-foundation-stores.yml).
#     Play 2 drives minio-obs via `docker exec` on the r730xd — no host-side
#     mc alias needed.
#   - OpenBao seeded: secret/grizzly-platform/stores/stalwart with keys
#     db_password, s3_access_key, s3_secret_key. Generate db_password WITHOUT
#     single quotes (e.g. `openssl rand -base64 36`).
#
# Usage:
#   ansible-playbook ansible/playbooks/setup-stalwart-stores.yml \
#     --vault-password-file .vault_pass -v
#
# Run just one half:
#   ... --tags db
#   ... --tags s3

- name: Provision Stalwart database on foundation Postgres
  hosts: r730xd
  become: yes
  gather_facts: no
  tags: [db]

  # The stalwart role password lives only in OpenBao (no static vault.yml
  # fallback), so this play always reads from OpenBao.
  vars:
    openbao_read_enabled: true

  vars_files:
    - "{{ playbook_dir }}/../vars/openbao_auth.yml"

  pre_tasks:
    - name: Load OpenBao-sourced platform secrets
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../vars/openbao_secrets.yml"

    - name: Verify foundation Postgres container is running
      ansible.builtin.command: docker exec foundation-postgres pg_isready -U postgres
      changed_when: false

  tasks:
    # psql -U postgres connects over the container's local socket (trust auth) —
    # no superuser password needed. The role password is passed via psql's
    # :'pw' literal (safe quoting); the SQL is fed on stdin (docker exec -i),
    # because psql only interpolates variables for stdin/-f input, NOT for -c.
    - name: Check whether the stalwart role exists
      ansible.builtin.command: >-
        docker exec foundation-postgres
        psql -U postgres -tAc
        "SELECT 1 FROM pg_roles WHERE rolname='stalwart'"
      register: sw_role
      changed_when: false

    - name: Create the stalwart login role
      ansible.builtin.shell:
        cmd: >-
          set -o pipefail;
          printf "CREATE ROLE stalwart LOGIN PASSWORD :'pw';\n"
          | docker exec -i foundation-postgres
          psql -U postgres -v ON_ERROR_STOP=1 -v pw="$PGPW"
        executable: /bin/bash
      environment:
        PGPW: "{{ vault_stalwart_db_password }}"
      when: sw_role.stdout != "1"
      no_log: true

    - name: Keep the stalwart role password in sync with OpenBao
      ansible.builtin.shell:
        cmd: >-
          set -o pipefail;
          printf "ALTER ROLE stalwart LOGIN PASSWORD :'pw';\n"
          | docker exec -i foundation-postgres
          psql -U postgres -v ON_ERROR_STOP=1 -v pw="$PGPW"
        executable: /bin/bash
      environment:
        PGPW: "{{ vault_stalwart_db_password }}"
      no_log: true
      changed_when: false

    - name: Check whether the stalwart database exists
      ansible.builtin.command: >-
        docker exec foundation-postgres
        psql -U postgres -tAc
        "SELECT 1 FROM pg_database WHERE datname='stalwart'"
      register: sw_db
      changed_when: false

    - name: Create the stalwart database owned by the stalwart role
      ansible.builtin.command: >-
        docker exec foundation-postgres
        psql -U postgres -v ON_ERROR_STOP=1
        -c "CREATE DATABASE stalwart OWNER stalwart"
      when: sw_db.stdout != "1"

- name: Provision Stalwart S3 bucket and scoped user on MinIO obs
  hosts: r730xd
  become: yes
  gather_facts: no
  tags: [s3]

  # minio-obs runs as a Docker container on the r730xd; we drive it via
  # `docker exec minio-obs mc` against its in-container `local` admin alias
  # (same approach as deploy-observability.yml) rather than a host-side mc
  # alias on the control node — so no per-operator alias setup is required.
  # minio_obs_root_user/password are mapped from OpenBao in group_vars vars.yml.
  vars:
    openbao_read_enabled: true

  vars_files:
    - "{{ playbook_dir }}/../vars/openbao_auth.yml"

  pre_tasks:
    - name: Load OpenBao-sourced platform secrets
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../vars/openbao_secrets.yml"

    - name: Verify Stalwart S3 credentials are present in OpenBao
      ansible.builtin.assert:
        that:
          - vault_stalwart_s3_access_key is defined and vault_stalwart_s3_access_key | length > 0
          - vault_stalwart_s3_secret_key is defined and vault_stalwart_s3_secret_key | length > 0
        fail_msg: >
          secret/grizzly-platform/stores/stalwart must define s3_access_key and
          s3_secret_key. Seed OpenBao before running this play.
        success_msg: "Stalwart S3 credentials are set"

  tasks:
    - name: Configure the MinIO obs admin alias inside the container
      ansible.builtin.command: >-
        docker exec minio-obs mc alias set local
        http://localhost:9000
        {{ minio_obs_root_user }}
        {{ minio_obs_root_password }}
      changed_when: false
      no_log: true

    - name: Ensure the stalwart bucket exists on MinIO obs
      ansible.builtin.command: >-
        docker exec minio-obs mc mb --ignore-existing local/stalwart
      register: sw_bucket
      changed_when: "'Bucket created' in sw_bucket.stdout"

    - name: Check whether the stalwart MinIO user exists
      ansible.builtin.command: >-
        docker exec minio-obs mc admin user info local {{ vault_stalwart_s3_access_key }}
      register: sw_user
      changed_when: false
      failed_when: false
      no_log: true

    - name: Create the stalwart MinIO user on the obs instance
      ansible.builtin.command: >-
        docker exec minio-obs mc admin user add local
        {{ vault_stalwart_s3_access_key }}
        {{ vault_stalwart_s3_secret_key }}
      when: sw_user.rc != 0
      no_log: true

    # Scoped policy (bucket-limited) rather than the built-in readwrite, so the
    # stalwart user cannot touch the observability-loki / -tempo buckets that
    # share this obs instance. Piped into the container over docker exec -i.
    - name: Create the scoped stalwart-rw policy on MinIO obs
      ansible.builtin.shell:
        cmd: |
          cat <<'EOF' | docker exec -i minio-obs mc admin policy create local stalwart-rw /dev/stdin
          {
            "Version": "2012-10-17",
            "Statement": [{
              "Effect": "Allow",
              "Action": ["s3:*"],
              "Resource": [
                "arn:aws:s3:::stalwart",
                "arn:aws:s3:::stalwart/*"
              ]
            }]
          }
          EOF
        executable: /bin/bash
      changed_when: false
      failed_when: false

    - name: Attach the stalwart-rw policy to the stalwart user
      ansible.builtin.command: >-
        docker exec minio-obs mc admin policy attach local stalwart-rw
        --user {{ vault_stalwart_s3_access_key }}
      changed_when: false
      failed_when: false
      no_log: true
