---
# setup-stalwart-stores.yml — foundation-side provisioning for the Stalwart
# mail server (ADR-050). K8s manifests live in
# kubernetes/infrastructure/stalwart/ and are applied by Flux.
#
# Stalwart externalizes its state onto the shared foundation stores rather than
# an in-cluster PVC: its directory + metadata go to the foundation PostgreSQL,
# and message blobs go to S3. This playbook provisions those two resources:
#
#   Play 1  The `stalwart` database + login role on the foundation PostgreSQL.
#   Play 2  The `stalwart` bucket + a scoped userplus account on the s3-hot
#           versitygw gateway (ADR-055) — mail blobs want the durable hot
#           (ZFS) tier, unlike Nextcloud which backs onto s3-bulk. Provisioned
#           via the shared versitygw-provision-account task.
#
# Credentials come from OpenBao secret/grizzly-platform/stores/stalwart
# (db_password, s3_access_key, s3_secret_key) — provisioned here, and read
# cross-domain by Stalwart's K8s ExternalSecret. Kept under grizzly-platform/
# rather than a lab-apps/ path because the ansible-platform-read AppRole policy
# only grants grizzly-platform/* (mirrors nextcloud / career-scanner).
#
# Prerequisites:
#   - Foundation Postgres + s3-hot versitygw running (deploy-foundation-stores.yml).
#   - OpenBao seeded: secret/grizzly-platform/stores/stalwart with keys
#     db_password, s3_access_key, s3_secret_key (+ stores/s3-hot root creds).
#     Generate db_password WITHOUT single quotes (e.g. `openssl rand -base64 36`).
#
# Usage:
#   ansible-playbook ansible/playbooks/setup-stalwart-stores.yml \
#     --vault-password-file .vault_pass -v
#
# Run just one half:
#   ... --tags db
#   ... --tags s3

- name: Provision Stalwart database on foundation Postgres
  hosts: r730xd
  become: yes
  gather_facts: no
  tags: [db]

  # The stalwart role password lives only in OpenBao (no static vault.yml
  # fallback), so this play always reads from OpenBao.
  vars:
    openbao_read_enabled: true

  vars_files:
    - "{{ playbook_dir }}/../vars/openbao_auth.yml"

  pre_tasks:
    - name: Load OpenBao-sourced platform secrets
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../vars/openbao_secrets.yml"

    - name: Verify foundation Postgres container is running
      ansible.builtin.command: docker exec foundation-postgres pg_isready -U postgres
      changed_when: false

  tasks:
    # psql -U postgres connects over the container's local socket (trust auth) —
    # no superuser password needed. The role password is passed via psql's
    # :'pw' literal (safe quoting); the SQL is fed on stdin (docker exec -i),
    # because psql only interpolates variables for stdin/-f input, NOT for -c.
    - name: Check whether the stalwart role exists
      ansible.builtin.command: >-
        docker exec foundation-postgres
        psql -U postgres -tAc
        "SELECT 1 FROM pg_roles WHERE rolname='stalwart'"
      register: sw_role
      changed_when: false

    - name: Create the stalwart login role
      ansible.builtin.shell:
        cmd: >-
          set -o pipefail;
          printf "CREATE ROLE stalwart LOGIN PASSWORD :'pw';\n"
          | docker exec -i foundation-postgres
          psql -U postgres -v ON_ERROR_STOP=1 -v pw="$PGPW"
        executable: /bin/bash
      environment:
        PGPW: "{{ vault_stalwart_db_password }}"
      when: sw_role.stdout != "1"
      no_log: true

    - name: Keep the stalwart role password in sync with OpenBao
      ansible.builtin.shell:
        cmd: >-
          set -o pipefail;
          printf "ALTER ROLE stalwart LOGIN PASSWORD :'pw';\n"
          | docker exec -i foundation-postgres
          psql -U postgres -v ON_ERROR_STOP=1 -v pw="$PGPW"
        executable: /bin/bash
      environment:
        PGPW: "{{ vault_stalwart_db_password }}"
      no_log: true
      changed_when: false

    - name: Check whether the stalwart database exists
      ansible.builtin.command: >-
        docker exec foundation-postgres
        psql -U postgres -tAc
        "SELECT 1 FROM pg_database WHERE datname='stalwart'"
      register: sw_db
      changed_when: false

    - name: Create the stalwart database owned by the stalwart role
      ansible.builtin.command: >-
        docker exec foundation-postgres
        psql -U postgres -v ON_ERROR_STOP=1
        -c "CREATE DATABASE stalwart OWNER stalwart"
      when: sw_db.stdout != "1"

- name: Provision Stalwart S3 bucket and scoped account on s3-hot
  hosts: r730xd
  become: yes
  gather_facts: no
  tags: [s3]

  vars:
    openbao_read_enabled: true

  vars_files:
    - "{{ playbook_dir }}/../vars/openbao_auth.yml"

  pre_tasks:
    - name: Load OpenBao-sourced platform secrets
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../vars/openbao_secrets.yml"

    - name: Verify Stalwart + s3-hot credentials are present in OpenBao
      ansible.builtin.assert:
        that:
          - vault_stalwart_s3_access_key | default('') | length > 0
          - vault_stalwart_s3_secret_key | default('') | length > 0
          - vault_s3_hot_root_access_key | default('') | length > 0
          - vault_s3_hot_root_secret_key | default('') | length > 0
        fail_msg: >
          secret/grizzly-platform/stores/stalwart (s3_access_key, s3_secret_key)
          and stores/s3-hot (root_access_key, root_secret_key) must be seeded in
          OpenBao.
        success_msg: "Stalwart + s3-hot credentials are set"

  tasks:
    - name: Provision the stalwart account + bucket on s3-hot
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/versitygw-provision-account.yml"
      vars:
        vgw_instance: s3-hot
        vgw_root_access: "{{ vault_s3_hot_root_access_key }}"
        vgw_root_secret: "{{ vault_s3_hot_root_secret_key }}"
        vgw_access: "{{ vault_stalwart_s3_access_key }}"
        vgw_secret: "{{ vault_stalwart_s3_secret_key }}"
        vgw_bucket: stalwart
