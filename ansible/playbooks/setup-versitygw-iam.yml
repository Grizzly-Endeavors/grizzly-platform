---
# setup-versitygw-iam.yml — Set up the OpenBao side of versitygw's Vault-IAM
# backend (ADR-055): a dedicated KV-v2 mount for versitygw-managed S3 accounts,
# a policy granting CRUD+list on it, and a shared AppRole the two gateways
# (s3-hot, s3-bulk) authenticate with. Also generates + stores the per-instance
# root credentials the gateways boot with.
#
# versitygw itself writes/reads S3 accounts under the versitygw-iam mount via
# its admin API using this AppRole — this playbook only stands up the mount +
# auth, it does NOT create per-consumer accounts (that happens at cutover).
#
# Model: mirrors setup-openbao-k8s-auth.yml — runs on localhost, pulls the
# OpenBao root token from Infisical, drives `bao`. Idempotent: mount enable +
# policy + role writes are upserts; the AppRole secret_id and the random root
# creds are generated ONCE (only when their KV path is absent) so re-runs don't
# rotate live credentials out from under the running gateways.
#
# Prerequisites:
#   - OpenBao live + unsealed; bao + infisical CLIs on PATH
#   - Infisical bootstrap creds in vault.yml (scripts/set-openbao-bootstrap-secrets.sh)
#
# Usage:
#   ansible-playbook ansible/playbooks/setup-versitygw-iam.yml \
#     --vault-password-file .vault_pass
#
# Rotate root creds / AppRole secret_id: delete the KV path first, then re-run:
#   bao kv metadata delete secret/grizzly-platform/stores/versitygw-iam   # → new secret_id
#   bao kv metadata delete secret/grizzly-platform/stores/s3-hot          # → new root creds

- name: Configure OpenBao Vault-IAM backend for versitygw
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - "{{ playbook_dir }}/../inventory/group_vars/all/vault.yml"
    - "{{ playbook_dir }}/../inventory/group_vars/all/vars.yml"
    - "{{ playbook_dir }}/../roles/r730xd-openbao/defaults/main.yml"

  vars:
    versitygw_iam_mount: "versitygw-iam"
    versitygw_iam_policy: "versitygw-iam"
    versitygw_iam_approle: "versitygw"
    # Per-instance root credentials, stored under the shared `secret/` KV mount
    # alongside the other foundation-store creds.
    versitygw_root_paths:
      - "grizzly-platform/stores/s3-hot"
      - "grizzly-platform/stores/s3-bulk"
    versitygw_iam_creds_path: "grizzly-platform/stores/versitygw-iam"
    infisical_auth_env:
      INFISICAL_UNIVERSAL_AUTH_CLIENT_ID: "{{ vault_infisical_openbao_client_id }}"
      INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET: "{{ vault_infisical_openbao_client_secret }}"

  pre_tasks:
    - name: Assert Infisical bootstrap creds present
      ansible.builtin.assert:
        that:
          - vault_infisical_openbao_client_id | default('') | length > 0
          - vault_infisical_openbao_client_secret | default('') | length > 0
        fail_msg: >
          Infisical bootstrap credentials missing from vault.yml; run
          scripts/set-openbao-bootstrap-secrets.sh first.

    - name: Verify required CLIs are on PATH
      ansible.builtin.command: "which {{ item }}"
      loop:
        - bao
        - infisical
      changed_when: false

  tasks:
    # ------------------------------------------------------------------
    # 1. Fetch the OpenBao root token from Infisical (same mechanism as
    #    auto-unseal / setup-openbao-k8s-auth.yml).
    # ------------------------------------------------------------------
    - name: Fetch OpenBao root token from Infisical
      ansible.builtin.command:
        argv:
          - infisical
          - secrets
          - get
          - "{{ openbao_infisical_root_token_key }}"
          - "--projectId={{ openbao_infisical_project_id }}"
          - "--env={{ openbao_infisical_env }}"
          - --plain
          - --silent
      environment: "{{ infisical_auth_env }}"
      register: openbao_root
      changed_when: false
      no_log: true

    - name: Capture root token
      ansible.builtin.set_fact:
        openbao_root_token: "{{ openbao_root.stdout | trim }}"
      no_log: true

    # ------------------------------------------------------------------
    # 2. Enable the dedicated KV-v2 mount for versitygw accounts.
    # ------------------------------------------------------------------
    - name: List secrets engines
      ansible.builtin.command:
        argv: [bao, secrets, list, -format=json]
      environment: &bao_env
        VAULT_ADDR: "{{ openbao_api_addr }}"
        VAULT_CACERT: "{{ openbao_tls_ca_path | default('/etc/openbao/tls/ca.crt') }}"
        BAO_ADDR: "{{ openbao_api_addr }}"
        BAO_CACERT: "{{ openbao_tls_ca_path | default('/etc/openbao/tls/ca.crt') }}"
        VAULT_TOKEN: "{{ openbao_root_token }}"
        BAO_TOKEN: "{{ openbao_root_token }}"
      register: secrets_list
      changed_when: false
      no_log: true

    - name: Enable versitygw-iam kv-v2 mount
      ansible.builtin.command:
        argv: [bao, secrets, enable, "-path={{ versitygw_iam_mount }}", kv-v2]
      environment: *bao_env
      when: "(versitygw_iam_mount ~ '/') not in (secrets_list.stdout | from_json)"
      register: mount_enable
      changed_when: "'Success' in mount_enable.stdout"
      failed_when:
        - mount_enable.rc != 0
        - "'path is already in use' not in (mount_enable.stderr | default(''))"

    # ------------------------------------------------------------------
    # 3. Policy: full CRUD+list on the versitygw-iam mount.
    # ------------------------------------------------------------------
    - name: Render versitygw-iam policy to a tmp file
      ansible.builtin.copy:
        dest: "/tmp/versitygw-iam.hcl"
        mode: "0600"
        content: |
          path "{{ versitygw_iam_mount }}/*" {
            capabilities = ["create", "read", "update", "delete", "list"]
          }

    - name: Write versitygw-iam policy
      ansible.builtin.command:
        argv: [bao, policy, write, "{{ versitygw_iam_policy }}", /tmp/versitygw-iam.hcl]
      environment: *bao_env
      register: policy_write
      changed_when: "'Success' in policy_write.stdout"

    - name: Remove tmp policy file
      ansible.builtin.file:
        path: /tmp/versitygw-iam.hcl
        state: absent

    # ------------------------------------------------------------------
    # 4. AppRole auth: enable + bind the versitygw role to the policy.
    # ------------------------------------------------------------------
    - name: List auth methods
      ansible.builtin.command:
        argv: [bao, auth, list, -format=json]
      environment: *bao_env
      register: auth_list
      changed_when: false
      no_log: true

    - name: Enable approle auth method
      ansible.builtin.command:
        argv: [bao, auth, enable, approle]
      environment: *bao_env
      when: "'approle/' not in (auth_list.stdout | from_json)"
      register: approle_enable
      changed_when: "'Success' in approle_enable.stdout"
      failed_when:
        - approle_enable.rc != 0
        - "'path is already in use' not in (approle_enable.stderr | default(''))"

    - name: Create/update versitygw AppRole → versitygw-iam policy
      ansible.builtin.command:
        argv:
          - bao
          - write
          - "auth/approle/role/{{ versitygw_iam_approle }}"
          - "token_policies={{ versitygw_iam_policy }}"
          - "token_ttl=1h"
          - "token_max_ttl=4h"
      environment: *bao_env
      register: approle_write
      changed_when: "'Success' in approle_write.stdout"

    - name: Read versitygw AppRole role_id
      ansible.builtin.command:
        argv: [bao, read, "-field=role_id", "auth/approle/role/{{ versitygw_iam_approle }}/role-id"]
      environment: *bao_env
      register: approle_role_id
      changed_when: false
      no_log: true

    # ------------------------------------------------------------------
    # 5. AppRole secret_id + KV creds — generated ONCE (only if absent) so
    #    re-runs don't rotate the live gateway credentials.
    # ------------------------------------------------------------------
    - name: Check whether the AppRole creds are already stored
      ansible.builtin.command:
        argv: [bao, kv, get, "-format=json", "secret/{{ versitygw_iam_creds_path }}"]
      environment: *bao_env
      register: iam_creds_check
      changed_when: false
      failed_when: false
      no_log: true

    - name: Generate + store AppRole secret_id (first run only)
      when: iam_creds_check.rc != 0
      block:
        - name: Generate a fresh AppRole secret_id
          ansible.builtin.command:
            argv: [bao, write, -f, "-field=secret_id", "auth/approle/role/{{ versitygw_iam_approle }}/secret-id"]
          environment: *bao_env
          register: approle_secret_id
          changed_when: true
          no_log: true

        - name: Store role_id + secret_id for the gateways to consume
          ansible.builtin.command:
            argv:
              - bao
              - kv
              - put
              - "secret/{{ versitygw_iam_creds_path }}"
              - "role_id={{ approle_role_id.stdout | trim }}"
              - "secret_id={{ approle_secret_id.stdout | trim }}"
          environment: *bao_env
          register: iam_creds_put
          changed_when: "'created_time' in iam_creds_put.stdout or iam_creds_put.rc == 0"
          no_log: true

    # ------------------------------------------------------------------
    # 6. Per-instance root credentials — generated ONCE (only if absent).
    # ------------------------------------------------------------------
    - name: Check whether root creds already exist for each instance
      ansible.builtin.command:
        argv: [bao, kv, get, "-format=json", "secret/{{ item }}"]
      environment: *bao_env
      loop: "{{ versitygw_root_paths }}"
      register: root_creds_check
      changed_when: false
      failed_when: false
      no_log: true

    - name: Generate + store root creds for instances that lack them
      when: item.rc != 0
      loop: "{{ root_creds_check.results }}"
      loop_control:
        label: "{{ item.item }}"
      ansible.builtin.command:
        argv:
          - bao
          - kv
          - put
          - "secret/{{ item.item }}"
          - "root_access_key={{ lookup('ansible.builtin.password', '/dev/null length=20 chars=ascii_lowercase,digits') }}"
          - "root_secret_key={{ lookup('ansible.builtin.password', '/dev/null length=40 chars=ascii_letters,digits') }}"
      environment: *bao_env
      register: root_creds_put
      changed_when: true
      no_log: true

    # ------------------------------------------------------------------
    # 7. Summary.
    # ------------------------------------------------------------------
    - name: Summary
      ansible.builtin.debug:
        msg:
          - "=== versitygw Vault-IAM backend configured ==="
          - "KV mount:  {{ versitygw_iam_mount }} (kv-v2) — versitygw manages accounts here"
          - "Policy:    {{ versitygw_iam_policy }} (CRUD+list on {{ versitygw_iam_mount }}/*)"
          - "AppRole:   {{ versitygw_iam_approle }} (token_ttl=1h, max=4h) — shared by s3-hot + s3-bulk"
          - "IAM creds: secret/{{ versitygw_iam_creds_path }} (role_id + secret_id)"
          - "Root creds: secret/grizzly-platform/stores/{s3-hot,s3-bulk} (root_access_key + root_secret_key)"
          - ""
          - "Next: deploy the gateways — deploy-foundation-stores.yml --tags s3-hot,s3-bulk"
