---
# Caddy role default variables

# Caddy version (leave empty for latest)
caddy_version: ""

# Caddy configuration directory
caddy_config_dir: "/etc/caddy"
caddy_data_dir: "/var/lib/caddy"
caddy_log_dir: "/var/log/caddy"

# Caddy service user
caddy_user: "caddy"
caddy_group: "caddy"

# Email for Let's Encrypt (required for production)
caddy_email: ""

# DNS provider for DNS-01 challenge (required for wildcard certs or Cloudflare proxy)
# Options: cloudflare, route53, digitalocean, etc.
caddy_dns_provider: ""

# Enable/disable Caddy service
caddy_service_enabled: true
caddy_service_state: "started"

# Prometheus metrics port (set to enable a /metrics endpoint)
# caddy_metrics_port: 2019

# =============================================================================
# Template Selection
# =============================================================================

# Use K8s proxy template when true, otherwise use simple static template
caddy_enable_k8s_proxy: false

# =============================================================================
# K8s Proxy Configuration (when caddy_enable_k8s_proxy: true)
# =============================================================================

# K8s ingress endpoint — IP:port reachable from VPS via the dedicated
# WireGuard tunnel to R730xd (see ansible/roles/ingress-tunnel).
# Example: "<k8s_ingress_ip>:30487" (WG peer IP + NodePort)
caddy_k8s_ingress_endpoint: ""

# Non-K8s services (static sites or other reverse proxies)
# All subdomains not matched here are proxied to caddy_k8s_ingress_endpoint
# Example:
# caddy_services:
#   - domain: "static.example.com"
#     type: "static"
#     root: "/var/www/html"
#     comment: "Static website"
#   - domain: "ha.example.com"
#     type: "proxy"
#     backend: "192.168.1.100:8123"
#     comment: "Home Assistant"
caddy_services: []

# External domains to proxy to K8s ingress (non-root-domain sites)
caddy_k8s_domains: []

# Wildcard roots to serve to the K8s ingress. Each entry gets its own
# `*.<domain>` reverse-proxy vhost and its own DNS-01 wildcard cert.
# When empty, falls back to [caddy_root_domain] for backward compatibility.
# Example: ["bearflinn.com", "grizzly-endeavors.com"]
caddy_wildcard_domains: []

# Root domain redirect (e.g., example.com -> www.example.com)
# caddy_root_domain: "example.com"
# caddy_root_redirect_target: "www.example.com"
