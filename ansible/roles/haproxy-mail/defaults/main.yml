---
# haproxy-mail — L4 (TCP) ingress for the Stalwart mail ports on the VPS.
#
# HAProxy fronts the four inbound mail ports, terminates the TCP connection
# statefully, and forwards each over the wg0 tunnel to the R730xd wg peer with
# PROXY protocol v2 (so Stalwart recovers the real client IP — the plain
# iptables DNAT path masquerades it away). TLS is NOT terminated here; the
# stream is passed through and Stalwart terminates it (ADR-051, ADR-052).

# Backend target: the R730xd wg0 peer, which re-DNATs each NodePort to the
# K8s node (see setup-r730xd.yml ingress_dnat_rules). Single source of truth
# for the address is network.yml (wg_r730xd_ip).
haproxy_mail_backend_host: "{{ wg_r730xd_ip }}"

# The authoritative mail port → NodePort map (ADR-051: HAProxy's config is the
# single source of truth for it). listen = public port on the VPS;
# nodeport = the Stalwart NodePort reached over the tunnel.
haproxy_mail_ports:
  - { name: smtp,        listen: 25,  nodeport: 30025 }
  - { name: submissions, listen: 465, nodeport: 30465 }
  - { name: submission,  listen: 587, nodeport: 30587 }
  - { name: imaps,       listen: 993, nodeport: 30993 }

# Long client/server timeouts so IMAP IDLE (up to ~29 min) is not torn down.
haproxy_mail_timeout_connect: "10s"
haproxy_mail_timeout_client: "1h"
haproxy_mail_timeout_server: "1h"
haproxy_mail_maxconn: 8192

haproxy_mail_config_path: "/etc/haproxy/haproxy.cfg"
haproxy_mail_service_enabled: true
haproxy_mail_service_state: started
