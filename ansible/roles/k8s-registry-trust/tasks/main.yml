---
# Configure containerd on every K8s node to pull from the in-cluster OCI
# registry via a localhost NodePort mirror. The registry's image reference
# uses a ClusterDNS name that containerd can't resolve from the host, so we
# rewrite it at pull time.
#
# Changes here require a containerd restart (only the first time, to pick up
# `config_path`). Subsequent hosts.toml changes are re-read live.

# ==========================================================================
# Enable containerd's hosts.toml config directory
# ==========================================================================

- name: Check current containerd config_path setting
  ansible.builtin.command: grep -E '^\s*config_path\s*=' /etc/containerd/config.toml
  register: containerd_config_path_check
  changed_when: false
  failed_when: false
  become: yes

- name: Enable hosts.toml config_path in containerd config.toml
  # The default Debian config.toml contains an empty config_path = "" line
  # inside [plugins."io.containerd.grpc.v1.cri".registry]. Replace it with
  # the directory we want containerd to read per-host settings from.
  ansible.builtin.replace:
    path: /etc/containerd/config.toml
    regexp: '^(\s*)config_path\s*=\s*""'
    replace: '\1config_path = "/etc/containerd/certs.d"'
  when: '"/etc/containerd/certs.d" not in containerd_config_path_check.stdout'
  become: yes
  notify: Restart containerd

# ==========================================================================
# Write the registry-mirror hosts.toml
# ==========================================================================

- name: Ensure certs.d directory exists for the in-cluster registry
  ansible.builtin.file:
    path: "/etc/containerd/certs.d/{{ k8s_registry_host }}"
    state: directory
    mode: "0755"
  become: yes

- name: Write hosts.toml redirecting in-cluster registry to localhost NodePort
  ansible.builtin.copy:
    dest: "/etc/containerd/certs.d/{{ k8s_registry_host }}/hosts.toml"
    mode: "0644"
    content: |
      # Managed by ansible/roles/k8s-registry-trust.
      #
      # Image references embedded in pod manifests use
      #   {{ k8s_registry_host }}/<image>:<tag>
      # which is a ClusterDNS name containerd can't resolve from the host.
      # Point the single [host.*] entry at the Service's NodePort on
      # localhost; kube-proxy routes the request into the cluster regardless
      # of which node runs the registry pod.
      #
      # We deliberately do NOT set `server = ...` — containerd would try to
      # resolve and dial the server URL in addition to mirrors, which fails
      # because the host's /etc/resolv.conf can't see ClusterDNS. Omitting
      # `server` makes the [host.*] entries the only upstream containerd
      # will try.
      [host."http://localhost:{{ k8s_registry_nodeport }}"]
        capabilities = ["pull", "resolve"]
  become: yes

# ==========================================================================
# Write pull-through mirror hosts.toml for upstream registries
# ==========================================================================

- name: Ensure certs.d directories exist for pull-through upstreams
  ansible.builtin.file:
    path: "/etc/containerd/certs.d/{{ item.host }}"
    state: directory
    mode: "0755"
  loop: "{{ k8s_registry_pullthrough_upstreams }}"
  loop_control:
    label: "{{ item.host }}"
  become: yes

- name: Route upstream pulls through the in-cluster zot pull-through cache
  ansible.builtin.copy:
    dest: "/etc/containerd/certs.d/{{ item.host }}/hosts.toml"
    mode: "0644"
    content: |
      # Managed by ansible/roles/k8s-registry-trust.
      #
      # Transparent pull-through cache: route {{ item.host }} pulls through the
      # in-cluster zot registry (NodePort on localhost), which mirrors the
      # upstream on demand (extensions.sync). Unlike the in-cluster registry
      # entry above, we DO set `server` here — these hosts are publicly
      # resolvable, so containerd can fall back to a direct upstream pull if zot
      # can't serve the image. A registry outage degrades to upstream rather
      # than a hard failure.
      #
      # This intercepts every {{ item.host }} pull on this node — see the blast
      # radius note in defaults/main.yml and ADR 031.
      server = "{{ item.server }}"

      [host."http://localhost:{{ k8s_registry_nodeport }}"]
        capabilities = ["pull", "resolve"]
  loop: "{{ k8s_registry_pullthrough_upstreams }}"
  loop_control:
    label: "{{ item.host }}"
  become: yes

# ==========================================================================
# Verify
# ==========================================================================

- name: Flush handlers so containerd restarts before probe
  ansible.builtin.meta: flush_handlers

- name: Verify containerd is running after config change
  ansible.builtin.systemd:
    name: containerd
  register: containerd_state
  failed_when: containerd_state.status.ActiveState != 'active'
  become: yes

- name: Display containerd registry trust summary
  ansible.builtin.debug:
    msg:
      - "=== containerd registry trust ==="
      - "Image ref host:  {{ k8s_registry_host }}"
      - "Mirror target:   http://localhost:{{ k8s_registry_nodeport }}"
      - "hosts.toml:      /etc/containerd/certs.d/{{ k8s_registry_host }}/hosts.toml"
      - "Note: new hosts.toml files are re-read on every pull. Changing the"
      - "      containerd main config.toml (e.g. config_path) requires restart."
