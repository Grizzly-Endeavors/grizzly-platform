---
# monitoring-base: packages, exporters, smartd configuration

- name: Install monitoring packages
  ansible.builtin.apt:
    name:
      - prometheus-node-exporter
    state: present
  tags: [monitoring]

- name: Install IPMI/hardware monitoring packages
  ansible.builtin.apt:
    name:
      - ipmitool
      - freeipmi-tools
      - edac-utils
    state: present
  when: ipmi_exporter_enabled
  tags: [monitoring]

- name: Create textfile collector directory
  ansible.builtin.file:
    path: "{{ node_exporter_textfile_dir }}"
    state: directory
    owner: prometheus
    group: prometheus
    mode: "0755"
  tags: [monitoring]

- name: Configure node-exporter with textfile collector
  ansible.builtin.copy:
    content: |
      # Managed by Ansible — monitoring-base role
      # Override default filesystem excludes to include MergerFS (fuse.mergerfs) and /mnt/* mounts
      ARGS="\
      --collector.textfile.directory={{ node_exporter_textfile_dir }} \
      --collector.systemd \
      --collector.processes \
      --collector.filesystem.fs-types-exclude=\
      '^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$' \
      --collector.filesystem.mount-points-exclude='^/(dev|proc|run/credentials/.+|sys|var/lib/docker/.+)($|/)' \
      {% if node_exporter_nfsd_enabled %}--collector.nfsd{% endif %}"
    dest: /etc/default/prometheus-node-exporter
    mode: "0644"
  notify: Restart node-exporter
  tags: [monitoring]

- name: Enable and start node-exporter
  ansible.builtin.systemd:
    name: prometheus-node-exporter
    enabled: true
    state: started
  tags: [monitoring]

# --- smartd configuration (physical hosts only) ---

- name: Install smartmontools
  ansible.builtin.apt:
    name: smartmontools
    state: present
  when: smartd_enabled
  tags: [monitoring]

- name: Deploy smartd configuration
  ansible.builtin.template:
    src: smartd.conf.j2
    dest: /etc/smartd.conf
    mode: "0644"
  notify: Restart smartd
  when: smartd_enabled
  tags: [monitoring]

- name: Enable and start smartd
  ansible.builtin.systemd:
    name: smartd
    enabled: true
    state: started
  when: smartd_enabled
  tags: [monitoring]

# --- openipmi.service on non-IPMI hosts ---
# The `openipmi` package ships an LSB init script that loads the IPMI kernel
# driver. Lab nodes with no BMC/IPMI hardware can't start it, so it sits in a
# failed state and trips the SystemdFailedUnits alert (issue #44). Mask it where
# IPMI is disabled; on real IPMI hosts the driver load is wanted, so leave it.

- name: Check for openipmi.service init script
  ansible.builtin.stat:
    path: /etc/init.d/openipmi
  register: openipmi_initscript
  when: not ipmi_exporter_enabled
  tags: [monitoring]

- name: Clear lingering failed state of openipmi.service
  # Masking does not reset an already-failed unit, so it would still show in
  # `systemctl --failed` and keep tripping SystemdFailedUnits. reset-failed is a
  # no-op once clean, so it stays idempotent (changed_when: false).
  ansible.builtin.command: systemctl reset-failed openipmi.service
  when:
    - not ipmi_exporter_enabled
    - openipmi_initscript.stat.exists | default(false)
  changed_when: false
  failed_when: false
  tags: [monitoring]

- name: Mask and stop openipmi.service on non-IPMI hosts
  ansible.builtin.systemd:
    name: openipmi.service
    state: stopped
    enabled: false
    masked: true
  when:
    - not ipmi_exporter_enabled
    - openipmi_initscript.stat.exists | default(false)
  tags: [monitoring]

# --- IPMI Exporter ---

- name: Install IPMI exporter
  when: ipmi_exporter_enabled
  tags: [monitoring]
  block:
    - name: Check if ipmi_exporter is already installed
      ansible.builtin.stat:
        path: "{{ ipmi_exporter_install_dir }}/ipmi_exporter"
      register: ipmi_exporter_binary

    - name: Check installed ipmi_exporter version
      ansible.builtin.command: "{{ ipmi_exporter_install_dir }}/ipmi_exporter --version"
      register: ipmi_exporter_installed_version
      changed_when: false
      failed_when: false
      when: ipmi_exporter_binary.stat.exists

    - name: Download ipmi_exporter
      ansible.builtin.get_url:
        url: "https://github.com/prometheus-community/ipmi_exporter/releases/download/v{{ ipmi_exporter_version }}/ipmi_exporter-{{ ipmi_exporter_version }}.linux-{{ ipmi_exporter_arch }}.tar.gz"
        dest: "/tmp/ipmi_exporter-{{ ipmi_exporter_version }}.tar.gz"
        mode: "0644"
      when: >
        not ipmi_exporter_binary.stat.exists or
        (ipmi_exporter_installed_version.stdout is defined and
         ipmi_exporter_version not in (ipmi_exporter_installed_version.stdout | default('')))

    - name: Extract ipmi_exporter binary
      ansible.builtin.unarchive:
        src: "/tmp/ipmi_exporter-{{ ipmi_exporter_version }}.tar.gz"
        dest: /tmp/
        remote_src: true
      when: >
        not ipmi_exporter_binary.stat.exists or
        (ipmi_exporter_installed_version.stdout is defined and
         ipmi_exporter_version not in (ipmi_exporter_installed_version.stdout | default('')))

    - name: Install ipmi_exporter binary
      ansible.builtin.copy:
        src: "/tmp/ipmi_exporter-{{ ipmi_exporter_version }}.linux-{{ ipmi_exporter_arch }}/ipmi_exporter"
        dest: "{{ ipmi_exporter_install_dir }}/ipmi_exporter"
        remote_src: true
        mode: "0755"
      notify: Restart ipmi-exporter
      when: >
        not ipmi_exporter_binary.stat.exists or
        (ipmi_exporter_installed_version.stdout is defined and
         ipmi_exporter_version not in (ipmi_exporter_installed_version.stdout | default('')))

    - name: Create ipmi_exporter system user
      ansible.builtin.user:
        name: ipmi_exporter
        system: true
        shell: /usr/sbin/nologin
        create_home: false

    - name: Deploy ipmi_exporter systemd unit
      ansible.builtin.template:
        src: ipmi-exporter.service.j2
        dest: /etc/systemd/system/ipmi-exporter.service
        mode: "0644"
      notify: Restart ipmi-exporter

    - name: Enable and start ipmi-exporter
      ansible.builtin.systemd:
        name: ipmi-exporter
        enabled: true
        state: started
        daemon_reload: true

    - name: Clean up download artifacts
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "/tmp/ipmi_exporter-{{ ipmi_exporter_version }}.tar.gz"
        - "/tmp/ipmi_exporter-{{ ipmi_exporter_version }}.linux-{{ ipmi_exporter_arch }}"
