---
# r730xd-exporters: Deploy Prometheus exporters as a Docker Compose service

- name: Create exporters config directory
  ansible.builtin.file:
    path: "{{ exporters_compose_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy blackbox exporter configuration
  ansible.builtin.template:
    src: blackbox.yml.j2
    dest: "{{ exporters_compose_dir }}/blackbox.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart observability-exporters

- name: Deploy exporters docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ exporters_compose_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: Restart observability-exporters

- name: Ensure exporters are running
  ansible.builtin.command: docker compose up -d
  args:
    chdir: "{{ exporters_compose_dir }}"
  register: exporters_up
  changed_when: "'Started' in exporters_up.stderr or 'Created' in exporters_up.stderr"

- name: Wait for postgres-exporter
  ansible.builtin.wait_for:
    port: "{{ postgres_exporter_port }}"
    delay: 3
    timeout: 60

- name: Wait for kv-cache-exporter
  ansible.builtin.wait_for:
    port: "{{ kv_cache_exporter_port }}"
    delay: 3
    timeout: 60

- name: Wait for blackbox-exporter
  ansible.builtin.wait_for:
    port: "{{ blackbox_exporter_port }}"
    delay: 3
    timeout: 60

- name: Wait for cadvisor
  ansible.builtin.wait_for:
    port: "{{ cadvisor_port }}"
    delay: 3
    timeout: 60

- name: Display exporters summary
  ansible.builtin.debug:
    msg:
      - "=== Prometheus Exporters ==="
      - ""
      - "postgres-exporter: http://{{ ansible_facts['default_ipv4']['address'] | default(r730xd_ip) }}:{{ postgres_exporter_port }}"
      - "kv-cache-exporter: http://{{ ansible_facts['default_ipv4']['address'] | default(r730xd_ip) }}:{{ kv_cache_exporter_port }}"
      - "blackbox-exporter: http://{{ ansible_facts['default_ipv4']['address'] | default(r730xd_ip) }}:{{ blackbox_exporter_port }}"
      - "cadvisor:          http://{{ ansible_facts['default_ipv4']['address'] | default(r730xd_ip) }}:{{ cadvisor_port }}"
