---
# r730xd-openbao-agent role defaults
# An OpenBao Agent that auto-authenticates via AppRole and writes a short-TTL
# token to a file sink, which Prometheus reads to scrape /v1/sys/metrics.
# See issue #41 and docs/runbooks/openbao-quickref.md.

# Reuse the OpenBao image (same binary ships the agent) and API address.
openbao_agent_image: "openbao/openbao:{{ openbao_version | default('2.5.2') }}"

# OpenBao API address the agent authenticates against. Must be the LAN IP
# (not loopback) so the source address falls inside secret_id_bound_cidrs
# (10.0.0.0/24) on the AppRole.
openbao_agent_addr: "{{ openbao_api_addr }}"

# Host paths (openbao_agent_base_dir / openbao_agent_sink_dir come from
# group_vars/all/vars.yml so the prometheus role can mount the sink).
openbao_agent_compose_dir: "{{ openbao_agent_base_dir }}"
openbao_agent_role_id_file: "{{ openbao_agent_base_dir }}/role_id"
openbao_agent_secret_id_file: "{{ openbao_agent_base_dir }}/secret_id"
openbao_agent_sink_token_file: "{{ openbao_agent_sink_dir }}/token"

openbao_agent_memory_limit: "128m"
