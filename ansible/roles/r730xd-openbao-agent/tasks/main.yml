---
# r730xd-openbao-agent: deploy the OpenBao Agent that mints the Prometheus
# sys/metrics scrape token. AppRole creds are supplied by
# setup-openbao-prometheus-agent.yml (no_log).

- name: Stat the existing secret_id (idempotent re-runs don't re-mint)
  ansible.builtin.stat:
    path: "{{ openbao_agent_secret_id_file }}"
  register: openbao_agent_secret_id_stat
  tags: [openbao-agent]

- name: Assert AppRole credentials are available
  ansible.builtin.assert:
    that:
      - openbao_agent_role_id is defined and openbao_agent_role_id | length > 0
      - (openbao_agent_secret_id is defined and openbao_agent_secret_id | length > 0)
        or openbao_agent_secret_id_stat.stat.exists
    fail_msg: >
      role_id missing, or no secret_id was minted and none exists on disk. Apply
      this role via setup-openbao-prometheus-agent.yml, which mints them from
      OpenBao.
  no_log: true
  tags: [openbao-agent]

- name: Create OpenBao Agent base directory
  # 0750: holds the 0600 secret_id; not world-traversable.
  ansible.builtin.file:
    path: "{{ openbao_agent_base_dir }}"
    state: directory
    mode: "0750"
  tags: [openbao-agent]

- name: Create OpenBao Agent sink directory
  # 0755 so the Prometheus container (non-root UID) can traverse in to read the
  # 0644 token file. Only the short-TTL sys/metrics token lives here.
  ansible.builtin.file:
    path: "{{ openbao_agent_sink_dir }}"
    state: directory
    mode: "0755"
  tags: [openbao-agent]

- name: Write AppRole role_id
  ansible.builtin.copy:
    content: "{{ openbao_agent_role_id }}"
    dest: "{{ openbao_agent_role_id_file }}"
    mode: "0600"
  no_log: true
  notify: Restart openbao-agent
  tags: [openbao-agent]

- name: Write AppRole secret_id
  ansible.builtin.copy:
    content: "{{ openbao_agent_secret_id }}"
    dest: "{{ openbao_agent_secret_id_file }}"
    mode: "0600"
  when: openbao_agent_secret_id is defined and openbao_agent_secret_id | length > 0
  no_log: true
  notify: Restart openbao-agent
  tags: [openbao-agent]

- name: Deploy OpenBao Agent configuration
  ansible.builtin.template:
    src: openbao-agent.hcl.j2
    dest: "{{ openbao_agent_compose_dir }}/openbao-agent.hcl"
    mode: "0644"
  notify: Restart openbao-agent
  tags: [openbao-agent]

- name: Deploy OpenBao Agent docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ openbao_agent_compose_dir }}/docker-compose.yml"
    mode: "0644"
  notify: Restart openbao-agent
  tags: [openbao-agent]

- name: Ensure OpenBao Agent is running
  ansible.builtin.command: docker compose up -d
  args:
    chdir: "{{ openbao_agent_compose_dir }}"
  register: openbao_agent_up
  changed_when: "'Started' in openbao_agent_up.stderr or 'Created' in openbao_agent_up.stderr"
  tags: [openbao-agent]

- name: Flush handlers so a config change restarts the agent before the wait
  ansible.builtin.meta: flush_handlers

- name: Wait for the sink token to be written
  ansible.builtin.wait_for:
    path: "{{ openbao_agent_sink_token_file }}"
    state: present
    timeout: 30
  tags: [openbao-agent]
