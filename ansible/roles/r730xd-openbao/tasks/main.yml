---
# r730xd-openbao: Deploy OpenBao as a Docker Compose service with
# systemd-sequenced scripted unseal.
#
# Prerequisites (enforced by deploy-openbao.yml pre_tasks):
#   - ZFS pool mounted at /mnt/zfs
#   - Docker installed and running
#   - infisical_openbao_client_id / _client_secret surfaced from vault.yml

# ---------------------------------------------------------------------
# 0. System prereqs — community.crypto modules need the Python
#    cryptography binding at runtime; the apt package ships bindings
#    for Debian's system Python.
# ---------------------------------------------------------------------
- name: Ensure python3-cryptography is installed
  ansible.builtin.apt:
    name: python3-cryptography
    state: present
    update_cache: true
    cache_valid_time: 3600

# ---------------------------------------------------------------------
# 1. Filesystem layout
# ---------------------------------------------------------------------
- name: Create OpenBao directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ openbao_data_dir }}", mode: "0700" }
    - { path: "{{ openbao_audit_dir }}", mode: "0700" }
    - { path: "{{ openbao_backup_dir }}", mode: "0700" }
    - { path: "{{ openbao_compose_dir }}", mode: "0750" }
    - { path: "{{ openbao_config_dir }}", mode: "0750" }
    - { path: "{{ openbao_tls_dir }}", mode: "0750" }

# ---------------------------------------------------------------------
# 2. Self-signed TLS (CA + server cert, SAN-pinned to r730xd + 127.0.0.1)
# ---------------------------------------------------------------------
- name: Check existing server cert
  ansible.builtin.stat:
    path: "{{ openbao_tls_dir }}/server.crt"
  register: openbao_existing_cert

- name: Read existing server cert (for expiry check)
  community.crypto.x509_certificate_info:
    path: "{{ openbao_tls_dir }}/server.crt"
  register: openbao_cert_info
  when: openbao_existing_cert.stat.exists

- name: Decide whether to regenerate TLS material
  ansible.builtin.set_fact:
    openbao_regen_tls: >-
      {{
        not openbao_existing_cert.stat.exists
        or (openbao_cert_info.not_after is not defined)
        or (
          (
            (openbao_cert_info.not_after | to_datetime('%Y%m%d%H%M%SZ'))
            - (ansible_date_time.iso8601 | to_datetime('%Y-%m-%dT%H:%M:%SZ'))
          ).days < openbao_tls_renew_within_days
        )
      }}

- name: Generate CA private key
  community.crypto.openssl_privatekey:
    path: "{{ openbao_tls_dir }}/ca.key"
    size: 4096
    type: RSA
    mode: "0600"
    owner: root
    group: root
  when: openbao_regen_tls

# A self-signed cert without a CSR ends up with empty Subject/Issuer
# and no CA:TRUE basic constraint — clients (curl/openssl) then reject
# it as "invalid CA certificate." Drive the CA cert through a CSR with
# the right constraints.
- name: Generate CA CSR
  community.crypto.openssl_csr:
    path: "{{ openbao_tls_dir }}/ca.csr"
    privatekey_path: "{{ openbao_tls_dir }}/ca.key"
    common_name: "{{ openbao_tls_ca_common_name }}"
    basic_constraints:
      - "CA:TRUE"
    basic_constraints_critical: true
    key_usage:
      - cRLSign
      - keyCertSign
    key_usage_critical: true
    use_common_name_for_san: false
    mode: "0644"
  when: openbao_regen_tls

- name: Generate self-signed CA certificate
  community.crypto.x509_certificate:
    path: "{{ openbao_tls_dir }}/ca.crt"
    privatekey_path: "{{ openbao_tls_dir }}/ca.key"
    csr_path: "{{ openbao_tls_dir }}/ca.csr"
    provider: selfsigned
    selfsigned_not_after: "+{{ openbao_tls_cert_valid_days }}d"
    selfsigned_digest: sha256
    mode: "0644"
    owner: root
    group: root
  when: openbao_regen_tls

- name: Generate server private key
  community.crypto.openssl_privatekey:
    path: "{{ openbao_tls_dir }}/server.key"
    size: 4096
    type: RSA
    mode: "0600"
    owner: root
    group: root
  when: openbao_regen_tls

- name: Generate server CSR
  community.crypto.openssl_csr:
    path: "{{ openbao_tls_dir }}/server.csr"
    privatekey_path: "{{ openbao_tls_dir }}/server.key"
    common_name: "{{ openbao_tls_server_common_name }}"
    subject_alt_name: "{{ openbao_tls_server_alt_names }}"
    mode: "0644"
  when: openbao_regen_tls

- name: Sign server certificate with CA
  community.crypto.x509_certificate:
    path: "{{ openbao_tls_dir }}/server.crt"
    csr_path: "{{ openbao_tls_dir }}/server.csr"
    ownca_path: "{{ openbao_tls_dir }}/ca.crt"
    ownca_privatekey_path: "{{ openbao_tls_dir }}/ca.key"
    provider: ownca
    ownca_not_after: "+{{ openbao_tls_cert_valid_days }}d"
    ownca_digest: sha256
    mode: "0644"
    owner: root
    group: root
  when: openbao_regen_tls
  notify: Restart foundation-openbao

- name: Install CA bundle into system trust store
  ansible.builtin.copy:
    src: "{{ openbao_tls_dir }}/ca.crt"
    dest: /usr/local/share/ca-certificates/grizzly-platform-openbao-ca.crt
    remote_src: true
    mode: "0644"
  register: openbao_ca_installed

# Ensures no orphaned lab-iac-openbao-ca.crt (same CA bytes, old
# filename) lingers and clutters the trust store.
- name: Remove legacy lab-iac CA bundle from trust store
  ansible.builtin.file:
    path: /usr/local/share/ca-certificates/lab-iac-openbao-ca.crt
    state: absent
  register: openbao_legacy_ca_removed

- name: Refresh system CA store
  ansible.builtin.command: update-ca-certificates
  changed_when: true
  when: openbao_ca_installed.changed or openbao_legacy_ca_removed.changed

# ---------------------------------------------------------------------
# 3. OpenBao server config + compose
# ---------------------------------------------------------------------
- name: Deploy OpenBao server config
  ansible.builtin.template:
    src: openbao.hcl.j2
    dest: "{{ openbao_config_dir }}/openbao.hcl"
    owner: root
    group: root
    mode: "0640"
  notify: Restart foundation-openbao

- name: Deploy OpenBao docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ openbao_compose_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0640"
  notify: Restart foundation-openbao

- name: Deploy Infisical auth env file (bootstrap credential)
  ansible.builtin.template:
    src: infisical-auth.env.j2
    dest: "{{ openbao_infisical_auth_env_file }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: Restart openbao-auto-unseal

# ---------------------------------------------------------------------
# 4. bao CLI (OpenBao client) — installed from the GitHub release
# ---------------------------------------------------------------------
- name: Check if bao CLI is already installed
  ansible.builtin.stat:
    path: "{{ openbao_cli_install_dir }}/bao"
  register: openbao_cli_binary

- name: Check installed bao CLI version
  ansible.builtin.command: "{{ openbao_cli_install_dir }}/bao version"
  register: openbao_cli_installed_version
  changed_when: false
  failed_when: false
  when: openbao_cli_binary.stat.exists

- name: Decide whether to (re)install bao CLI
  ansible.builtin.set_fact:
    openbao_install_cli: >-
      {{
        not openbao_cli_binary.stat.exists
        or (openbao_cli_installed_version.stdout is defined
            and openbao_version not in (openbao_cli_installed_version.stdout | default('')))
      }}

- name: Install bao CLI
  when: openbao_install_cli
  block:
    - name: Download bao CLI tarball
      ansible.builtin.get_url:
        url: "{{ openbao_cli_download_url }}"
        dest: "/tmp/bao_{{ openbao_version }}_{{ openbao_cli_arch }}.tar.gz"
        mode: "0644"

    - name: Extract bao CLI
      ansible.builtin.unarchive:
        src: "/tmp/bao_{{ openbao_version }}_{{ openbao_cli_arch }}.tar.gz"
        dest: /tmp/
        remote_src: true

    - name: Install bao CLI binary
      ansible.builtin.copy:
        src: "/tmp/bao"
        dest: "{{ openbao_cli_install_dir }}/bao"
        remote_src: true
        mode: "0755"
        owner: root
        group: root

    - name: Clean up bao CLI download artifacts
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "/tmp/bao_{{ openbao_version }}_{{ openbao_cli_arch }}.tar.gz"
        - "/tmp/bao"

# ---------------------------------------------------------------------
# 5. Infisical CLI — needed by auto-unseal script + backup script
# ---------------------------------------------------------------------
- name: Ensure apt prerequisites for Infisical repo
  ansible.builtin.apt:
    name:
      - curl
      - gnupg
      - ca-certificates
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Install Infisical apt signing key
  ansible.builtin.get_url:
    url: https://artifacts-cli.infisical.com/infisical.gpg
    dest: "{{ infisical_cli_keyring }}"
    mode: "0644"
    force: false

- name: Add Infisical apt repository
  ansible.builtin.copy:
    dest: "{{ infisical_cli_apt_list }}"
    content: >
      deb [signed-by={{ infisical_cli_keyring }}]
      https://artifacts-cli.infisical.com/deb stable main
    mode: "0644"
  register: openbao_infisical_repo

- name: Update apt cache (Infisical repo)
  ansible.builtin.apt:
    update_cache: true
  when: openbao_infisical_repo.changed

- name: Install Infisical CLI
  ansible.builtin.apt:
    name: infisical
    state: present

# ---------------------------------------------------------------------
# 6. Unseal + wait-ready scripts
# ---------------------------------------------------------------------
- name: Deploy openbao-wait-ready.sh
  ansible.builtin.template:
    src: openbao-wait-ready.sh.j2
    dest: "{{ openbao_wait_ready_script }}"
    owner: root
    group: root
    mode: "0755"

- name: Deploy openbao-auto-unseal.sh
  ansible.builtin.template:
    src: openbao-auto-unseal.sh.j2
    dest: "{{ openbao_unseal_script }}"
    owner: root
    group: root
    mode: "0750"

# ---------------------------------------------------------------------
# 7. Systemd units (server lifecycle + auto-unseal oneshot)
# ---------------------------------------------------------------------
- name: Deploy foundation-openbao.service
  ansible.builtin.template:
    src: foundation-openbao.service.j2
    dest: "/etc/systemd/system/{{ openbao_server_unit_name }}"
    owner: root
    group: root
    mode: "0644"
  register: openbao_server_unit

- name: Deploy openbao-auto-unseal.service
  ansible.builtin.template:
    src: openbao-auto-unseal.service.j2
    dest: "/etc/systemd/system/{{ openbao_unseal_unit_name }}"
    owner: root
    group: root
    mode: "0644"
  register: openbao_unseal_unit

- name: Reload systemd if units changed
  ansible.builtin.systemd_service:
    daemon_reload: true
  when: openbao_server_unit.changed or openbao_unseal_unit.changed

- name: Enable and start foundation-openbao.service
  ansible.builtin.systemd_service:
    name: "{{ openbao_server_unit_name }}"
    enabled: true
    state: started

- name: Enable openbao-auto-unseal.service (runs on every boot)
  ansible.builtin.systemd_service:
    name: "{{ openbao_unseal_unit_name }}"
    enabled: true

# Only "start" the unseal unit if the vault is already initialized.
# On a fresh install the vault is not initialized and the unseal script
# is a no-op, but we want bootstrap-openbao.yml to trigger the first
# unseal explicitly rather than as a side effect of role apply.
- name: Check OpenBao initialization status
  ansible.builtin.command:
    argv:
      - "{{ openbao_cli_install_dir }}/bao"
      - status
      - -format=json
  environment:
    VAULT_ADDR: "{{ openbao_loopback_addr }}"
    VAULT_CACERT: "{{ openbao_tls_dir }}/ca.crt"
    BAO_ADDR: "{{ openbao_loopback_addr }}"
    BAO_CACERT: "{{ openbao_tls_dir }}/ca.crt"
  register: openbao_status_check
  changed_when: false
  failed_when: false
  retries: 10
  delay: 3
  until: openbao_status_check.rc in [0, 1, 2]

- name: Trigger auto-unseal if the vault is already initialized
  ansible.builtin.systemd_service:
    name: "{{ openbao_unseal_unit_name }}"
    state: restarted
  when: >
    openbao_status_check.stdout is defined
    and '"initialized": true' in openbao_status_check.stdout

# ---------------------------------------------------------------------
# 8. Audit log rotation
# ---------------------------------------------------------------------
- name: Deploy audit log rotation
  ansible.builtin.template:
    src: openbao-audit.logrotate.j2
    dest: /etc/logrotate.d/openbao-audit
    owner: root
    group: root
    mode: "0644"
  when: openbao_audit_logrotate_enabled | bool

# ---------------------------------------------------------------------
# 9. Backup (Raft snapshot)
# ---------------------------------------------------------------------
- name: Deploy OpenBao backup script
  ansible.builtin.template:
    src: openbao-backup.sh.j2
    dest: "{{ openbao_backup_script }}"
    owner: root
    group: root
    mode: "0750"
  when: openbao_backup_enabled | bool

- name: Schedule daily OpenBao Raft snapshot
  ansible.builtin.cron:
    name: "foundation-openbao-backup"
    job: "{{ openbao_backup_script }} >> /var/log/openbao-backup.log 2>&1"
    hour: "{{ openbao_backup_cron_hour }}"
    minute: "{{ openbao_backup_cron_minute }}"
    user: root
  when: openbao_backup_enabled | bool

# ---------------------------------------------------------------------
# 10. Summary
# ---------------------------------------------------------------------
- name: Display OpenBao summary
  ansible.builtin.debug:
    msg:
      - "=== OpenBao {{ openbao_version }} ==="
      - ""
      - "API:         {{ openbao_api_addr }}"
      - "CA cert:     {{ openbao_tls_dir }}/ca.crt (also /usr/local/share/ca-certificates/)"
      - "Data:        {{ openbao_data_dir }} (Raft)"
      - "Audit log:   {{ openbao_audit_log_file }}"
      - "Backup:      {{ 'daily at ' ~ openbao_backup_cron_hour ~ ':' ~ openbao_backup_cron_minute ~ ' → ' ~ openbao_backup_dir if openbao_backup_enabled | bool else 'disabled' }}"
      - ""
      - "Server unit: {{ openbao_server_unit_name }}"
      - "Unseal unit: {{ openbao_unseal_unit_name }}"
      - ""
      - "Initialized: {{ '\"initialized\": true' in (openbao_status_check.stdout | default('')) }}"
      - ""
      - "Next step:   ansible-playbook ansible/playbooks/bootstrap-openbao.yml (run once)"
