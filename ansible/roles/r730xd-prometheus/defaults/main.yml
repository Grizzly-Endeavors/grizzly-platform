---
# r730xd-prometheus: Prometheus + Alertmanager on Docker
# Data on ZFS pool (tank/observability/prometheus, recordsize=128K)
# Scrapes node_exporter, ipmi_exporter, and observability services
#
# Prometheus: http://<r730xd_ip>:9090
# Alertmanager: http://<r730xd_ip>:9093

# Images (pinned versions)
prometheus_image: "prom/prometheus:v3.4.0"
alertmanager_image: "prom/alertmanager:v0.28.1"

# Networking (published ports)
prometheus_port: 9090
alertmanager_port: 9093

# Directories
prometheus_data_dir: "/mnt/zfs/observability/prometheus/data"
alertmanager_data_dir: "/mnt/zfs/observability/prometheus/alertmanager"
prometheus_compose_dir: "/opt/observability/prometheus"

# Retention
prometheus_retention_time: "30d"
prometheus_retention_size: "10GB"

# Memory limits
prometheus_memory_limit: "1536m"
alertmanager_memory_limit: "128m"

# Scrape configuration
prometheus_scrape_interval: "15s"
prometheus_evaluation_interval: "15s"

# Scrape targets — node_exporter
# (staging-vm entry removed 2026-04-09 with ADR-002 teardown.)
prometheus_node_targets:
  - target: "{{ r730xd_ip }}:9100"
    labels:
      instance: "r730xd"
  # Scraped over the wg0 point-to-point tunnel, not the public IP (firewalled).
  # Nothing exposed publicly — see ADR-019 and issue #42.
  - target: "{{ wg_vps_ip }}:9100"
    labels:
      instance: "proxy-vps"

# Scrape targets — ipmi_exporter
prometheus_ipmi_targets:
  - target: "{{ r730xd_ip }}:9290"
    labels:
      instance: "r730xd"

# Scrape targets — observability services (self + stack)
prometheus_observability_targets:
  - job: "prometheus"
    target: "localhost:9090"
  - job: "loki"
    target: "{{ r730xd_ip }}:3100"
  - job: "tempo"
    target: "{{ r730xd_ip }}:3200"
  - job: "grafana"
    target: "{{ r730xd_ip }}:3000"
  - job: "minio-obs"
    target: "{{ r730xd_ip }}:9000"
    metrics_path: "/minio/v2/metrics/cluster"
  - job: "minio-bulk"
    target: "{{ r730xd_ip }}:9002"
    metrics_path: "/minio/v2/metrics/cluster"
  # versitygw stores (ADR-055) — scraped via their statsd-exporter sidecars
  # (versitygw has no native Prometheus endpoint). Coexist with the minio-*
  # jobs during the migration; those are removed once MinIO is retired.
  - job: "s3-hot"
    target: "{{ r730xd_ip }}:9102"
  - job: "s3-bulk"
    target: "{{ r730xd_ip }}:9103"
  - job: "postgres-exporter"
    target: "{{ r730xd_ip }}:9187"
  - job: "kv-cache-exporter"
    target: "{{ r730xd_ip }}:9121"
    # oliver006/redis_exporter emits a fixed redis_* namespace; rewrite it to
    # kv_cache_* so the slot's metrics match its function name (not the backend).
    metric_relabel:
      - source_labels: [__name__]
        regex: 'redis_(.*)'
        target_label: __name__
        replacement: 'kv_cache_${1}'
  - job: "cadvisor"
    target: "{{ r730xd_ip }}:8080"
  # Caddy's dedicated metrics listener (caddy_metrics_port), scraped over the
  # wg0 tunnel — not the localhost-only admin API. See issue #42.
  - job: "caddy"
    target: "{{ wg_vps_ip }}:2019"

# Scrape targets — blackbox probes (external endpoints + versitygw liveness)
prometheus_blackbox_targets:
  - "https://landing.bearflinn.com"
  - "https://pennydreadfulsfx.com"
  - "https://resume.bearflinn.com"
  # versitygw /health (ADR-055) — true gateway liveness. The statsd-exporter
  # scrape (s3-hot/s3-bulk jobs) covers metrics but the exporter can be up while
  # the gateway is down, so probe the gateway's own health endpoint directly.
  - "http://{{ r730xd_ip }}:7070/health"
  - "http://{{ r730xd_ip }}:7072/health"

prometheus_blackbox_exporter: "{{ r730xd_ip }}:9115"

# K8s API server metrics (set by setup-k8s-control-plane.yml playbook)
# Empty = disabled; the scrape job block is conditional on this being non-empty
prometheus_k8s_apiserver_target: ""

# Alertmanager — webhook receiver (optional)
# Set monitoring_alert_webhook_url in group_vars to enable
# monitoring_alert_webhook_url: "https://ntfy.example.com/platform-alerts"
