---
# r730xd-prometheus: Deploy Prometheus + Alertmanager as a Docker Compose service

- name: Create Prometheus directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: nobody
    group: nogroup
    mode: "0755"
  loop:
    - "{{ prometheus_data_dir }}"
    - "{{ alertmanager_data_dir }}"

- name: Create Prometheus config directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ prometheus_compose_dir }}"
    - "{{ prometheus_compose_dir }}/rules"
    - "{{ prometheus_compose_dir }}/targets.d"

- name: Render static file_sd targets
  # force: true so these stay in sync with prometheus_node_targets /
  # prometheus_ipmi_targets. Per-worker targets live in separate
  # node-*.yml / ipmi-*.yml files (written by setup-k8s-worker.yml), so there
  # is nothing dynamic in these two files to clobber. The old force: false
  # "seed" left decommissioned hosts (e.g. staging-vm) here forever.
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ prometheus_compose_dir }}/targets.d/{{ item.dest }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - { src: "targets.d/nodes.yml.j2", dest: "nodes.yml" }
    - { src: "targets.d/ipmi.yml.j2", dest: "ipmi.yml" }
  notify: Reload prometheus

- name: Deploy Prometheus configuration
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ prometheus_compose_dir }}/prometheus.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart observability-prometheus

- name: Deploy Prometheus alert rules
  ansible.builtin.template:
    src: rules/grizzly-platform.yml.j2
    dest: "{{ prometheus_compose_dir }}/rules/grizzly-platform.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart observability-prometheus

# Ensures no orphaned rules/homelab.yml lingers — Prometheus loads
# rules/*.yml, so a stray copy would double-evaluate the rules.
- name: Remove legacy homelab rules file
  ansible.builtin.file:
    path: "{{ prometheus_compose_dir }}/rules/homelab.yml"
    state: absent
  notify: Restart observability-prometheus

- name: Deploy Alertmanager configuration
  ansible.builtin.template:
    src: alertmanager.yml.j2
    dest: "{{ prometheus_compose_dir }}/alertmanager.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart observability-prometheus

- name: Deploy Prometheus docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ prometheus_compose_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart observability-prometheus

- name: Ensure Prometheus stack is running
  ansible.builtin.command: docker compose up -d
  args:
    chdir: "{{ prometheus_compose_dir }}"
  register: prometheus_up
  changed_when: "'Started' in prometheus_up.stderr or 'Created' in prometheus_up.stderr"

- name: Wait for Prometheus to accept connections
  ansible.builtin.wait_for:
    port: "{{ prometheus_port }}"
    delay: 3
    timeout: 60

- name: Verify Prometheus health
  ansible.builtin.uri:
    url: "http://localhost:{{ prometheus_port }}/-/healthy"
    status_code: 200
  retries: 5
  delay: 5
  register: prometheus_health
  until: prometheus_health.status == 200

- name: Wait for Alertmanager to accept connections
  ansible.builtin.wait_for:
    port: "{{ alertmanager_port }}"
    delay: 3
    timeout: 60

- name: Verify Alertmanager health
  ansible.builtin.uri:
    url: "http://localhost:{{ alertmanager_port }}/-/healthy"
    status_code: 200
  retries: 5
  delay: 5
  register: alertmanager_health
  until: alertmanager_health.status == 200

- name: Display Prometheus summary
  ansible.builtin.debug:
    msg:
      - "=== Prometheus + Alertmanager ==="
      - ""
      - "Prometheus: http://{{ ansible_facts['default_ipv4']['address'] | default(r730xd_ip) }}:{{ prometheus_port }}"
      - "Alertmanager: http://{{ ansible_facts['default_ipv4']['address'] | default(r730xd_ip) }}:{{ alertmanager_port }}"
      - "Data: {{ prometheus_data_dir }}"
      - "Config: {{ prometheus_compose_dir }}"
      - "Retention: {{ prometheus_retention_time }} / {{ prometheus_retention_size }}"
