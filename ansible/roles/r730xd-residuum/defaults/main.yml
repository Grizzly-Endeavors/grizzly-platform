---
# r730xd-residuum: Residuum personal agent — platform assistant
#
# Runs the STOCK published residuum image (no custom build) so the deployment
# tracks upstream releases directly. External CLIs are supplied at runtime via
# residuum's [tools] PATH mechanism from a read-only tools volume, so adding a
# tool never requires an image rebuild.
#
# Reachability: browser access is via residuum's OUTBOUND Cloud relay
# (wss://agent-residuum.com). The gateway binds loopback inside the container
# and publishes NO ports — there is no LAN listener and no ingress DNAT rule.
#
# Capability boundary: the agent mutates the platform through IaC only —
# edit repo files -> commit -> push branch -> open PR. A human merges; Flux/CI
# applies. Its GitHub token is PR-scoped (no merge/admin).

# Image (pinned — bump on each residuum release; see docs/runbooks/residuum.md)
residuum_image: "ghcr.io/grizzly-endeavors/residuum:2026.07.20-2"

# Filesystem layout — state on the ZFS hot tier (all agent memory lives here)
residuum_data_dir: "/mnt/zfs/foundation/residuum"
residuum_compose_dir: "/opt/residuum"
# Tools volume: mounted READ-ONLY into the container. The agent can USE these
# binaries but cannot modify its own toolbox (it can still self-install into
# the writable ~/.residuum/bin on the state volume).
residuum_tools_dir: "/opt/residuum-tools"

# systemd unit (owns the compose lifecycle + boot ordering / ZFS mount guard)
residuum_server_unit_name: "foundation-residuum.service"

# Gateway — loopback only. The relay tunnel dials local_port on loopback
# inside the same container, so nothing needs to be published.
residuum_gateway_bind: "127.0.0.1"
residuum_gateway_port: 7700

# IANA timezone — REQUIRED by residuum; it refuses to boot without one and
# would otherwise drop into the interactive setup wizard.
residuum_timezone: "America/New_York"

# Cloud relay (browser access)
residuum_relay_url: "wss://agent-residuum.com/tunnel/register"

# ── Models ───────────────────────────────────────────────────────────────────
# main: Ollama Cloud GLM-5.2 (tools + thinking, 1M ctx).
# observer/reflector/pulse + embedding: Google AI Studio free tier.
# Model ids verified live against the Gemini ListModels API (2026-07-20).
residuum_model_main: "ollama-cloud/glm-5.2:cloud"
residuum_model_flash: "google-ai/gemini-3.5-flash"
# NOTE: changing the embedding model invalidates the existing vector store —
# it would need a re-index. Pinned to the long-stable GA model.
residuum_model_embedding: "google-ai/gemini-embedding-001"

residuum_ollama_url: "https://ollama.com"

# ── Tools volume contents ────────────────────────────────────────────────────
# Single-file static binaries only — that is all the [tools] PATH mechanism can
# supply (git and ca-certificates ship in the image itself; see residuum #112).
#
# Versions are matched to the PLATFORM, not blindly latest:
#   kubectl -> in ±1 skew with the cluster API server (v1.33.x)
#   flux    -> matches the deployed source-controller (v1.8.2 / flux2 v2.8.x)
#   bao     -> matches the OpenBao server (v2.5.2)
# Re-verify (and refresh checksums) before bumping any of these.
residuum_tool_gh_version: "2.96.0"
residuum_tool_gh_sha256: "83d5c2ccad5498f58bf6368acb1ab32588cf43ab3a4b1c301bf36328b1c8bd60"

residuum_tool_kubectl_version: "v1.33.13"
residuum_tool_kubectl_sha256: "316d712726d857c20744c57cb36aa47cfc79bc0af7e82cebf3780244b654c073"

residuum_tool_flux_version: "2.8.5"
residuum_tool_flux_sha256: "63c178ba938a5443265b2ce02691c005acf4ef6188d4dbb9b9d87333558948c4"

residuum_tool_bao_version: "2.5.2"
residuum_tool_bao_sha256: "26556656a851adc7f139d1c3778bc39cb24bc846bd685ee8b2d8b4661518b085"

residuum_tool_uv_version: "0.11.30"
residuum_tool_uv_sha256: "04bc7d180d6138bf6dc08387acf507a823f397a98fea55da36b0ccc7fbce3b68"

# Tools shipped as tarballs (kubectl is a bare binary, handled separately).
# bin_path is the binary's location INSIDE the extracted archive.
residuum_tool_archives:
  - name: gh
    version: "{{ residuum_tool_gh_version }}"
    url: "https://github.com/cli/cli/releases/download/v{{ residuum_tool_gh_version }}/gh_{{ residuum_tool_gh_version }}_linux_amd64.tar.gz"
    sha256: "{{ residuum_tool_gh_sha256 }}"
    bin_path: "gh_{{ residuum_tool_gh_version }}_linux_amd64/bin/gh"
  - name: flux
    version: "{{ residuum_tool_flux_version }}"
    url: "https://github.com/fluxcd/flux2/releases/download/v{{ residuum_tool_flux_version }}/flux_{{ residuum_tool_flux_version }}_linux_amd64.tar.gz"
    sha256: "{{ residuum_tool_flux_sha256 }}"
    bin_path: "flux"
  - name: bao
    version: "{{ residuum_tool_bao_version }}"
    url: "https://github.com/openbao/openbao/releases/download/v{{ residuum_tool_bao_version }}/bao_{{ residuum_tool_bao_version }}_Linux_x86_64.tar.gz"
    sha256: "{{ residuum_tool_bao_sha256 }}"
    bin_path: "bao"
  - name: uv
    version: "{{ residuum_tool_uv_version }}"
    url: "https://github.com/astral-sh/uv/releases/download/{{ residuum_tool_uv_version }}/uv-x86_64-unknown-linux-gnu.tar.gz"
    sha256: "{{ residuum_tool_uv_sha256 }}"
    bin_path: "uv-x86_64-unknown-linux-gnu/uv"

# Secrets — sourced from OpenBao at play time via ansible/vars/openbao_secrets.yml
# (secret/grizzly-platform/platform/residuum). Listed here only as documentation;
# the role never hardcodes them:
#   residuum_ollama_api_key: "{{ vault_residuum_ollama_api_key }}"
#   residuum_gemini_api_key: "{{ vault_residuum_gemini_api_key }}"
#   residuum_cloud_token:    "{{ vault_residuum_cloud_token }}"
#   residuum_github_token:   "{{ vault_residuum_github_token }}"

# Git identity used for the agent's IaC commits
residuum_git_author_name: "residuum"
residuum_git_author_email: "residuum@grizzly-endeavors.com"
