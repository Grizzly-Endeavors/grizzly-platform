---
# r730xd-s3-hot: versitygw S3 gateway — HOT tier on ZFS (ADR-055)
#
# Stateless S3 gateway storing objects as plain POSIX files on the ZFS hot
# dataset tank/foundation/s3-hot (recordsize 1M). Durability rides on ZFS;
# IAM accounts live in OpenBao (Vault IAM mode, set up by
# setup-versitygw-iam.yml). Replaces MinIO Obs — stands up alongside it on
# fresh ports/paths during the migration, and inherits the hot-S3 role once
# MinIO is retired. Config is 100% flags/env (versitygw holds no config
# state) — see docs/runbooks/versitygw-cli.md.
#
# S3 API:  http://<r730xd_ip>:7070
# Metrics: http://<r730xd_ip>:9102/metrics  (statsd-exporter sidecar;
#          versitygw has no native Prometheus endpoint)

# Images (pinned — verified current stable 2026-07-06; re-verify before bump)
s3_hot_versitygw_image: "ghcr.io/versity/versitygw:v1.6.0"
# v0.30.0 only shipped a -distroless image tag (the plain non-distroless line
# stops at v0.29.0); distroless is preferable anyway — static Go binary, no
# shell needed here.
s3_hot_statsd_exporter_image: "prom/statsd-exporter:v0.30.0-distroless"

# Networking — published ports coexist with live MinIO on 9000-9003
s3_hot_s3_port: 7070            # S3 API (LAN-published)
s3_hot_admin_port: 7071         # admin API — container-internal ONLY (not published)
s3_hot_metrics_port: 9102       # statsd-exporter Prometheus metrics (LAN-published)
s3_hot_statsd_port: 9125        # statsd-exporter UDP intake (compose-internal only)

# Filesystem layout — hot ZFS tier
s3_hot_data_dir: "/mnt/zfs/foundation/s3-hot/data"
s3_hot_versions_dir: "/mnt/zfs/foundation/s3-hot/versions"
s3_hot_compose_dir: "/opt/foundation/s3-hot"
s3_hot_config_dir: "/etc/versitygw/s3-hot"

# systemd unit (owns the compose lifecycle + boot ordering / mount guard)
s3_hot_server_unit_name: "foundation-s3-hot.service"

# S3 region string
s3_hot_region: "us-east-1"

# OpenBao Vault-IAM backend (mount + approle from setup-versitygw-iam.yml)
s3_hot_iam_vault_endpoint: "{{ openbao_api_addr }}"
s3_hot_iam_vault_mount_path: "versitygw-iam"
s3_hot_iam_vault_storage_path: "s3-hot"   # per-instance account namespace under the shared mount
s3_hot_iam_vault_ca_path: "{{ openbao_tls_ca_path | default('/etc/openbao/tls/ca.crt') }}"

# Root credentials + shared IAM AppRole creds — sourced from OpenBao via
# group_vars/all/vars.yml (inherited at play time; commented here like the
# MinIO roles so the role file itself never hardcodes secrets):
#   s3_hot_root_access_key:     "{{ vault_s3_hot_root_access_key }}"
#   s3_hot_root_secret_key:     "{{ vault_s3_hot_root_secret_key }}"
#   versitygw_iam_role_id:      "{{ vault_versitygw_iam_role_id }}"
#   versitygw_iam_role_secret:  "{{ vault_versitygw_iam_secret_id }}"
