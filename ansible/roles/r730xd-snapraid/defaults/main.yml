---
# r730xd-snapraid: SnapRAID parity protection with automated sync and scrub
#
# Requires: data_drive_mounts fact set by r730xd-storage-prep role
#   Drives with role == "parity" are used for parity files
#   Drives with role == "data" are protected by parity
#
# Drive assignment comes entirely from r730xd_drive_bays in inventory.

# --- Content Files ---
# At least one content file must be on a non-data, non-parity location.
# This path is on the boot SSD.
snapraid_boot_content_path: "/var/lib/snapraid/snapraid.content"

# --- Exclude Patterns ---
snapraid_excludes:
  - "*.unrecoverable"
  # Unanchored (no leading slash) so it matches any directory named "tmp" at
  # any depth — covers root /tmp as well as transient tmp dirs anywhere.
  - "tmp/"
  # versitygw's transient multipart-upload staging dir (one per bucket:
  # <bucket>/.sgwtmp/multipart/). It holds in-flight parts that are created
  # and removed as uploads complete, so it changes mid-sync and would cause
  # "cannot modify during sync" errors. Committed object data and the
  # write-once version files (under the versitygw versioning dir) live outside
  # .sgwtmp/ and stay parity-covered. (The former MinIO `.minio.sys/` exclude
  # was dropped when MinIO Bulk was retired — ADR-055.)
  - ".sgwtmp/"
  - "/lost+found/"
  - ".Thumbs.db"
  - ".DS_Store"
  - "*.part"
  - "/.snapraid.content"

# --- SnapRAID Options ---
# Block size in KiB (256 is the default and recommended)
snapraid_block_size: 256

# Auto-save sync progress every N GiB (allows resume if interrupted)
snapraid_autosave_gb: 250

# --- Automation (systemd timers) ---
snapraid_timer_enabled: true

# Sync schedule — daily at 03:00
snapraid_sync_schedule: "*-*-* 03:00:00"

# Scrub schedule — weekly Sunday at 05:00
snapraid_scrub_schedule: "Sun *-*-* 05:00:00"

# Percentage of array to verify per scrub run
# 8% weekly ≈ full coverage every ~3 months
snapraid_scrub_percentage: 8

# Only scrub blocks older than this many days
snapraid_scrub_min_age: 10

# Safety net: abort sync if more than N files were deleted since the last sync.
# Prevents accidental mass deletion (e.g. an unmounted data disk) from
# propagating to parity. Enforced by the snapraid-sync.sh wrapper, since
# `snapraid` itself has no equivalent CLI flag.
snapraid_delete_threshold: 40

# Path to the sync wrapper script (runs `snapraid diff` then `snapraid sync`,
# enforcing snapraid_delete_threshold). Called by snapraid-sync.service.
snapraid_sync_wrapper_path: "/usr/local/sbin/snapraid-sync.sh"
