---
# r730xd-tempo: Tempo distributed tracing on Docker
# S3 backend via s3-hot versitygw gateway (ADR-055), single-binary mode
# Local data on ZFS pool (tank/observability/tempo, recordsize=128K)
#
# Tempo API: http://<r730xd_ip>:3200
# OTLP gRPC: <r730xd_ip>:4317
# OTLP HTTP: <r730xd_ip>:4318

# Image (pinned version)
tempo_image: "grafana/tempo:2.7.2"

# Networking (published ports)
tempo_api_port: 3200
tempo_otlp_grpc_port: 4317
tempo_otlp_http_port: 4318

# Directories
tempo_data_dir: "/mnt/zfs/observability/tempo/data"
tempo_compose_dir: "/opt/observability/tempo"

# Memory limit
tempo_memory_limit: "512m"

# S3 backend (s3-hot versitygw gateway; was MinIO Obs :9000 pre-ADR-055)
tempo_s3_endpoint: "{{ r730xd_ip }}:7070"
tempo_s3_bucket: "observability-tempo"
# Access keys from group_vars (vault-backed)
# tempo_s3_access_key: "{{ minio_observability_access_key }}"
# tempo_s3_secret_key: "{{ minio_observability_secret_key }}"

# Block retention
tempo_block_retention: "720h"  # 30 days
