---
# r730xd-zfs: Create and configure a ZFS raidz1 pool with service datasets
#
# Hosts foundation stores (PostgreSQL, kv-cache, MinIO Obs) and observability
# stack (Prometheus, Loki, Tempo, Grafana) — all continuous-write workloads
# that are incompatible with SnapRAID's sync-between-writes model.
#
# Requires: zfs_drives fact set by r730xd-zfs.yml pre_tasks
#   Each entry: {bay: N, role: "zfs", serial: "...", device: "sdX"}

# Pool name
zfs_pool_name: "tank"

# Pool type (raidz1 for 3-drive single parity)
zfs_pool_type: "raidz1"

# Mount point for the pool root dataset
zfs_mount_point: "/mnt/zfs"

# Pool properties
zfs_ashift: 12              # 4K sector alignment

# Dataset properties (applied to root dataset)
zfs_compression: "lz4"
zfs_atime: "off"
zfs_xattr: "sa"
zfs_recordsize: "128K"      # default, tunable per child dataset

# ARC max size in bytes (4GB default, out of 32GB total)
# ZFS ARC competes with MergerFS page cache, staging VM, Docker containers
zfs_arc_max_bytes: 4294967296

# Weekly scrub schedule (cron)
zfs_scrub_cron_day: "0"     # Sunday
zfs_scrub_cron_hour: "2"    # 2 AM
zfs_scrub_cron_minute: "0"

# Service datasets — created under the pool with per-workload recordsize tuning
# Each mounts automatically at {{ zfs_mount_point }}/<name>/
zfs_datasets:
  - name: foundation/postgres
    recordsize: 8K        # matches PostgreSQL 8K page size
  - name: foundation/kv-cache
    recordsize: 64K       # sequential AOF append + RDB dumps (Valkey)
  - name: foundation/minio-obs
    recordsize: 1M        # large S3 objects (Loki/Tempo backend)
  # versitygw hot tier (ADR-055) — large S3 objects, same 1M sizing as
  # minio-obs. Stands up alongside minio-obs during the MinIO→versitygw
  # migration; minio-obs is removed and this inherits the hot-S3 role once
  # cutover completes.
  - name: foundation/s3-hot
    recordsize: 1M
  - name: observability/prometheus
    recordsize: 128K      # TSDB blocks
  - name: observability/loki
    recordsize: 128K      # WAL + cache before S3 flush
  - name: observability/tempo
    recordsize: 128K      # WAL + cache before S3 flush
  - name: observability/grafana
    recordsize: 128K      # minimal I/O, co-located with stack
