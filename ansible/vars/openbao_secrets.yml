---
# OpenBao-sourced platform secrets.
#
# Redefines each in-scope `vault_*` variable as a community.hashi_vault
# KV v2 lookup. Auth kwargs are passed INLINE in each lookup rather
# than inherited from ansible_hashi_vault_* vars because Ansible's
# lookup-plugin-vars integration doesn't template the value before
# passing to the plugin (surfaces as a literal `{{ openbao_api_addr }}`
# URL at connect time). Inline kwargs go through Jinja at expression
# expansion and resolve correctly.
#
# DO NOT add this file to group_vars/ — it must be opt-in per playbook
# to avoid hard-coupling every IaC play to OpenBao availability. Include
# via include_vars guarded by `openbao_read_enabled` in each consuming
# playbook.
#
# See docs/decisions/024-platform-secrets-on-openbao.md.

# Short name for the kwargs bundle. YAML anchor won't expand inside
# `lookup(..., **anchor)` (Ansible Jinja doesn't support dict-splat),
# so each lookup repeats the kwargs explicitly.

# --- platform -----------------------------------------------------------
vault_cloudflare_api_token: >-
  {{ lookup('community.hashi_vault.vault_kv2_get',
            'grizzly-platform/platform/cloudflare',
            engine_mount_point='secret',
            url=openbao_api_addr,
            ca_cert=openbao_tls_ca_path,
            auth_method='approle',
            role_id=vault_openbao_approle_role_id,
            secret_id=vault_openbao_approle_secret_id).data.data.api_token }}

