# Node language adapter. Activated by a declared node project (`package.json`
# marker). `npm ci` installs the repo's deps (needed for type resolution); lint +
# typecheck then run against the gate's own config rather than the repo's.
#
# tsc is the structurally-fragile case (a repo's tsconfig defines its own
# module/path layout). When a project sets `tsconfig` in gate-config.json, the
# harness wraps that tsconfig — honoring its module/path resolution while force-
# overriding the strict compiler family, so the repo cannot relax strictness.
# Otherwise `{tsconfig}` resolves to the gate's strict `tsconfig.base.json`.
name = "node"
marker = "package.json"

# Honest-map evidence: any TS/JS file (or extensionless `node` shebang script)
# must be covered by a declared node project (harness `detect`).
[detect]
extensions = ["ts", "tsx", "js", "jsx", "mjs", "cjs"]
shebangs = ["node"]

[[checks]]
name = "deps"
cmd = "npm ci"

[[checks]]
name = "eslint"
cmd = "eslint --config {config}/eslint.config.mjs --no-config-lookup --no-error-on-unmatched-pattern ."

[[checks]]
name = "tsc"
# `--project` carries noEmit/strictness via the (wrapped) tsconfig; passing those
# as flags too conflicts with `-p` on some tsc versions, so they live in config.
cmd = "tsc --project {tsconfig}"
