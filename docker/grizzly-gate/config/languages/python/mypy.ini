; Gate-owned mypy config (authoritative; passed via --config-file). Strict mode
; is the floor; the extra flags push past it. ignore_missing_imports stays on so
; the gate doesn't fail purely on third-party libraries that ship no type stubs
; (not a code-quality signal).
[mypy]
python_version = 3.11
strict = True
warn_unreachable = True
warn_redundant_casts = True
warn_unused_ignores = True
disallow_any_generics = True
extra_checks = True
ignore_missing_imports = True
