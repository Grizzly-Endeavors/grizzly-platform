# grizzly-platform CI gate — default rule set.
#
# This is the platform's central source of truth for "what must pass before an
# image may be signed". It is baked into the grizzly-gate image; updating the
# rules means editing this file and cutting a new gate tag, not patching N
# pipelines. A repo may override with --config, but the default is what Ops owns.
#
# Detectors run when their marker exists at the repo root. Scanners run always
# (source) or when an image is supplied (image). Every tool is pinned in the
# Dockerfile so the rule behaviour is reproducible across gate versions.

# ── Language adapters ──────────────────────────────────────────────────────

[[detectors]]
name = "rust"
marker = "Cargo.toml"
checks = [
  "cargo fmt --all --check",
  "cargo clippy --all-targets --all-features -- -D warnings",
  "cargo deny check",
  "cargo test --all-targets",
]

[[detectors]]
name = "python"
marker = "pyproject.toml"
checks = [
  "ruff check .",
  "mypy .",
  "pytest -q",
]

[[detectors]]
name = "node"
marker = "package.json"
checks = [
  "npm ci",
  "npx --no-install eslint .",
  "npx --no-install tsc --noEmit",
]

[[detectors]]
name = "ansible"
marker = "ansible"
checks = [
  "ansible-lint",
]

[[detectors]]
name = "yaml"
marker = ".yamllint"
checks = [
  "yamllint .",
]

# ── Scanners ───────────────────────────────────────────────────────────────

[[scanners]]
name = "gitleaks"
scope = "source"
cmd = "gitleaks detect --source {source} --no-banner --redact --exit-code 1"

[[scanners]]
name = "semgrep"
scope = "source"
# Offline, pinned ruleset bundled in the image (no registry fetch).
cmd = "semgrep scan --error --quiet --config /etc/grizzly-gate/semgrep {source}"

[[scanners]]
name = "trivy-image"
scope = "image"
cmd = "trivy image --quiet --exit-code 1 --severity HIGH,CRITICAL {image}"
