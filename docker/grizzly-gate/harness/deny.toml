# cargo-deny config for the grizzly-gate harness. Mirrors the grizzly-platform
# Rust fleet convention (see e.g. exile-cli/deny.toml): advisories on, a curated
# license allowlist, and unknown sources denied.

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
confidence-threshold = 0.8
# Broad fleet allowlist is intentional; don't warn on entries not in this
# crate's (small) dep tree.
unused-allowed-license = "allow"
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "MPL-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
