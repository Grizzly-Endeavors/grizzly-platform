apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# The game-servers Namespace is owned by the grizzly-gameservers repo
# (cluster/guardrails), rendered by the grizzly-gameservers-cluster Flux
# Kustomization, so Agones can provision its per-namespace SDK RBAC in order.
# Not defined here to avoid two Flux Kustomizations contending for the object.
resources:
  - source.yaml
  - release.yaml
