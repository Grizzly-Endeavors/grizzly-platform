apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager-issuers
  namespace: flux-system
spec:
  # This Kustomization applies ClusterIssuer resources (cert-manager CRD
  # types) that depend on the cert-manager HelmRelease having installed
  # its CRDs. It lives in its own path so the main "infrastructure"
  # Kustomization doesn't try to dry-run the ClusterIssuer before the
  # CRD exists.
  dependsOn:
    - name: infrastructure
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/infrastructure/cert-manager-issuers
  prune: true
  wait: true
  timeout: 3m
  healthChecks:
    - apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      name: selfsigned-issuer
    - apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      name: letsencrypt-staging
    - apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      name: letsencrypt-prod
