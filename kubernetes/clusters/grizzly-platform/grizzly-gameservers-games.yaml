# Per-game catalog (Agones GameServer/Fleet templates + NodePort Services) from
# the grizzly-gameservers repo ./games. dependsOn the cluster Kustomization for
# CRD-before-CR ordering — a cold sync must not apply GameServer CRs before the
# Agones CRDs exist. The NodePort Services bind ports in 7000-7010, which
# requires the apiserver --service-node-port-range to include that band.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grizzly-gameservers-games
  namespace: flux-system
spec:
  dependsOn:
    - name: grizzly-gameservers-cluster
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: grizzly-gameservers
  path: ./games
  prune: true
  # wait: false — a GameServer's readiness is Agones' lifecycle (Scheduled ->
  # Ready takes minutes and is driven by the in-pod SDK), and Flux's kstatus
  # can't interpret GameServer.status.state, so wait: true blocks the
  # Kustomization indefinitely. Apply the catalog; let Agones own server health.
  wait: false
  timeout: 10m
