apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: build-runner-image
  namespace: argo
spec:
  # Builds the self-hosted GitHub Actions runner image in-cluster via rootless
  # BuildKit and pushes it to the in-cluster zot registry. Source lives in this
  # repo (docker/github-runner); build-runner-image.yaml in .github/workflows
  # submits this template on push. See docs/decisions/057-container-builds-buildkit.md.
  entrypoint: build
  arguments:
    parameters:
      - name: git-ref
        value: master
  volumeClaimTemplates:
    - metadata:
        name: workspace
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: iscsi-zfs
        resources:
          requests:
            storage: 10Gi
  volumes:
    - name: buildkitd-config
      configMap:
        name: buildkitd-config
  templates:
    - name: build
      steps:
        - - name: clone
            template: git-clone
        - - name: build-push
            template: buildkit

    - name: git-clone
      inputs:
        parameters:
          - name: git-ref
            value: "{{workflow.parameters.git-ref}}"
      container:
        image: alpine/git:latest
        command: [sh, -c]
        args:
          - |
            # Shallow fetch of just the requested ref (branch, tag, or SHA) so
            # we don't pull the whole history into the build context.
            git init /workspace/src
            cd /workspace/src
            git remote add origin https://github.com/grizzly-endeavors/grizzly-platform.git
            git fetch --depth=1 origin {{inputs.parameters.git-ref}}
            git checkout FETCH_HEAD
        volumeMounts:
          - name: workspace
            mountPath: /workspace

    - name: buildkit
      container:
        image: moby/buildkit:v0.31.1-rootless
        command: [sh, -c]
        args:
          # buildctl-daemonless.sh starts a throwaway rootless buildkitd, runs
          # the build, and exits — one-shot, no always-on daemon. Registry cache
          # import/export against zot persists layers across builds (image-manifest
          # so zot accepts the cache); FROM pulls route through zot's mirror via
          # the mounted buildkitd.toml.
          - |
            IMG=registry.registry.svc.cluster.local:5000/github-runner
            buildctl-daemonless.sh build \
              --frontend dockerfile.v0 \
              --local context=/workspace/src/docker/github-runner \
              --local dockerfile=/workspace/src/docker/github-runner \
              --output "type=image,\"name=$IMG:latest,$IMG:{{workflow.uid}}\",push=true" \
              --export-cache "type=registry,ref=$IMG/cache,mode=max,oci-mediatypes=true,image-manifest=true" \
              --import-cache "type=registry,ref=$IMG/cache"
        env:
          # Relax the process sandbox so rootless buildkitd runs without a
          # privileged securityContext or /dev/fuse (the pod is the boundary).
          - name: BUILDKITD_FLAGS
            value: --oci-worker-no-process-sandbox
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          seccompProfile:
            type: Unconfined
          appArmorProfile:
            type: Unconfined
        volumeMounts:
          - name: workspace
            mountPath: /workspace
          - name: buildkitd-config
            mountPath: /home/user/.config/buildkit/buildkitd.toml
            subPath: buildkitd.toml
        resources:
          requests:
            cpu: "2"
            memory: 4Gi
          limits:
            cpu: "4"
            memory: 8Gi
