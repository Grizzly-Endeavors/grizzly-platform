apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: argo-workflows
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: argo-workflows
      # TODO(phase-8d): Bump to chart shipping app v4.1.0+ when released.
      # Trace spans require v4.1.0+ (PR #15585). OTLP env vars below are
      # already configured; only the version bump is needed for spans to flow.
      version: "1.0.7"
      sourceRef:
        kind: HelmRepository
        name: argo
  targetNamespace: argo
  install:
    createNamespace: false
  values:
    controller:
      metricsConfig:
        enabled: true
        path: /metrics
        port: 9090
      workflowDefaults:
        spec:
          serviceAccountName: argo-workflow
          podGC:
            strategy: OnPodCompletion
      extraEnv:
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://10.0.0.200:4317"
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: "grpc"
        - name: OTEL_EXPORTER_OTLP_HEADERS
          value: "X-Scope-OrgID=grizzly-platform"
        - name: OTEL_SERVICE_NAME
          value: "argo-workflow-controller"
      resources:
        limits:
          cpu: 200m
          memory: 256Mi
        requests:
          cpu: 100m
          memory: 128Mi
    server:
      enabled: true
      authModes:
        - server
      resources:
        limits:
          cpu: 100m
          memory: 128Mi
        requests:
          cpu: 50m
          memory: 64Mi
    workflow:
      serviceAccount:
        create: true
        name: argo-workflow
      rbac:
        create: true
    artifactRepository:
      archiveLogs: true
      s3:
        bucket: argo-artifacts
        # s3-bulk versitygw gateway (ADR-055)
        endpoint: "10.0.0.200:7072"
        insecure: true
        accessKeySecret:
          name: argo-s3-credentials
          key: accesskey
        secretKeySecret:
          name: argo-s3-credentials
          key: secretkey
