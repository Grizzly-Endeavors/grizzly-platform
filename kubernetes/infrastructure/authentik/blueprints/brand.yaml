version: 1
metadata:
  name: grizzly-baseline-brand
# Cyber-bear branding for the default fallback brand (matched by domain).
# Logo/favicon/background are embedded as data URIs (the asset lives at
# assets/grizzly-endeavors.jpg in this repo) so branding needs no media volume
# or external host and survives chart upgrades. The logo is the bear tile with
# its white JPEG corners flood-filled to transparency and re-encoded as WebP.
# Custom CSS themes the flow/login page in the logo's palette; see
# blueprints/CLAUDE.md. Provider (Discord/GitHub/Google) icons are NOT set here:
# authentik already serves bundled brand SVGs for each provider_type and renders
# them next to the source buttons. Idempotent: re-applied every reconcile, so UI
# edits to these fields revert — change them here.
entries:
  - model: authentik_brands.brand
    identifiers:
      domain: authentik-default
    attrs:
      branding_title: "Grizzly Endeavors"
      branding_logo: "data:image/webp;base64,"
      branding_favicon: "data:image/png;base64,"
      branding_default_flow_background: "data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%221600%22%20height%3D%221000%22%20viewBox%3D%220%200%201600%201000%22%20preserveAspectRatio%3D%22xMidYMid%20slice%22%3E%3Cdefs%3E%3CradialGradient%20id%3D%22g%22%20cx%3D%2250%25%22%20cy%3D%2234%25%22%20r%3D%2280%25%22%3E%3Cstop%20offset%3D%220%25%22%20stop-color%3D%22%2312405c%22%2F%3E%3Cstop%20offset%3D%2240%25%22%20stop-color%3D%22%230c2338%22%2F%3E%3Cstop%20offset%3D%22100%25%22%20stop-color%3D%22%23060d18%22%2F%3E%3C%2FradialGradient%3E%3CradialGradient%20id%3D%22glow%22%20cx%3D%2250%25%22%20cy%3D%2230%25%22%20r%3D%2242%25%22%3E%3Cstop%20offset%3D%220%25%22%20stop-color%3D%22%231fd6ef%22%20stop-opacity%3D%220.14%22%2F%3E%3Cstop%20offset%3D%22100%25%22%20stop-color%3D%22%231fd6ef%22%20stop-opacity%3D%220%22%2F%3E%3C%2FradialGradient%3E%3C%2Fdefs%3E%3Crect%20width%3D%221600%22%20height%3D%221000%22%20fill%3D%22url%28%23g%29%22%2F%3E%3Crect%20width%3D%221600%22%20height%3D%221000%22%20fill%3D%22url%28%23glow%29%22%2F%3E%3C%2Fsvg%3E"
      branding_custom_css: |
        /* Grizzly Endeavors — cyber-bear theme. Palette taken from the logo:
           deep navy backdrop, electric-cyan glow, steel-blue panels. Overriding
           PatternFly/--ak-* custom properties (which inherit through the shadow DOM)
           is the upgrade-safe lever; direct .pf-c-login* selectors work because
           authentik adopts this stylesheet into the flow executor's shadow root. */
        :root,
        :host {
          --gb-navy-900: #060d18;
          --gb-navy-800: #0b1a2e;
          --gb-navy-700: #12233d;
          --gb-navy-600: #1a3252;
          --gb-cyan: #22d3ee;
          --gb-cyan-bright: #5ce9fb;
          --gb-cyan-deep: #0891b2;
          --gb-text: #e6f3f8;
          --gb-text-muted: #8fb2c8;

          /* Accent — buttons, active states, spinners. These inherit into shadow DOM. */
          --ak-accent: var(--gb-cyan);
          --pf-global--primary-color--100: var(--gb-cyan);
          --pf-global--primary-color--200: var(--gb-cyan-deep);
          --pf-global--active-color--100: var(--gb-cyan);
          --pf-global--active-color--400: var(--gb-cyan-deep);
          --pf-global--link--Color: var(--gb-cyan-bright);
          --pf-global--link--Color--hover: #a7f0fb;
          --pf-global--BorderColor--100: var(--gb-navy-600);
          --pf-global--BorderColor--200: var(--gb-navy-600);
        }

        /* ---- Flow / login page — always the dark cyber-bear look ---- */
        .pf-c-login,
        .pf-c-background-image,
        .ak-login-container {
          --pf-c-login--BackgroundColor: var(--gb-navy-900);
          background-color: var(--gb-navy-900);
        }

        /* The login card: dark steel-navy panel with a soft cyan edge-glow. */
        .pf-c-login__main {
          --pf-c-login__main--BackgroundColor: var(--gb-navy-700);
          background: linear-gradient(180deg, #13253f 0%, #101f34 100%);
          border: 1px solid rgba(34, 211, 238, 0.28);
          border-radius: 14px;
          box-shadow:
            0 0 0 1px rgba(6, 13, 24, 0.6),
            0 18px 50px -12px rgba(3, 8, 16, 0.85),
            0 0 42px -8px rgba(34, 211, 238, 0.25);
          overflow: hidden;
        }

        /* Cyan hairline across the top of the card. */
        .pf-c-login__main-header {
          border-block-end: 1px solid rgba(34, 211, 238, 0.15);
          box-shadow: inset 0 2px 0 0 var(--gb-cyan);
        }

        .pf-c-login__main-header-desc,
        .pf-c-login__main-body,
        .pf-c-login__main-footer {
          color: var(--gb-text);
        }

        .pf-c-title,
        .pf-c-login__main-header .pf-c-title {
          color: var(--gb-text);
        }

        /* Brand logo sits a touch larger with breathing room. */
        .pf-c-brand,
        img.pf-c-brand {
          max-height: 120px;
          filter: drop-shadow(0 0 18px rgba(34, 211, 238, 0.35));
        }

        /* ---- Inputs ---- */
        .pf-c-form-control {
          background-color: var(--gb-navy-800);
          color: var(--gb-text);
          border: 1px solid var(--gb-navy-600);
          border-block-end-color: rgba(34, 211, 238, 0.4);
          border-radius: 8px;
        }
        .pf-c-form-control:hover {
          border-color: rgba(34, 211, 238, 0.5);
        }
        .pf-c-form-control:focus {
          border-color: var(--gb-cyan);
          box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.22);
          outline: none;
        }
        .pf-c-form__label-text {
          color: var(--gb-text-muted);
        }

        /* ---- Primary buttons — cyan, glowing on hover ---- */
        .pf-c-button.pf-m-primary {
          background: linear-gradient(135deg, var(--gb-cyan) 0%, var(--gb-cyan-deep) 100%);
          color: #04141c;
          font-weight: 600;
          border: none;
          border-radius: 8px;
          transition: box-shadow 0.15s ease, filter 0.15s ease;
        }
        .pf-c-button.pf-m-primary:hover,
        .pf-c-button.pf-m-primary:focus {
          filter: brightness(1.08);
          box-shadow: 0 0 22px -2px rgba(34, 211, 238, 0.6);
          color: #04141c;
        }

        /* Secondary / social-source buttons: outlined cyan. */
        .pf-c-button.pf-m-secondary {
          background-color: rgba(34, 211, 238, 0.06);
          color: var(--gb-cyan-bright);
          border: 1px solid rgba(34, 211, 238, 0.4);
          border-radius: 8px;
        }
        .pf-c-button.pf-m-secondary:hover {
          background-color: rgba(34, 211, 238, 0.14);
          border-color: var(--gb-cyan);
        }

        /* Links. */
        .pf-c-login__main-footer-links a,
        a {
          color: var(--gb-cyan-bright);
        }
        a:hover {
          color: #a7f0fb;
        }

        /* ---- User library (app dashboard) — accent inherits via custom props;
           nudge exposed parts where authentik exports them. Element name has varied
           across versions, so target both defensively. ---- */
        ak-library::part(card-header-icon),
        ak-library-impl::part(card-header-icon) {
          color: var(--gb-cyan);
        }
