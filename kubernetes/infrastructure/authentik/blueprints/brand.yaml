version: 1
metadata:
  name: grizzly-baseline-brand
# Cyber-bear branding for the default fallback brand (matched by domain).
#
# authentik 2026.5's file backends only accept these brand image fields as a
# built-in /static path, an uploaded media file, or an external http(s):// URL
# (PassthroughBackend); data URIs are rejected by the upload-filename validator.
# So logo + favicon are served as real files by the authentik-brand-assets nginx
# deployment and referenced by their https URLs here. The flow-page background is
# a pure CSS radial-gradient (no image needed), set via --ak-global--background-
# image in branding_custom_css. Provider (Discord/GitHub/Google) icons are NOT
# set here: authentik already serves bundled brand SVGs per provider_type.
#
# Idempotent: re-applied every reconcile, so UI edits to these fields revert.
entries:
  - model: authentik_brands.brand
    identifiers:
      domain: authentik-default
    attrs:
      branding_title: "Grizzly Endeavors"
      branding_logo: "https://sso.grizzly-endeavors.com/brand/logo.webp"
      branding_favicon: "https://sso.grizzly-endeavors.com/brand/favicon.png"
      branding_custom_css: |
        /* Grizzly Endeavors — cyber-bear theme. Palette taken from the logo:
           deep navy backdrop, electric-cyan glow, steel-blue panels. Overriding
           PatternFly/--ak-* custom properties (which inherit through the shadow DOM)
           is the upgrade-safe lever; direct .pf-c-login* selectors work because
           authentik adopts this stylesheet into the flow executor's shadow root.
           Logo + favicon are real served files (branding_logo/branding_favicon point
           at sso.grizzly-endeavors.com/brand/*); this file only styles + paints the flow
           background as a pure CSS gradient, so no image is embedded here. */
        :root,
        :host {
          --gb-navy-900: #060d18;
          --gb-navy-800: #0b1a2e;
          --gb-navy-700: #12233d;
          --gb-navy-600: #1a3252;
          --gb-cyan: #22d3ee;
          --gb-cyan-bright: #5ce9fb;
          --gb-cyan-deep: #0891b2;
          --gb-text: #e6f3f8;
          --gb-text-muted: #8fb2c8;

          /* Flow-page background — cyan glow over a deep-navy radial, no image file. */
          --ak-global--background-image:
            radial-gradient(60% 45% at 50% 8%, rgba(34, 211, 238, 0.14), rgba(34, 211, 238, 0) 70%),
            radial-gradient(ellipse 130% 100% at 50% 10%, #12405c 0%, #0c2338 45%, #060d18 100%);

          /* Accent — buttons, active states, spinners. These inherit into shadow DOM. */
          --ak-accent: var(--gb-cyan);
          --pf-global--primary-color--100: var(--gb-cyan);
          --pf-global--primary-color--200: var(--gb-cyan-deep);
          --pf-global--active-color--100: var(--gb-cyan);
          --pf-global--active-color--400: var(--gb-cyan-deep);
          --pf-global--link--Color: var(--gb-cyan-bright);
          --pf-global--link--Color--hover: #a7f0fb;
          --pf-global--BorderColor--100: var(--gb-navy-600);
          --pf-global--BorderColor--200: var(--gb-navy-600);
        }

        /* ---- Flow / login page — always the dark cyber-bear look ---- */
        .pf-c-login,
        .pf-c-background-image,
        .ak-login-container {
          background-color: var(--gb-navy-900);
          background-image: var(--ak-global--background-image);
          background-size: cover;
        }

        /* The login card: dark steel-navy panel with a soft cyan edge-glow and a
           single cyan accent hairline across the very top of the card. */
        .pf-c-login__main {
          --pf-c-login__main--BackgroundColor: var(--gb-navy-700);
          background: linear-gradient(180deg, #13253f 0%, #101f34 100%);
          border: 1px solid rgba(34, 211, 238, 0.28);
          border-top: 2px solid var(--gb-cyan);
          border-radius: 14px;
          box-shadow:
            0 0 0 1px rgba(6, 13, 24, 0.6),
            0 18px 50px -12px rgba(3, 8, 16, 0.85),
            0 0 42px -8px rgba(34, 211, 238, 0.25);
          overflow: hidden;
        }

        .pf-c-login__main-header-desc,
        .pf-c-login__main-body,
        .pf-c-login__main-footer {
          color: var(--gb-text);
        }

        .pf-c-title,
        .pf-c-login__main-header .pf-c-title {
          color: var(--gb-text);
        }

        /* Brand logo (rendered as <img class="branding-logo"> inside .pf-c-brand). */
        .pf-c-brand img,
        .branding-logo {
          max-height: 116px;
          width: auto;
          filter: drop-shadow(0 0 18px rgba(34, 211, 238, 0.35));
        }

        /* ---- Inputs ---- */
        .pf-c-form-control {
          background-color: var(--gb-navy-800);
          color: var(--gb-text);
          border: 1px solid var(--gb-navy-600);
          border-block-end-color: rgba(34, 211, 238, 0.4);
          border-radius: 8px;
        }
        .pf-c-form-control:hover {
          border-color: rgba(34, 211, 238, 0.5);
        }
        .pf-c-form-control:focus {
          border-color: var(--gb-cyan);
          box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.22);
          outline: none;
        }
        .pf-c-form__label-text {
          color: var(--gb-text-muted);
        }

        /* ---- Primary buttons — cyan, glowing on hover ---- */
        .pf-c-button.pf-m-primary {
          background: linear-gradient(135deg, var(--gb-cyan) 0%, var(--gb-cyan-deep) 100%);
          color: #04141c;
          font-weight: 600;
          border: none;
          border-radius: 8px;
          transition: box-shadow 0.15s ease, filter 0.15s ease;
        }
        .pf-c-button.pf-m-primary:hover,
        .pf-c-button.pf-m-primary:focus {
          filter: brightness(1.08);
          box-shadow: 0 0 22px -2px rgba(34, 211, 238, 0.6);
          color: #04141c;
        }

        /* Social-source buttons (Discord/GitHub/Google). authentik renders these as
           icon-only <button class="source-button"> with a monochrome <img part=
           "source-icon"> — dark glyphs that vanish on the dark card. Give each a
           near-white chip (provider logos are drawn for light backgrounds) with a cyan
           hover glow so all three read crisply. */
        .pf-c-button.source-button {
          background-color: #eef4f8;
          border: 1px solid rgba(34, 211, 238, 0.35);
          border-radius: 10px;
          padding: 8px 10px;
          transition: box-shadow 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
        }
        .pf-c-button.source-button:hover,
        .pf-c-button.source-button:focus {
          background-color: #ffffff;
          border-color: var(--gb-cyan);
          box-shadow: 0 0 16px -3px rgba(34, 211, 238, 0.55);
          transform: translateY(-1px);
        }
        .source-button img[part="source-icon"],
        .source-button .pf-c-button__icon img {
          width: 22px;
          height: 22px;
        }

        /* Links. */
        .pf-c-login__main-footer-links a,
        a {
          color: var(--gb-cyan-bright);
        }
        a:hover {
          color: #a7f0fb;
        }

        /* ---- User library (app dashboard) — accent inherits via custom props;
           nudge exposed parts where authentik exports them. Element name has varied
           across versions, so target both defensively. ---- */
        ak-library::part(card-header-icon),
        ak-library-impl::part(card-header-icon) {
          color: var(--gb-cyan);
        }

  # Replace the built-in "Welcome to authentik!" heading on the login flow with
  # our own. Only `title` is patched; the flow's other attrs are left untouched.
  - model: authentik_flows.flow
    identifiers:
      slug: default-authentication-flow
    attrs:
      title: "Welcome to Grizzly Endeavors"
