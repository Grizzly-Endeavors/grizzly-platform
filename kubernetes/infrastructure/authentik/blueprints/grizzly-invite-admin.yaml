version: 1
metadata:
  name: grizzly-invite-admin
entries:
  # Forward-auth (single application) proxy provider fronting the invite broker's
  # /admin provisioning UI. The first proxy provider in the homelab — it turns the
  # embedded outpost into an nginx external-auth backend for invite.bearflinn.com.
  - model: authentik_providers_proxy.proxyprovider
    id: invite-admin-provider
    identifiers:
      name: grizzly-invite-admin
    attrs:
      mode: forward_single
      external_host: https://invite.bearflinn.com
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]

  # Deliberately NO policy binding. Any authenticated user passes the outpost; the
  # broker itself checks grizzly-admins (from the X-authentik-groups header nginx
  # injects) so a signed-in non-admin sees the broker's own "not allowed" page
  # instead of the outpost's generic deny. Binding a grizzly-admins policy here
  # would 403 at the outpost and defeat that UX. See ADR-043.
  - model: authentik_core.application
    identifiers:
      slug: grizzly-invite-admin
    attrs:
      name: Grizzly Invite — provisioning
      provider: !KeyOf invite-admin-provider
      meta_launch_url: https://invite.bearflinn.com/admin
      meta_description: "Mint and manage invitations (grizzly-admins only)"
      policy_engine_mode: any

  # Bind the provider to the default embedded outpost so it serves
  # /outpost.goauthentik.io for invite.bearflinn.com. Only this provider is set;
  # it is currently the sole proxy provider, so replacing the list is safe.
  #
  # authentik_host MUST be set or the outpost builds its sign-in redirect against
  # http://localhost (the internal API URL) and the browser 404s. A partial config
  # is fine: OutpostConfig fills every other field from its dataclass defaults
  # (which match the embedded outpost's current values, e.g. namespace via the
  # running pod), so only authentik_host changes.
  - model: authentik_outposts.outpost
    identifiers:
      name: authentik Embedded Outpost
    attrs:
      providers:
        - !KeyOf invite-admin-provider
      config:
        authentik_host: https://sso.bearflinn.com/
