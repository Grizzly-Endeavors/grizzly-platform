version: 1
metadata:
  name: grizzly-invite-admin
entries:
  # Forward-auth (single application) proxy provider fronting the invite broker's
  # /admin provisioning UI. The first proxy provider in the homelab — it turns the
  # embedded outpost into an nginx external-auth backend for invite.grizzly-endeavors.com.
  - model: authentik_providers_proxy.proxyprovider
    id: invite-admin-provider
    identifiers:
      name: grizzly-invite-admin
    attrs:
      mode: forward_single
      external_host: https://invite.grizzly-endeavors.com
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]

  # Scopes both app-library visibility and access to grizzly-admins (ADR-049) —
  # the broker also checks grizzly-admins from X-authentik-groups in-app, as
  # defense in depth. A non-admin who hits the URL directly gets the outpost's
  # generic 403.
  - model: authentik_core.application
    id: invite-admin-app
    identifiers:
      slug: grizzly-invite-admin
    attrs:
      name: Grizzly Invite — provisioning
      provider: !KeyOf invite-admin-provider
      meta_launch_url: https://invite.grizzly-endeavors.com/admin
      meta_description: "Mint and manage invitations (grizzly-admins only)"
      policy_engine_mode: any

  - model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf invite-admin-app
      group: !Find [authentik_core.group, [name, grizzly-admins]]
      order: 0
    attrs:
      enabled: true
      negate: false

  # NOTE: the embedded-outpost provider binding lives in
  # blueprints/grizzly-webmail.yaml, which enumerates every proxy provider (a
  # blueprint replaces the M2M list wholesale, so only one file may own it).
  # Do not add an outpost entry here.
