version: 1
metadata:
  name: grizzly-invite-admin
entries:
  # Forward-auth (single application) proxy provider fronting the invite broker's
  # /admin provisioning UI. The first proxy provider in the homelab — it turns the
  # embedded outpost into an nginx external-auth backend for invite.grizzly-endeavors.com.
  - model: authentik_providers_proxy.proxyprovider
    id: invite-admin-provider
    identifiers:
      name: grizzly-invite-admin
    attrs:
      mode: forward_single
      external_host: https://invite.grizzly-endeavors.com
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]

  # ADR-043 originally left this unbound so a signed-in non-admin would see the
  # broker's own friendly "not allowed" page instead of the outpost's generic
  # deny (the broker still checks grizzly-admins from X-authentik-groups
  # in-app, as defense in depth). Superseded by ADR-049: the app library on
  # sso.grizzly-endeavors.com shows every app any authenticated user can reach, so
  # leaving this unbound meant friends saw an admin-only provisioning tool in
  # their launcher. The group binding below scopes both library visibility and
  # access to grizzly-admins; a non-admin now gets the outpost's generic 403 if
  # they hit the URL directly, trading the polished deny page for a clean
  # app library.
  - model: authentik_core.application
    id: invite-admin-app
    identifiers:
      slug: grizzly-invite-admin
    attrs:
      name: Grizzly Invite — provisioning
      provider: !KeyOf invite-admin-provider
      meta_launch_url: https://invite.grizzly-endeavors.com/admin
      meta_description: "Mint and manage invitations (grizzly-admins only)"
      policy_engine_mode: any

  - model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf invite-admin-app
      group: !Find [authentik_core.group, [name, grizzly-admins]]
      order: 0
    attrs:
      enabled: true
      negate: false

  # NOTE: the embedded-outpost provider binding used to live here, listing only
  # invite-admin-provider. With a second proxy provider now in play (Roundcube
  # webmail), the outpost's provider list must enumerate BOTH — a single blueprint
  # replaces the M2M wholesale, so two files each setting it would clobber each
  # other. The binding was consolidated into blueprints/grizzly-webmail.yaml,
  # which references this provider via !Find. Do not re-add an outpost entry here.
