version: 1
metadata:
  name: grizzly-baseline-groups
# Baseline RBAC groups. The blueprint owns each group's existence and its power
# flag (is_superuser) but deliberately does NOT manage grizzly-admins membership:
# a group's `users` attr is replace-semantics, so pinning it would revert anyone
# added out-of-band, and human accounts can't live in this public repo anyway (no
# PII in git — see the directory CLAUDE.md). akadmin is superuser independently;
# additional admins are added in the Authentik UI/API (a documented manual step).
#
# Below the two baseline groups: the membership taxonomy — two households and
# two friend circles. Membership is kept ORTHOGONAL to power (admin/tier groups
# are deferred and added separately), so a person is e.g. "Big Bear Hollow" plus
# a future "household-admin", never an exploded "big-bear-hollow-admin". The
# `name` doubles as identifier and label and propagates verbatim into the OIDC
# `groups` claim (and thus the Nextcloud group name). Enrollees land here via a
# group-scoped invite (the invite carries the group; the enrollment gate policy
# in social-login.yaml adds it). See ADR-041.
entries:
  - model: authentik_core.group
    identifiers:
      name: grizzly-admins
    attrs:
      is_superuser: true
  - model: authentik_core.group
    identifiers:
      name: grizzly-users
  - model: authentik_core.group
    identifiers:
      name: Big Bear Hollow
  - model: authentik_core.group
    identifiers:
      name: Fliguntons
  - model: authentik_core.group
    identifiers:
      name: Rainy Tree Society
  - model: authentik_core.group
    identifiers:
      name: Nerds
  - model: authentik_core.group
    identifiers:
      name: Boardgame Bros
