version: 1
metadata:
  name: grizzly-social-login
# Social federation (Discord + GitHub + Google) with invitation-gated closed
# enrollment. The invitation is carried in a browser cookie planted by the
# grizzly-invite broker — it survives the OAuth round-trip that Authentik flow
# context does NOT — and validated by an expression policy on the enrollment
# flow. See docs/decisions/040-invite-broker-cookie-bridged-enrollment.md.
#
# Login: returning users click a Discord/GitHub/Google button on the
# sso.bearflinn.com login page and are matched to their existing linked account.
#
# Enrollment (closed): a NEW social login has no match, so Authentik runs the
# source's enrollment_flow -> grizzly-invite-enrollment. The grizzly-invite-gate
# expression policy bound to that flow reads the `grizzly_invite` cookie and
# POSTs it to the broker's /verify; a missing/invalid/used invitation denies the
# flow (no account). A valid one -> the user is created from the provider's
# identity and auto-added to grizzly-users, plus any groups the invite carried
# (the /verify response returns them; the gate policy injects them into the flow
# plan's `groups` context for the user-write stage). See ADR-041.
#
# Per-user onboarding = mint an invite in the broker and send the link; the
# person clicks it, signs in with any provider, and is enrolled — no code to
# paste. No user object is pre-provisioned, so no human PII lives in git/OpenBao.
#
# Source client_id/client_secret are NOT in git: injected into the worker (which
# applies blueprints) via global.env as AUTHENTIK_{DISCORD,GITHUB}_CLIENT_{ID,
# SECRET}, sourced from OpenBao secret/grizzly-platform/platform/authentik by the
# authentik ExternalSecret. See docs/decisions/039-...-invitation-enrollment.md.
#
# ENTRY ORDER MATTERS: `!KeyOf` resolves to an already-applied entry, so every
# target must appear *above* its references. Order here is therefore:
# flow -> enrollment stages -> sources -> login-page stage -> stage bindings.
# Everything is one blueprint (not split) so these cross-references resolve in a
# single atomic transaction rather than needing cross-file !Find + a reconcile.
entries:
  # --- Enrollment flow (referenced by the sources + bindings below) ---------
  - model: authentik_flows.flow
    id: invite-enrollment-flow
    identifiers:
      slug: grizzly-invite-enrollment
    attrs:
      name: Grizzly invite enrollment
      title: Complete your sign-up
      designation: enrollment
      # No standalone access — this flow is only reachable as a source's
      # enrollment fallback after social auth.
      authentication: none

  # --- Invitation gate (expression policy on the flow) ----------------------
  # Replaces the old paste-a-code prompt + invitation stage. The broker plants a
  # signed `grizzly_invite` cookie at invite.bearflinn.com/i/<token>; that cookie
  # survives the OAuth round-trip (Authentik flow context does not), so this
  # policy reads it on the enrollment callback and consumes it via /verify.
  # Fail closed: no cookie, a bad/used invite, or a broker error all deny.
  - model: authentik_policies_expression.expressionpolicy
    id: invite-gate-policy
    identifiers:
      name: grizzly-invite-gate
    attrs:
      execution_logging: true
      expression: |
        cookie = request.http_request.COOKIES.get("grizzly_invite")
        if not cookie:
            ak_message("No invitation found. Open your invite link to sign up.")
            return False
        try:
            res = requests.post(
                "http://grizzly-invite.grizzly-invite.svc.cluster.local:8080/verify",
                json={"cookie": cookie},
                timeout=5,
            )
        except Exception as exc:
            ak_logger.warning("invite verify request failed", exc=str(exc))
            ak_message("Sign-up service is unavailable. Please try again shortly.")
            return False
        result = res.json() if res.status_code == 200 else {}
        if result.get("allow") is not True:
            ak_message("Your invitation is invalid or has already been used.")
            return False
        # Some sources (e.g. Google) provide a verified email but no username,
        # which makes the user-write stage abort with "empty username". Derive
        # the username from the email so any provider can enroll seamlessly.
        # (Writing request.context here persists into the flow plan.)
        prompt_data = request.context.setdefault("prompt_data", {})
        if not prompt_data.get("username"):
            prompt_data["username"] = prompt_data.get("email", "")
        # Scope the enrollee to the invite's groups (returned by /verify). The
        # user-write stage adds any Group objects under the plan's `groups`
        # context key, on top of its static create_users_group (grizzly-users).
        # Unknown names filter to empty — fail-soft, the user just isn't added.
        from authentik.core.models import Group
        group_names = result.get("groups") or []
        if group_names:
            request.context["groups"] = list(Group.objects.filter(name__in=group_names))
        return True

  # Bind the gate to the enrollment flow. failure_result:false => a policy error
  # denies (fail closed); timeout > the in-policy /verify timeout. This is the
  # cutover from the removed invitation stage; if live testing shows a flow-level
  # binding can't see the cookie after the source redirect, move this binding
  # onto the user-write stage (re_evaluate_policies) instead — see ADR-040.
  - model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf invite-enrollment-flow
      policy: !KeyOf invite-gate-policy
      order: 0
    attrs:
      enabled: true
      negate: false
      timeout: 6
      failure_result: false

  # --- Enrollment stages ----------------------------------------------------
  # Creates the user from the source-provided identity, active, in grizzly-users
  # (static below) plus any invite-scoped groups the gate policy staged in the
  # flow plan's `groups` context.
  # user_type: internal so enrolled users can reach their dashboard/app launcher
  # and manage their account — the stage default (external) is a B2C/app-only
  # type that's barred from the authentik interface. Internal users are free and
  # unlimited in OSS authentik.
  - model: authentik_stages_user_write.userwritestage
    id: enrollment-write-stage
    identifiers:
      name: grizzly-enrollment-write
    attrs:
      user_creation_mode: always_create
      create_users_as_inactive: false
      user_type: internal
      create_users_group: !Find [authentik_core.group, [name, grizzly-users]]

  - model: authentik_stages_user_login.userloginstage
    id: enrollment-login-stage
    identifiers:
      name: grizzly-enrollment-login

  # --- OAuth sources (reference the enrollment flow above) ------------------
  - model: authentik_sources_oauth.oauthsource
    id: discord-source
    identifiers:
      slug: discord
    attrs:
      name: Discord
      provider_type: discord
      enabled: true
      consumer_key: !Env [AUTHENTIK_DISCORD_CLIENT_ID, ""]
      consumer_secret: !Env [AUTHENTIK_DISCORD_CLIENT_SECRET, ""]
      # Link a new provider login to an existing user with the same (verified)
      # email instead of creating a duplicate — so one person using both Discord
      # and GitHub lands on a single account. Safe here: both providers supply
      # verified emails, and enrollment is invitation-gated, so this can't be
      # used to take over an account.
      user_matching_mode: email_link
      authentication_flow: !Find [authentik_flows.flow, [slug, default-source-authentication]]
      enrollment_flow: !KeyOf invite-enrollment-flow

  - model: authentik_sources_oauth.oauthsource
    id: github-source
    identifiers:
      slug: github
    attrs:
      name: GitHub
      provider_type: github
      enabled: true
      consumer_key: !Env [AUTHENTIK_GITHUB_CLIENT_ID, ""]
      consumer_secret: !Env [AUTHENTIK_GITHUB_CLIENT_SECRET, ""]
      # See the Discord source above: link-by-verified-email so both providers
      # resolve to one account rather than creating duplicates.
      user_matching_mode: email_link
      authentication_flow: !Find [authentik_flows.flow, [slug, default-source-authentication]]
      enrollment_flow: !KeyOf invite-enrollment-flow

  - model: authentik_sources_oauth.oauthsource
    id: google-source
    identifiers:
      slug: google
    attrs:
      name: Google
      provider_type: google
      enabled: true
      consumer_key: !Env [AUTHENTIK_GOOGLE_CLIENT_ID, ""]
      consumer_secret: !Env [AUTHENTIK_GOOGLE_CLIENT_SECRET, ""]
      # Link-by-verified-email, same as the other sources. Google emails are
      # verified; enrollment stays invitation-gated.
      user_matching_mode: email_link
      authentication_flow: !Find [authentik_flows.flow, [slug, default-source-authentication]]
      enrollment_flow: !KeyOf invite-enrollment-flow

  # --- Show the source buttons on the main login page -----------------------
  # Authoritative on this stage's `sources` list: keep the built-in source so
  # local username/password still works, plus the two OAuth sources.
  - model: authentik_stages_identification.identificationstage
    identifiers:
      name: default-authentication-identification
    attrs:
      sources:
        - !Find [authentik_core.source, [slug, authentik-built-in]]
        - !KeyOf discord-source
        - !KeyOf github-source
        - !KeyOf google-source

  # --- Flow stage bindings: user write -> login -----------------------------
  # The invitation gate is now a flow-level expression policy (above), not a
  # stage — so the flow has no interactive steps after OAuth: it just writes the
  # user and logs them in. (The old prompt/invitation stage bindings at order
  # 10/20 are removed; their now-orphaned objects are deleted from the running
  # instance during the cutover — see ADR-040 / the deploy runbook.)
  - model: authentik_flows.flowstagebinding
    identifiers:
      target: !KeyOf invite-enrollment-flow
      stage: !KeyOf enrollment-write-stage
      order: 30
  - model: authentik_flows.flowstagebinding
    identifiers:
      target: !KeyOf invite-enrollment-flow
      stage: !KeyOf enrollment-login-stage
      order: 40
