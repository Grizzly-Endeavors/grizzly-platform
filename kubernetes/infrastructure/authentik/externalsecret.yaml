# Syncs Authentik's secrets from OpenBao into the authentik namespace. The
# HelmRelease's global.env wires these keys into the server + worker pods.
#
# Operator bootstrap (one-time), before first reconcile:
#   bao kv put secret/grizzly-platform/platform/authentik \
#       secret_key=$(openssl rand -base64 60) \
#       db_password=<authentik postgres role password> \
#       bootstrap_password=<initial akadmin password> \
#       bootstrap_token=<initial akadmin API token>
# db_password must match the role created by setup-authentik.yml. The Redis
# password is read straight from the existing stores/redis path — not copied.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-secrets
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: authentik-secrets
    creationPolicy: Owner
  data:
    - secretKey: secret_key
      remoteRef:
        key: grizzly-platform/platform/authentik
        property: secret_key
    - secretKey: db_password
      remoteRef:
        key: grizzly-platform/platform/authentik
        property: db_password
    - secretKey: bootstrap_password
      remoteRef:
        key: grizzly-platform/platform/authentik
        property: bootstrap_password
    - secretKey: bootstrap_token
      remoteRef:
        key: grizzly-platform/platform/authentik
        property: bootstrap_token
    # Reuse the foundation Redis credential — single source of truth in
    # stores/redis, shared with the other consumers of that instance.
    - secretKey: redis_password
      remoteRef:
        key: grizzly-platform/stores/redis
        property: password
    # OIDC client credentials for the Nextcloud integration. Injected into the
    # worker via global.env (AUTHENTIK_NEXTCLOUD_CLIENT_*) and consumed by
    # blueprints/nextcloud.yaml through !Env. The same two keys feed Nextcloud's
    # own ExternalSecret in lab-apps — one source of truth for both sides.
    - secretKey: oidc_nextcloud_client_id
      remoteRef:
        key: grizzly-platform/platform/authentik
        property: oidc_nextcloud_client_id
    - secretKey: oidc_nextcloud_client_secret
      remoteRef:
        key: grizzly-platform/platform/authentik
        property: oidc_nextcloud_client_secret
