apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: flux-system
spec:
  interval: 30m
  # Pin the release name. Without this, Flux defaults to
  # <targetNamespace>-<name> ("authentik-authentik"), which the chart's
  # fullname helper turns into "authentik-authentik-server" etc. — breaking the
  # ingress backend (authentik-server) and the metrics selector. "authentik"
  # already contains the chart name, so the helper does not double it.
  releaseName: authentik
  chart:
    spec:
      chart: authentik
      # Date-based version that tracks the authentik appVersion. Verified
      # current stable at pin time via the charts.goauthentik.io index.
      version: "2026.5.3"
      sourceRef:
        kind: HelmRepository
        name: authentik
  targetNamespace: authentik
  install:
    createNamespace: false
  values:
    # --- Declarative config (blueprints) ------------------------------------
    # The authentik-blueprints ConfigMap (generated by kustomization.yaml from
    # blueprints/*.yaml) is mounted into server + worker at /blueprints/custom/;
    # the worker auto-discovers and applies it, re-reconciling every 60m. This
    # is how all internal config (brand, groups, providers, apps) is kept in IaC
    # rather than click-ops. See docs/decisions/037-...-blueprints.md.
    blueprints:
      configMaps:
        - authentik-blueprints

    # --- External foundation stores (R730xd, host-networked Docker) ---------
    # PostgreSQL on the central foundation instance. Non-secret connection
    # fields go here (rendered into authentik's config secret); the password is
    # injected via global.env from the ESO-synced authentik-secrets Secret.
    authentik:
      log_level: info
      postgresql:
        host: "10.0.0.200"
        name: authentik
        user: authentik
        port: 5432
    # This chart version bundles no Redis subchart — the cache is configured
    # purely via AUTHENTIK_REDIS__* env (authentik's own config keys, RESP wire
    # protocol). We point at the shared foundation kv-cache (Valkey backend) on a
    # dedicated DB index (1) so keys don't collide; the store is addressed only
    # by host:port:password, so the backend is transparent to authentik.
    postgresql:
      enabled: false

    # --- Secrets + connection env, injected into server AND worker ----------
    # global.env applies to every authentik Deployment. Secret values come from
    # the authentik-secrets Secret (synced from OpenBao by externalsecret.yaml);
    # env entries override the chart-generated config secret on name collision.
    global:
      env:
        - name: AUTHENTIK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: secret_key
        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: db_password
        - name: AUTHENTIK_REDIS__HOST
          value: "10.0.0.200"
        - name: AUTHENTIK_REDIS__PORT
          value: "6379"
        - name: AUTHENTIK_REDIS__DB
          value: "1"
        - name: AUTHENTIK_REDIS__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: kv_cache_password
        # Initial akadmin bootstrap — only consumed on first migration when no
        # users exist. Safe to leave wired afterward (ignored once seeded).
        - name: AUTHENTIK_BOOTSTRAP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: bootstrap_password
        - name: AUTHENTIK_BOOTSTRAP_TOKEN
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: bootstrap_token
        # OIDC client creds for the Nextcloud provider, consumed by
        # blueprints/nextcloud.yaml via !Env. The worker (which applies
        # blueprints) reads these; injecting on every authentik Deployment via
        # global.env is harmless for the server.
        - name: AUTHENTIK_NEXTCLOUD_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: oidc_nextcloud_client_id
        - name: AUTHENTIK_NEXTCLOUD_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: oidc_nextcloud_client_secret
        # OIDC client creds for the career-scanner provider, consumed by
        # blueprints/career-scanner.yaml via !Env. Same worker-applies-blueprints
        # rationale as the Nextcloud pair above.
        - name: AUTHENTIK_CAREER_SCANNER_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: oidc_career_scanner_client_id
        - name: AUTHENTIK_CAREER_SCANNER_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: oidc_career_scanner_client_secret
        # OAuth client creds for the Discord + GitHub social sources, consumed by
        # blueprints/social-login.yaml via !Env. The worker (which applies
        # blueprints) reads these; injecting on every Deployment is harmless.
        - name: AUTHENTIK_DISCORD_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: oauth_discord_client_id
        - name: AUTHENTIK_DISCORD_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: oauth_discord_client_secret
        - name: AUTHENTIK_GITHUB_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: oauth_github_client_id
        - name: AUTHENTIK_GITHUB_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: oauth_github_client_secret
        - name: AUTHENTIK_GOOGLE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: oauth_google_client_id
        - name: AUTHENTIK_GOOGLE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: oauth_google_client_secret

    # --- Server (web/API) ---------------------------------------------------
    # Ingress handled by ingress.yaml (kept separate, repo convention), so the
    # chart's own ingress stays disabled. metrics.enabled exposes the :9300
    # container port that metrics-service.yaml publishes via NodePort.
    server:
      replicas: 1
      metrics:
        enabled: true
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi

    # --- Worker (tasks, migrations, outpost mgmt) ---------------------------
    worker:
      replicas: 1
      metrics:
        enabled: true
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1536Mi
