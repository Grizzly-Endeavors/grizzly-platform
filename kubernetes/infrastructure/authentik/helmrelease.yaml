apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: flux-system
spec:
  interval: 30m
  # Pin the release name. Without this, Flux defaults to
  # <targetNamespace>-<name> ("authentik-authentik"), which the chart's
  # fullname helper turns into "authentik-authentik-server" etc. — breaking the
  # ingress backend (authentik-server) and the metrics selector. "authentik"
  # already contains the chart name, so the helper does not double it.
  releaseName: authentik
  chart:
    spec:
      chart: authentik
      # Date-based version that tracks the authentik appVersion. Verified
      # current stable at pin time via the charts.goauthentik.io index.
      version: "2026.5.3"
      sourceRef:
        kind: HelmRepository
        name: authentik
  targetNamespace: authentik
  install:
    createNamespace: false
  values:
    # --- External foundation stores (R730xd, host-networked Docker) ---------
    # PostgreSQL on the central foundation instance. Non-secret connection
    # fields go here (rendered into authentik's config secret); the password is
    # injected via global.env from the ESO-synced authentik-secrets Secret.
    authentik:
      log_level: info
      postgresql:
        host: "10.0.0.200"
        name: authentik
        user: authentik
        port: 5432
    # This chart version bundles no Redis subchart — Redis is configured purely
    # via AUTHENTIK_REDIS__* env (see global.env below). We point at the same
    # foundation Redis on a dedicated DB index (1) so keys don't collide; the
    # later Redis->Valkey cutover is transparent (same host:port:password).
    postgresql:
      enabled: false

    # --- Secrets + connection env, injected into server AND worker ----------
    # global.env applies to every authentik Deployment. Secret values come from
    # the authentik-secrets Secret (synced from OpenBao by externalsecret.yaml);
    # env entries override the chart-generated config secret on name collision.
    global:
      env:
        - name: AUTHENTIK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: secret_key
        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: db_password
        - name: AUTHENTIK_REDIS__HOST
          value: "10.0.0.200"
        - name: AUTHENTIK_REDIS__PORT
          value: "6379"
        - name: AUTHENTIK_REDIS__DB
          value: "1"
        - name: AUTHENTIK_REDIS__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: redis_password
        # Initial akadmin bootstrap — only consumed on first migration when no
        # users exist. Safe to leave wired afterward (ignored once seeded).
        - name: AUTHENTIK_BOOTSTRAP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: bootstrap_password
        - name: AUTHENTIK_BOOTSTRAP_TOKEN
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: bootstrap_token

    # --- Server (web/API) ---------------------------------------------------
    # Ingress handled by ingress.yaml (kept separate, repo convention), so the
    # chart's own ingress stays disabled. metrics.enabled exposes the :9300
    # container port that metrics-service.yaml publishes via NodePort.
    server:
      replicas: 1
      metrics:
        enabled: true
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi

    # --- Worker (tasks, migrations, outpost mgmt) ---------------------------
    worker:
      replicas: 1
      metrics:
        enabled: true
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1536Mi
