# Plain-HTTP ingress — external TLS terminates at proxy-vps (Caddy + wildcard
# *.grizzly-endeavors.com), which already routes any unmatched subdomain to this
# cluster ingress, so no VPS/Caddy change is needed for sso.grizzly-endeavors.com.
# Long timeouts + larger buffers suit OAuth/SAML redirects and flow POSTs.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: authentik
  namespace: authentik
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "32m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    # Brand assets on /brand (longer prefix than "/"), everything else to
    # authentik. Brand refs point here — see brand-assets-deployment.yaml and
    # blueprints/brand.yaml.
    - host: sso.grizzly-endeavors.com
      http:
        paths:
          - path: /brand
            pathType: Prefix
            backend:
              service:
                name: authentik-brand-assets
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: authentik-server
                port:
                  number: 80
