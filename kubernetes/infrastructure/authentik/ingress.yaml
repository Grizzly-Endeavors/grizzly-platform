# Plain-HTTP ingress — external TLS terminates at proxy-vps (Caddy + wildcard
# *.bearflinn.com), which already routes any unmatched subdomain to this
# cluster ingress, so no VPS/Caddy/DNS change is needed for sso.bearflinn.com.
# Long timeouts + larger buffers suit OAuth/SAML redirects and flow POSTs.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: authentik
  namespace: authentik
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "32m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: sso.bearflinn.com
      http:
        paths:
          # Brand assets (logo/favicon) served by the static authentik-brand-assets
          # deployment. Longer prefix than "/", so nginx routes /brand/* here and
          # everything else to authentik. The authentik brand references these at
          # https://sso.bearflinn.com/brand/* (PassthroughBackend) — see
          # brand-assets-deployment.yaml and blueprints/brand.yaml.
          - path: /brand
            pathType: Prefix
            backend:
              service:
                name: authentik-brand-assets
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: authentik-server
                port:
                  number: 80
