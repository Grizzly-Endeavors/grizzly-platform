# authentik server metrics — exposed via NodePort for R730xd Prometheus
# (same pattern as cert-manager/metrics-service.yaml). The chart's own
# server.metrics service is ClusterIP and cannot pin a NodePort, so this
# dedicated Service publishes the :9300 metrics port at a fixed nodePort.
# Scrape target: <control-plane-ip>:30891
apiVersion: v1
kind: Service
metadata:
  name: authentik-server-metrics-nodeport
  namespace: authentik
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/instance: authentik
    app.kubernetes.io/component: server
  ports:
    - port: 9300
      targetPort: metrics
      nodePort: 30891
      protocol: TCP
      name: metrics
