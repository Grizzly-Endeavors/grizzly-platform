# Cloudflare API token for cert-manager's Let's Encrypt DNS-01 solver
# (ADR-052). Synced from OpenBao into the cert-manager namespace so the
# letsencrypt-staging / letsencrypt-prod ClusterIssuers can solve the
# ACME DNS-01 challenge for mail.grizzly-endeavors.com by writing a
# _acme-challenge TXT record.
#
# DEDICATED cert-manager token (platform/cloudflare-certmanager), NOT the
# Caddy/VPS token: the shared platform/cloudflare token is source-IP-locked to
# the VPS, so cert-manager (egressing from the cluster/home IP) gets Cloudflare
# error 9109 "Cannot use the access token from location". This token is scoped
# to Zone:Read + DNS:Edit on grizzly-endeavors.com with no IP restriction. See
# ADR-052.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: cloudflare-api-token
    creationPolicy: Owner
  data:
    - secretKey: api-token
      remoteRef:
        key: grizzly-platform/platform/cloudflare-certmanager
        property: api_token
