apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: registry-s3-creds
  namespace: registry
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: registry-s3-creds
    creationPolicy: Owner
  # Scoped s3-bulk versitygw account (ADR-055) that owns only the lab-registry
  # bucket — replaces the former mapping of the MinIO-bulk *root* creds.
  # Provisioned by setup-registry-stores.yml.
  data:
    - secretKey: accessKey
      remoteRef:
        key: grizzly-platform/stores/registry
        property: access_key
    - secretKey: secretKey
      remoteRef:
        key: grizzly-platform/stores/registry
        property: secret_key
