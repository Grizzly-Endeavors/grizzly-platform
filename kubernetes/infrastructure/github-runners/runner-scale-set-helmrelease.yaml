apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: arc-runner-set
  namespace: flux-system
spec:
  interval: 30m
  dependsOn:
    - name: arc-controller
  chart:
    spec:
      chart: gha-runner-scale-set
      version: "0.14.0"
      sourceRef:
        kind: HelmRepository
        name: actions-runner-controller
  targetNamespace: arc-runners
  install:
    createNamespace: false
  values:
    githubConfigUrl: "https://github.com/grizzly-endeavors"
    githubConfigSecret: github-runner-pat
    runnerScaleSetName: "lab-runners"
    minRunners: 0
    maxRunners: 4
    # NOTE: we do NOT use `containerMode.type: dind` — that shortcut would
    # inject a default dind sidecar whose dockerd has no insecure-registry
    # config, which prevents pushing to the in-cluster OCI registry at
    # registry.registry.svc.cluster.local:5000 (served over plain HTTP, see
    # kubernetes/infrastructure/registry/). Instead we define both runner
    # and dind containers explicitly below, with --insecure-registry on
    # dockerd's args.
    listenerMetrics:
      counters:
        gha_started_jobs_total:
          labels: ["repository", "organization", "job_name", "event_name"]
        gha_completed_jobs_total:
          labels: ["repository", "organization", "job_name", "event_name", "job_result"]
      gauges:
        gha_assigned_jobs:
          labels: ["name", "namespace", "repository", "organization"]
        gha_running_jobs:
          labels: ["name", "namespace", "repository", "organization"]
        gha_idle_runners:
          labels: ["name", "namespace", "repository", "organization"]
        gha_min_runners:
          labels: ["name", "namespace"]
        gha_max_runners:
          labels: ["name", "namespace"]
        gha_desired_runners:
          labels: ["name", "namespace"]
    template:
      spec:
        initContainers:
          - name: init-dind-externals
            image: registry.registry.svc.cluster.local:5000/github-runner:latest
            imagePullPolicy: Always
            command: ["cp", "-r", "-v", "/home/runner/externals/.", "/home/runner/tmpDir/"]
            volumeMounts:
              - name: dind-externals
                mountPath: /home/runner/tmpDir
        containers:
          - name: runner
            image: registry.registry.svc.cluster.local:5000/github-runner:latest
            imagePullPolicy: Always
            # Wait for the dind sidecar to open its socket before starting
            # the GitHub Actions runner. Both containers start in parallel
            # in a pod, so without this wait the runner can start before
            # dockerd is accepting connections and any `docker ...` command
            # in the workflow fails immediately with "no such file or directory".
            command:
              - /bin/bash
              - -c
              - |
                set -e
                echo "Waiting for dind sidecar to open docker.sock..."
                for i in $(seq 1 60); do
                  if docker info >/dev/null 2>&1; then
                    echo "dind ready after ${i}s"
                    break
                  fi
                  sleep 1
                done
                docker info >/dev/null || { echo "dind never came up"; exit 1; }
                exec /home/runner/run.sh
            env:
              - name: DOCKER_HOST
                value: unix:///run/docker/docker.sock
              # sccache — Rust build cache backed by the s3-bulk versitygw
              # gateway (ADR-055).
              - name: RUSTC_WRAPPER
                value: "sccache"
              - name: SCCACHE_BUCKET
                value: "build-cache"
              - name: SCCACHE_ENDPOINT
                value: "http://10.0.0.200:7072"
              - name: SCCACHE_REGION
                value: "us-east-1"
              - name: SCCACHE_S3_USE_SSL
                value: "false"
              - name: AWS_ACCESS_KEY_ID
                valueFrom:
                  secretKeyRef:
                    name: sccache-s3-credentials
                    key: accesskey
              - name: AWS_SECRET_ACCESS_KEY
                valueFrom:
                  secretKeyRef:
                    name: sccache-s3-credentials
                    key: secretkey
              # cosign signing material for the CI gate (synced from OpenBao via
              # ESO — external-secrets-stores/cosign.yaml). Exposed here so the
              # gate step can forward it into the gate container with
              # `docker run -e COSIGN_PRIVATE_KEY -e COSIGN_PASSWORD`.
              # optional:true so runners still start before the key is
              # bootstrapped — only gate jobs fail (guarded in gate.yaml), not
              # all CI. NOTE: visible to every job on this shared pool;
              # acceptable single-tenant, revisit with a dedicated gate pool if
              # that changes.
              - name: COSIGN_PRIVATE_KEY
                valueFrom:
                  secretKeyRef:
                    name: cosign-signing-key
                    key: cosign.key
                    optional: true
              - name: COSIGN_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: cosign-signing-key
                    key: cosign.password
                    optional: true
            resources:
              limits:
                cpu: "8"
                memory: 16Gi
              requests:
                cpu: "4"
                memory: 8Gi
            volumeMounts:
              - name: work
                mountPath: /home/runner/_work
              - name: dind-sock
                mountPath: /run/docker
                readOnly: true
          - name: dind
            image: docker:dind
            args:
              - dockerd
              - --host=unix:///run/docker/docker.sock
              - --group=$(DOCKER_GROUP_GID)
              # Allow pushing to the in-cluster OCI registry over plain HTTP.
              # Matches kubernetes/infrastructure/registry/service.yaml.
              - --insecure-registry=registry.registry.svc.cluster.local:5000
              # Route Docker Hub pulls (docker build FROM, docker pull) through
              # the in-cluster zot pull-through cache so base images are fetched
              # once and served LAN-local. dockerd --registry-mirror only
              # mirrors Docker Hub; that's fine — the only non-Docker-Hub image
              # in CI builds is the gcr.io kaniko executor, which runs as an
              # Argo pod (cached at the containerd layer instead). See ADR 032.
              - --registry-mirror=http://registry.registry.svc.cluster.local:5000
            env:
              - name: DOCKER_GROUP_GID
                value: "123"
            securityContext:
              privileged: true
            volumeMounts:
              - name: work
                mountPath: /home/runner/_work
              - name: dind-sock
                mountPath: /run/docker
              - name: dind-externals
                mountPath: /home/runner/externals
        volumes:
          - name: work
            emptyDir: {}
          - name: dind-sock
            emptyDir: {}
          - name: dind-externals
            emptyDir: {}
