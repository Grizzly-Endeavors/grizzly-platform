apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: enforce-gameservers-bot-signature
  annotations:
    policies.kyverno.io/title: Enforce grizzly-gameservers bot signature
    policies.kyverno.io/description: >-
      Enforce the grizzly-gate cosign signature on the grizzly-gameservers BOT
      image only. Unlike the broad verify-gate-signature policy (which stays in
      Audit during rollout), this refuses an unsigned bot image at admission.
      Scoped tightly to the bot so the on-demand game-server (supervisor) images
      and the unsigned Agones SDK sidecar in the same namespace are unaffected:
      the imageReferences glob matches registry/grizzly-gameservers@<digest> but
      NOT registry/grizzly-gameservers-minecraft@<digest> (next char is '-', not
      '@') nor the Agones gcr.io sidecar. See grizzly-gameservers ADR-003 and
      cluster/kyverno/. Full-namespace enforcement awaits game-image signing +
      an Agones policy exception.
spec:
  # background:false — image verification needs the admission-time context and
  # must not run as a background scan over existing pods.
  background: false
  failurePolicy: Fail
  webhookTimeoutSeconds: 30
  rules:
    - name: enforce-bot-image
      match:
        any:
          - resources:
              kinds:
                - Pod
              # Only namespaces opted in with grizzly.io/gated: "true"
              # (grizzly-gameservers sets it on game-servers).
              namespaceSelector:
                matchLabels:
                  grizzly.io/gated: "true"
      verifyImages:
        # Bot image only. The trailing '@*' pins this to a digest reference and
        # excludes the '-minecraft' supervisor repo by construction.
        - imageReferences:
            - "registry.registry.svc.cluster.local:5000/grizzly-gameservers@*"
          failureAction: Enforce
          # The chart already pins the bot by digest, so no tag→digest mutation
          # is needed; just require and verify the digest signature.
          mutateDigest: false
          verifyDigest: true
          required: true
          attestors:
            - count: 1
              entries:
                - keys:
                    # grizzly-gate cosign PUBLIC key (not secret). Same key as
                    # verify-gate-signature.yaml; matches the private half in
                    # OpenBao secret/grizzly-platform/cicd/cosign.
                    publicKeys: |-
                      -----BEGIN PUBLIC KEY-----
                      MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAE4KBckBkLKLINu9WATY50fiJXw1G7
                      2BUAREgh9iwDwJYbvIVdFrUeaTSgJF/nt8Y8ga++d5SzXAxft1Jr1VnqlA==
                      -----END PUBLIC KEY-----
