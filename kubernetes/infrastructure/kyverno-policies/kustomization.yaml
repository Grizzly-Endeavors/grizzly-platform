apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Kyverno ClusterPolicy CRs. Applied by the kyverno-policies Flux Kustomization
# (dependsOn: infrastructure) so Kyverno's CRDs exist first.
# platform-rules.yaml.disabled is intentionally NOT listed — it's a scaffold
# for a later enforcement phase.
resources:
  - verify-gate-signature.yaml
  # Bot-scoped Enforce policy: refuses an unsigned grizzly-gameservers BOT image
  # at admission (the broad verify-gate-signature stays Audit during rollout).
  # Scoped by the imageReferences glob so game-supervisor + Agones images are
  # unaffected. Enabled only after the first gate-signed bot image is live.
  - enforce-gameservers-bot-signature.yaml
