apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-gate-signature
  annotations:
    policies.kyverno.io/title: Verify CI gate signature
    policies.kyverno.io/description: >-
      Refuse to admit first-party images that lack a valid grizzly-gate cosign
      signature. The signature is produced by the CI gate only after all checks
      pass, so this is the deploy boundary that lets agents ship without manual
      review. Scoped to namespaces labelled grizzly.io/gated=true so upstream /
      third-party images (lab-apps) are unaffected.
spec:
  # background:false — image verification needs the admission-time context and
  # must not run as a background scan over existing pods.
  background: false
  failurePolicy: Fail
  webhookTimeoutSeconds: 30
  rules:
    - name: verify-first-party-images
      match:
        any:
          - resources:
              kinds:
                - Pod
              # Only gated namespaces. Label a namespace with
              # `grizzly.io/gated: "true"` to opt it into enforcement.
              namespaceSelector:
                matchLabels:
                  grizzly.io/gated: "true"
      verifyImages:
        - imageReferences:
            - "registry.registry.svc.cluster.local:5000/*"
          # Phase: start in Audit (report-only), flip to Enforce once all live
          # first-party images are signed. See kyverno-policies/README.md.
          # NOTE: when flipping to Enforce, also set mutateDigest: true to pin
          # tag→digest. Kyverno rejects mutateDigest:true under Audit (Audit is
          # report-only and cannot mutate), so it stays false in this phase.
          failureAction: Audit
          mutateDigest: false
          verifyDigest: true
          required: true
          attestors:
            - count: 1
              entries:
                - keys:
                    # grizzly-gate cosign PUBLIC key (not secret). Matches the
                    # private half in OpenBao secret/grizzly-platform/cicd/cosign.
                    # Rotate: regenerate keypair, bao kv put, replace this block.
                    publicKeys: |-
                      -----BEGIN PUBLIC KEY-----
                      MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAE4KBckBkLKLINu9WATY50fiJXw1G7
                      2BUAREgh9iwDwJYbvIVdFrUeaTSgJF/nt8Y8ga++d5SzXAxft1Jr1VnqlA==
                      -----END PUBLIC KEY-----
