# Kyverno admission controller metrics — exposed via NodePort for the R730xd
# Prometheus (same pattern as argo-workflows/metrics-services.yaml). Kyverno's
# admission controller serves Prometheus metrics on port 8000.
apiVersion: v1
kind: Service
metadata:
  name: kyverno-admission-metrics
  namespace: kyverno
spec:
  type: NodePort
  selector:
    app.kubernetes.io/component: admission-controller
    app.kubernetes.io/part-of: kyverno
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30890
      protocol: TCP
      name: metrics
