apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metrics-server
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: metrics-server
      version: "3.12.2"
      sourceRef:
        kind: HelmRepository
        name: metrics-server
  targetNamespace: kube-system
  install:
    createNamespace: false
  values:
    args:
      # Kubelet serving certs are self-signed on kubeadm clusters; metrics-server
      # must skip TLS verification to reach the kubelet metrics endpoint.
      - --kubelet-insecure-tls
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
