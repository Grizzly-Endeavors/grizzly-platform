# Flux controller metrics — exposed via NodePort for R730xd Prometheus
# (same pattern as argo-workflows/metrics-services.yaml).
apiVersion: v1
kind: Service
metadata:
  name: source-controller-metrics
  namespace: flux-system
  labels:
    app: source-controller
spec:
  type: NodePort
  selector:
    app: source-controller
  ports:
    - port: 8080
      targetPort: http-prom
      nodePort: 30881
      protocol: TCP
      name: metrics
---
