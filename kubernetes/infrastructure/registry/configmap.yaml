apiVersion: v1
kind: ConfigMap
metadata:
  name: zot-config
  namespace: registry
  labels:
    app.kubernetes.io/name: registry
data:
  # zot registry config. We keep this registry anonymous + plain-HTTP +
  # in-cluster only (same posture as the registry:2.8.3 it replaces) so the
  # containerd mirror (ansible/roles/k8s-registry-trust), the DinD sidecar's
  # --insecure-registry, and kaniko's anonymous push all keep working
  # unchanged. The reason for the swap is the OCI 1.1 referrers API, which the
  # CI gate needs to attach cosign signatures to image digests. Adding auth is
  # a separate, later change (it ripples into containerd/DinD/kaniko creds).
  #
  # rootdirectory /lab-registry: existing images were mirrored here during the
  # cutover (the registry:2.8.3 data stays at the bucket root as a rollback net).
  # dedupe MUST be false: with S3 remote storage zot requires a remote cache DB
  # for dedupe, which we don't run.
  #
  # Pull-through cache (extensions.sync, onDemand): zot transparently mirrors
  # Docker Hub + GCR. Containerd on every node redirects docker.io/gcr.io pulls
  # here (ansible/roles/k8s-registry-trust certs.d entries) and the DinD daemon
  # in CI runners sets --registry-mirror to this registry, so external base
  # images are fetched once and served LAN-local thereafter — no manifest
  # rewrites needed. content.prefix "**" maps the request path 1:1 onto the
  # upstream repo (e.g. library/alpine → registry-1.docker.io/library/alpine).
  # sync.downloadDir is REQUIRED here because storage is remote (S3): zot stages
  # synced images on a local dir before pushing to the backend, and refuses to
  # start (sync + remote storage) without it. We point it at a subdir of the
  # /var/lib/zot cache emptyDir so staging and rootDirectory share a filesystem.
  # See docs/decisions/031-registry-pullthrough-cache.md.
  config.json: |
    {
      "distSpecVersion": "1.1.0",
      "storage": {
        "rootDirectory": "/var/lib/zot",
        "dedupe": false,
        "storageDriver": {
          "name": "s3",
          "region": "us-east-1",
          "regionendpoint": "http://10.0.0.200:9002",
          "bucket": "lab-registry",
          "forcepathstyle": true,
          "secure": false,
          "rootdirectory": "/lab-registry"
        }
      },
      "http": {
        "address": "0.0.0.0",
        "port": "5000"
      },
      "log": {
        "level": "info"
      },
      "extensions": {
        "search": {
          "enable": true
        },
        "metrics": {
          "enable": true,
          "prometheus": {
            "path": "/metrics"
          }
        },
        "sync": {
          "enable": true,
          "downloadDir": "/var/lib/zot/.sync",
          "registries": [
            {
              "urls": ["https://registry-1.docker.io"],
              "onDemand": true,
              "tlsVerify": true,
              "maxRetries": 3,
              "retryDelay": "5m",
              "content": [
                { "prefix": "**" }
              ]
            },
            {
              "urls": ["https://gcr.io"],
              "onDemand": true,
              "tlsVerify": true,
              "maxRetries": 3,
              "retryDelay": "5m",
              "content": [
                { "prefix": "**" }
              ]
            }
          ]
        }
      }
    }
