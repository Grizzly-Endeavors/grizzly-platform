apiVersion: v1
kind: ConfigMap
metadata:
  name: zot-config
  namespace: registry
  labels:
    app.kubernetes.io/name: registry
data:
  # zot registry config. Anonymous + plain-HTTP + in-cluster only, so the
  # containerd mirror (ansible/roles/k8s-registry-trust), the DinD sidecar's
  # --insecure-registry, and kaniko's anonymous push all keep working
  # unchanged. Anonymous access is required for the OCI 1.1 referrers API,
  # which the CI gate uses to attach cosign signatures to image digests.
  # Adding auth is a separate, later change (it ripples into
  # containerd/DinD/kaniko creds).
  #
  # dedupe MUST be false: with S3 remote storage zot requires a remote cache DB
  # for dedupe, which we don't run. fastRestart skips the startup storage->metaDB
  # walk on a clean restart (metaDB persists on the cache PVC); combined with
  # the dedupe-restore-complete marker, restarts don't storm.
  #
  # extensions.sync (onDemand): transparent pull-through cache for docker.io +
  # gcr.io. On a cache miss zot fetches from upstream and stores it here, then
  # serves it LAN-local. content.prefix "**" maps the request path 1:1 onto the
  # upstream repo. sync+S3 requires downloadDir (zot stages synced images on a
  # local dir before the S3 push) — pointed at the cache PVC. Nodes route
  # docker.io/gcr.io pulls here via containerd certs.d (k8s-registry-trust) and
  # CI DinD via --registry-mirror. See docs/decisions/032-registry-pullthrough-cache.md.
  config.json: |
    {
      "distSpecVersion": "1.1.0",
      "storage": {
        "rootDirectory": "/var/lib/zot",
        "dedupe": false,
        "fastRestart": true,
        "storageDriver": {
          "name": "s3",
          "region": "us-east-1",
          "regionendpoint": "http://10.0.0.200:7072",
          "bucket": "lab-registry",
          "forcepathstyle": true,
          "secure": false,
          "rootdirectory": "/lab-registry-v2"
        }
      },
      "http": {
        "address": "0.0.0.0",
        "port": "5000"
      },
      "log": {
        "level": "info"
      },
      "extensions": {
        "search": {
          "enable": true
        },
        "metrics": {
          "enable": true,
          "prometheus": {
            "path": "/metrics"
          }
        },
        "sync": {
          "enable": true,
          "downloadDir": "/var/lib/zot/.sync",
          "registries": [
            {
              "urls": ["https://registry-1.docker.io"],
              "onDemand": true,
              "tlsVerify": true,
              "maxRetries": 3,
              "retryDelay": "5m",
              "content": [
                { "prefix": "**" }
              ]
            },
            {
              "urls": ["https://gcr.io"],
              "onDemand": true,
              "tlsVerify": true,
              "maxRetries": 3,
              "retryDelay": "5m",
              "content": [
                { "prefix": "**" }
              ]
            }
          ]
        }
      }
    }
