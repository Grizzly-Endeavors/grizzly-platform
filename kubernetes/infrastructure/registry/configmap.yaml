apiVersion: v1
kind: ConfigMap
metadata:
  name: zot-config
  namespace: registry
  labels:
    app.kubernetes.io/name: registry
data:
  # zot registry config. We keep this registry anonymous + plain-HTTP +
  # in-cluster only (same posture as the registry:2.8.3 it replaces) so the
  # containerd mirror (ansible/roles/k8s-registry-trust), the DinD sidecar's
  # --insecure-registry, and kaniko's anonymous push all keep working
  # unchanged. The reason for the swap is the OCI 1.1 referrers API, which the
  # CI gate needs to attach cosign signatures to image digests. Adding auth is
  # a separate, later change (it ripples into containerd/DinD/kaniko creds).
  #
  # rootdirectory /lab-registry-v2: fresh prefix created during the zot v2.1.18
  # migration. We exported the in-use images (latest per repo) to OCI archives,
  # pointed zot at this empty prefix so it boots with nothing to reconcile (no
  # dedupe-restore storm), then re-pushed the keepers. The old /lab-registry
  # prefix (full 34 GiB store) and the registry:2.8.3 data at the bucket root are
  # retained as a rollback net until the migration is verified, then pruned.
  # dedupe MUST be false: with S3 remote storage zot requires a remote cache DB
  # for dedupe, which we don't run. fastRestart skips the startup storage->metaDB
  # walk on a clean restart (metaDB persists on the cache PVC); combined with
  # v2.1.18's dedupe-restore-complete marker, restarts no longer storm.
  config.json: |
    {
      "distSpecVersion": "1.1.0",
      "storage": {
        "rootDirectory": "/var/lib/zot",
        "dedupe": false,
        "fastRestart": true,
        "storageDriver": {
          "name": "s3",
          "region": "us-east-1",
          "regionendpoint": "http://10.0.0.200:9002",
          "bucket": "lab-registry",
          "forcepathstyle": true,
          "secure": false,
          "rootdirectory": "/lab-registry-v2"
        }
      },
      "http": {
        "address": "0.0.0.0",
        "port": "5000"
      },
      "log": {
        "level": "info"
      },
      "extensions": {
        "search": {
          "enable": true
        },
        "metrics": {
          "enable": true,
          "prometheus": {
            "path": "/metrics"
          }
        }
      }
    }
