apiVersion: v1
kind: ConfigMap
metadata:
  name: zot-config
  namespace: registry
  labels:
    app.kubernetes.io/name: registry
data:
  # zot registry config. We keep this registry anonymous + plain-HTTP +
  # in-cluster only (same posture as the registry:2.8.3 it replaces) so the
  # containerd mirror (ansible/roles/k8s-registry-trust), the DinD sidecar's
  # --insecure-registry, and kaniko's anonymous push all keep working
  # unchanged. The reason for the swap is the OCI 1.1 referrers API, which the
  # CI gate needs to attach cosign signatures to image digests. Adding auth is
  # a separate, later change (it ripples into containerd/DinD/kaniko creds).
  #
  # rootdirectory /lab-registry: existing images were mirrored here during the
  # cutover (the registry:2.8.3 data stays at the bucket root as a rollback net).
  # dedupe MUST be false: with S3 remote storage zot requires a remote cache DB
  # for dedupe, which we don't run.
  config.json: |
    {
      "distSpecVersion": "1.1.0",
      "storage": {
        "rootDirectory": "/var/lib/zot",
        "dedupe": false,
        "storageDriver": {
          "name": "s3",
          "region": "us-east-1",
          "regionendpoint": "http://10.0.0.200:9002",
          "bucket": "lab-registry",
          "forcepathstyle": true,
          "secure": false,
          "rootdirectory": "/lab-registry"
        }
      },
      "http": {
        "address": "0.0.0.0",
        "port": "5000"
      },
      "log": {
        "level": "info"
      },
      "extensions": {
        "search": {
          "enable": true
        },
        "metrics": {
          "enable": true,
          "prometheus": {
            "path": "/metrics"
          }
        }
      }
    }
