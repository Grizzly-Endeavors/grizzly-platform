apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: registry
  labels:
    app.kubernetes.io/name: registry
    app.kubernetes.io/component: oci-registry
spec:
  replicas: 1
  strategy:
    type: Recreate  # single replica backed by shared S3; avoid N-writer races on config
  selector:
    matchLabels:
      app.kubernetes.io/name: registry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: registry
    spec:
      containers:
        - name: registry
          # zot replaces registry:2.8.3 to gain the OCI 1.1 referrers API
          # (cosign signatures attached to digests) + a Prometheus metrics
          # extension. Pinned tag; re-pin to a digest once mirrored locally.
          image: ghcr.io/project-zot/zot-linux-amd64:v2.1.2
          imagePullPolicy: IfNotPresent
          args: ["serve", "/etc/zot/config.json"]
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          env:
            # S3 backend → MinIO bulk on R730xd (see ansible/roles/r730xd-minio-bulk).
            # zot's S3 driver (docker/distribution) reads credentials from the
            # AWS SDK env chain; we feed it the registry-s3-creds Secret seeded
            # by ansible/playbooks/seed-app-secrets.yml (and synced via ESO,
            # external-secrets-stores/registry.yaml).
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: registry-s3-creds
                  key: accessKey
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: registry-s3-creds
                  key: secretKey
          volumeMounts:
            - name: config
              mountPath: /etc/zot
              readOnly: true
            - name: cache
              mountPath: /var/lib/zot
          readinessProbe:
            httpGet:
              path: /v2/
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v2/
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: zot-config
        - name: cache
          emptyDir: {}
