apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-cache
  namespace: registry
  labels:
    app.kubernetes.io/name: registry
    app.kubernetes.io/component: oci-registry
spec:
  # zot's BoltDB index (/var/lib/zot/cache.db) must survive pod restarts.
  # On emptyDir it was wiped each boot, forcing a full S3 rescan +
  # restoreDedupedBlobs storm that locked writes for ~87 min per restart
  # (see docs/decisions/031-registry-cache-persistent-pvc.md). Bulk blobs
  # stay on the s3-bulk object store; only this small index lives on the fast ZFS tier.
  # iscsi-zfs-retain so an accidental delete doesn't force an index rebuild.
  accessModes:
    - ReadWriteOnce
  storageClassName: iscsi-zfs-retain
  resources:
    requests:
      storage: 5Gi
