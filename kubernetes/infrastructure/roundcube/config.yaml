# Non-secret Roundcube configuration.
#
# The roundcube/roundcubemail image builds its config.docker.inc.php from
# ROUNDCUBEMAIL_* env vars.
apiVersion: v1
kind: ConfigMap
metadata:
  name: roundcube-config
  namespace: roundcube
  labels:
    app.kubernetes.io/name: roundcube
data:
  # State on foundation Postgres (10.0.0.200:5432, db/role `roundcube`). The
  # schema is created by the image's initdb on first start.
  ROUNDCUBEMAIL_DB_TYPE: "pgsql"
  ROUNDCUBEMAIL_DB_HOST: "10.0.0.200"
  ROUNDCUBEMAIL_DB_PORT: "5432"
  ROUNDCUBEMAIL_DB_NAME: "roundcube"
  ROUNDCUBEMAIL_DB_USER: "roundcube"
  # A single fixed IMAP/SMTP target hides the "server" field on the login page.
  # We dial Stalwart via its PUBLIC host mail.grizzly-endeavors.com (imaps 993 /
  # submissions 465, implicit TLS) rather than the in-cluster Service. Reason:
  # Stalwart's mail listeners carry overrideProxyTrustedNetworks 10.0.0.0/8 and
  # the pod network (10.244.x) is inside that range, so a direct in-cluster
  # connection is treated as PROXY-protocol and reset (errno 104) when it isn't.
  # The public path rides the VPS HAProxy, which prepends the PROXY header, and
  # the cert matches this SAN — so no TLS name kludge is needed. It hairpins out
  # to the VPS and back; fine for low-volume webmail. (A future in-cluster,
  # PROXY-free listener is the "narrower PROXY trust" follow-up in mail.md.)
  ROUNDCUBEMAIL_DEFAULT_HOST: "ssl://mail.grizzly-endeavors.com"
  ROUNDCUBEMAIL_DEFAULT_PORT: "993"
  ROUNDCUBEMAIL_SMTP_SERVER: "ssl://mail.grizzly-endeavors.com"
  ROUNDCUBEMAIL_SMTP_PORT: "465"
  ROUNDCUBEMAIL_SKIN: "elastic"
  ROUNDCUBEMAIL_PRODUCT_NAME: "Grizzly Webmail"
  ROUNDCUBEMAIL_PLUGINS: "archive,zipdownload,newmail_notifier"
  ROUNDCUBEMAIL_UPLOAD_MAX_FILESIZE: "25M"
---
# Extra headers injected into nginx's forward-auth subrequest. The embedded
# Authentik outpost picks the proxy provider from the request host, but the
# auth subrequest carries Host = the authentik Service — so we pass the real
# host via X-Forwarded-Host (snippet annotations are disabled cluster-wide, so
# this ConfigMap + auth-proxy-set-headers is the supported mechanism). Mirrors
# grizzly-invite's admin gate.
apiVersion: v1
kind: ConfigMap
metadata:
  name: roundcube-auth-headers
  namespace: roundcube
  labels:
    app.kubernetes.io/name: roundcube
data:
  X-Forwarded-Host: "webmail.grizzly-endeavors.com"
  X-Forwarded-Proto: "https"
