# Roundcube webmail — the browser inbox for the self-hosted Stalwart mail server
# (ADR-056). Stalwart 0.16 ships no mailbox UI (only the admin console), so this
# is how mail is read/sent in a browser. Stateless PHP front-end: all durable
# state is on foundation Postgres, so the pod reschedules freely.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: roundcube
  namespace: roundcube
  labels:
    app.kubernetes.io/name: roundcube
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: roundcube
  template:
    metadata:
      labels:
        app.kubernetes.io/name: roundcube
    spec:
      containers:
        - name: roundcube
          # Roundcube 1.7.2 (current stable, released 2026-07-05; actively
          # maintained). Apache variant = self-contained web server on :80.
          image: roundcube/roundcubemail:1.7.2-apache
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          envFrom:
            - configMapRef:
                name: roundcube-config
            - secretRef:
                name: roundcube-secrets
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
