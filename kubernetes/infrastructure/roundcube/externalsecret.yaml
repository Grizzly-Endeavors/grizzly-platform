# Syncs Roundcube's runtime secrets from OpenBao into the roundcube namespace.
# The Deployment loads these via envFrom (ROUNDCUBEMAIL_DB_PASSWORD /
# ROUNDCUBEMAIL_DES_KEY are the exact env keys the image reads).
#
#   db_password  <- stores/roundcube  (the `roundcube` PG role password,
#                   provisioned by ansible/playbooks/setup-roundcube-stores.yml)
#   des_key      <- platform/roundcube (24-char key Roundcube uses to encrypt the
#                   IMAP password held in the user session; not a store credential)
#
# Placed with the workload (not in external-secrets-stores/) so it is applied by
# the roundcube Flux Kustomization itself — the ClusterSecretStore already exists
# (that Kustomization is a dependsOn). Same placement as stalwart's ExternalSecret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: roundcube-secrets
  namespace: roundcube
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: roundcube-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      mergePolicy: Replace
      data:
        ROUNDCUBEMAIL_DB_PASSWORD: "{{ .db_password }}"
        ROUNDCUBEMAIL_DES_KEY: "{{ .des_key }}"
  data:
    - secretKey: db_password
      remoteRef:
        key: grizzly-platform/stores/roundcube
        property: db_password
    - secretKey: des_key
      remoteRef:
        key: grizzly-platform/platform/roundcube
        property: des_key
