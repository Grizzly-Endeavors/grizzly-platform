# ClusterIP backend for the ingress.
apiVersion: v1
kind: Service
metadata:
  name: roundcube
  namespace: roundcube
  labels:
    app.kubernetes.io/name: roundcube
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: roundcube
  ports:
    - name: http
      port: 80
      targetPort: http
---
# Bridges the browser-facing forward-auth endpoints (/outpost.goauthentik.io/*)
# on webmail.grizzly-endeavors.com to Authentik's embedded outpost, served by
# authentik-server in the authentik namespace. An in-namespace Ingress backend
# can't point cross-namespace, so this ExternalName Service is the hop. Mirrors
# grizzly-invite's authentik-outpost bridge.
apiVersion: v1
kind: Service
metadata:
  name: authentik-outpost
  namespace: roundcube
  labels:
    app.kubernetes.io/name: roundcube
spec:
  type: ExternalName
  externalName: authentik-server.authentik.svc.cluster.local
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
