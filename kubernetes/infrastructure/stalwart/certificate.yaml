# Browser-trusted cert for the mail SMTP/IMAP TLS, issued in-cluster by the
# Let's Encrypt DNS-01 ClusterIssuer (ADR-052). Stalwart mounts the resulting
# stalwart-tls Secret and terminates TLS itself (HAProxy passes the stream
# through, ADR-051), so the cert must live in the cluster — Caddy's VPS wildcard
# never touches the raw mail ports.
#
# Validated the DNS-01 flow on letsencrypt-STAGING first; now on
# letsencrypt-prod so real IMAP/SMTP clients trust the CA. Stalwart mounts this
# Secret and serves it as the default TLS cert (SystemSettings.defaultCertificateId,
# set by configure-stalwart.yml) via File references (/etc/stalwart/tls/tls.{crt,key}).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: stalwart-tls
  namespace: stalwart
spec:
  secretName: stalwart-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - mail.grizzly-endeavors.com
