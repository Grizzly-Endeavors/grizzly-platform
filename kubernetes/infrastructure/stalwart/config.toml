# Stalwart mail server — static bootstrap config (ADR-050).
#
# Config-as-code split: this file holds the boot-critical INFRASTRUCTURE config
# (storage backends, listeners, TLS, fallback admin, directory) — the settings
# that must exist before the server can read its own database. Everything
# TENANT-level (the grizzly-endeavors.com domain, the bearflinn@ account, DKIM
# signatures, the SMTP2GO relay) is applied declaratively via the Stalwart CLI
# apply-plan (ansible/playbooks/configure-stalwart.yml) — the same pattern as
# the authentik blueprints (ADR-037).
#
# Keys matched by [config].local-keys are file-authoritative (reloaded from this
# file on every start, overriding the DB copy); everything else lives in
# Postgres and is CLI/API-managed. Secrets are injected at runtime via
# %{env:...}% from the stalwart-secrets Secret (ExternalSecret <- OpenBao); the
# mail TLS cert via %{file:...}% from the cert-manager-issued stalwart-tls.

[config]
local-keys = [
    "authentication.fallback-admin.*",
    "certificate.*",
    "config.local-keys.*",
    "directory.*",
    "http.*",
    "server.*",
    "!server.blocked-ip.*",
    "storage.data",
    "storage.blob",
    "storage.fts",
    "storage.lookup",
    "storage.directory",
    "store.*",
    "tracer.*",
]

[server]
hostname = "mail.grizzly-endeavors.com"
tls.certificate = "mail"

# --- Listeners -------------------------------------------------------------
# Raw mail ports are fronted by HAProxy on the VPS (PROXY protocol, ADR-051);
# the PROXY trusted-networks allowlist is added to these listeners in the
# HAProxy/tunnel phase, once the true upstream source IP is known. The http
# listener (8080) is the JMAP/webadmin/autoconfig surface, reached via Caddy ->
# ingress-nginx on mail.grizzly-endeavors.com (TLS terminated upstream).
[server.listener."smtp"]
bind = ["[::]:25"]
protocol = "smtp"

[server.listener."submission"]
bind = ["[::]:587"]
protocol = "smtp"

[server.listener."submissions"]
bind = ["[::]:465"]
protocol = "smtp"
tls.implicit = true

[server.listener."imaps"]
bind = ["[::]:993"]
protocol = "imap"
tls.implicit = true

[server.listener."http"]
bind = ["[::]:8080"]
protocol = "http"

[http]
url = "https://mail.grizzly-endeavors.com"
use-x-forwarded = true

# --- Storage (foundation stores, ADR-003) ----------------------------------
[storage]
data = "postgresql"
blob = "s3"
fts = "postgresql"
lookup = "postgresql"
directory = "internal"

[store."postgresql"]
type = "postgresql"
host = "10.0.0.200"
port = 5432
database = "stalwart"
user = "stalwart"
password = "%{env:POSTGRES_PASSWORD}%"
timeout = "15s"

[store."postgresql".pool]
max-connections = 20

[store."postgresql".tls]
enable = false
allow-invalid-certs = false

[store."s3"]
type = "s3"
bucket = "stalwart"
region = "us-east-1"
endpoint = "http://10.0.0.200:9000"
access-key = "%{env:S3_ACCESS_KEY}%"
secret-key = "%{env:S3_SECRET_KEY}%"
timeout = "30s"

# Accounts/principals live in the data store via the internal directory.
[directory."internal"]
type = "internal"
store = "postgresql"

# --- Bootstrap admin (the CLI authenticates as this to apply the config plan) -
[authentication.fallback-admin]
user = "admin"
secret = "%{env:ADMIN_SECRET}%"

# --- TLS cert (cert-manager, mounted from the stalwart-tls Secret) ----------
[certificate."mail"]
cert = "%{file:/etc/stalwart/tls/tls.crt}%"
private-key = "%{file:/etc/stalwart/tls/tls.key}%"
default = true

# --- Logs to stdout (kubectl logs / container runtime) ----------------------
[tracer."stdout"]
type = "console"
level = "info"
ansi = false
enable = true
