# Stalwart mail server (ADR-050). Single replica — all durable state is external
# (foundation Postgres + MinIO obs), so the pod is stateless and uses a Deployment
# (Recreate) rather than a StatefulSet/PVC. The init container seeds the config
# into the writable data dir at Stalwart's default config path; the main container
# reads /opt/stalwart/etc/config.toml, loads secrets via envFrom, and mounts the
# cert-manager TLS Secret.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stalwart
  namespace: stalwart
  labels:
    app.kubernetes.io/name: stalwart
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: stalwart
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stalwart
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: render-config
          image: busybox:1.37
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command: ["/bin/sh", "-ec"]
          args:
            - |
              mkdir -p /var/lib/stalwart
              cp /config/config.json /var/lib/stalwart/config.json
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /var/lib/stalwart
      containers:
        - name: stalwart
          image: stalwartlabs/stalwart:v0.16.11
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            # The stalwart binary carries cap_net_bind_service=ep (a file
            # capability) so it can bind the privileged mail ports (25/465/587/993)
            # as non-root. runc refuses to exec an effective-file-capability binary
            # under no_new_privs ("exec: operation not permitted"), so
            # allowPrivilegeEscalation must be true; the bounding set is dropped to
            # ALL then re-adds only NET_BIND_SERVICE, so nothing else can be raised.
            allowPrivilegeEscalation: true
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
          # 0.16 static config = the data-store object only (config.json); the
          # blob store, listeners, TLS, domain, accounts, DKIM and relay live in
          # Postgres and are applied via the Stalwart CLI. Image default config
          # path is /etc/stalwart/config.json.
          args: ["--config", "/var/lib/stalwart/config.json"]
          ports:
            - name: smtp
              containerPort: 25
            - name: submission
              containerPort: 587
            - name: smtps
              containerPort: 465
            - name: imaps
              containerPort: 993
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: stalwart-secrets
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/stalwart
            - name: tls
              mountPath: /etc/stalwart/tls
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: stalwart-config
        - name: tls
          secret:
            secretName: stalwart-tls
        - name: data
          emptyDir: {}
