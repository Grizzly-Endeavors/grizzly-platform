# Syncs Stalwart's runtime secrets from OpenBao into the stalwart namespace.
# The Deployment loads these as environment variables (envFrom); config.json and
# the CLI-applied plan reference them via %{env:...}% expansion.
#
# Lives here (with the workload), not in external-secrets-stores/, so it is
# applied by the stalwart Flux Kustomization itself — the ClusterSecretStore
# already exists (that Kustomization is a dependsOn), so it syncs immediately.
# Same placement as authentik's ExternalSecret.
#
# The `data` block pulls raw values from OpenBao; the `target.template` builds
# the actual pod env keys from them. STALWART_RECOVERY_ADMIN must be `user:pass`
# (Stalwart splits on the first ':'), which a plain remoteRef can't construct —
# hence the template. ACCOUNT_PASSWORD backs the bootstrap mailbox created by the
# CLI plan (temporary — accounts move to an Authentik-backed directory later).
#
#   POSTGRES_PASSWORD / S3_ACCESS_KEY / S3_SECRET_KEY  <- stores/stalwart
#     (provisioned by ansible/playbooks/setup-stalwart-stores.yml)
#   STALWART_RECOVERY_ADMIN  <- platform/stalwart admin_password (deterministic
#     fallback admin the CLI authenticates as to apply the config plan)
#   ACCOUNT_PASSWORD  <- platform/stalwart account_password (bootstrap mailbox)
#   SMTP2GO_PASSWORD  <- stores/smtp2go password (outbound smarthost auth; the
#     MtaRoute authSecret references this env var. Pod restart needed to pick it
#     up — configure-stalwart.yml -e stalwart_force_restart=true does this.)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: stalwart-secrets
  namespace: stalwart
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: stalwart-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      mergePolicy: Replace
      data:
        POSTGRES_PASSWORD: "{{ .db_password }}"
        S3_ACCESS_KEY: "{{ .s3_access_key }}"
        S3_SECRET_KEY: "{{ .s3_secret_key }}"
        STALWART_RECOVERY_ADMIN: "admin:{{ .admin_password }}"
        ACCOUNT_PASSWORD: "{{ .account_password }}"
        SMTP2GO_PASSWORD: "{{ .smtp2go_password }}"
  data:
    - secretKey: db_password
      remoteRef:
        key: grizzly-platform/stores/stalwart
        property: db_password
    - secretKey: s3_access_key
      remoteRef:
        key: grizzly-platform/stores/stalwart
        property: s3_access_key
    - secretKey: s3_secret_key
      remoteRef:
        key: grizzly-platform/stores/stalwart
        property: s3_secret_key
    - secretKey: admin_password
      remoteRef:
        key: grizzly-platform/platform/stalwart
        property: admin_password
    - secretKey: account_password
      remoteRef:
        key: grizzly-platform/platform/stalwart
        property: account_password
    - secretKey: smtp2go_password
      remoteRef:
        key: grizzly-platform/stores/smtp2go
        property: password
